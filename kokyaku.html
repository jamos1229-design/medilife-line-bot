<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useMemo } = React;

// ── Utils ─────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2, 9);
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const thisMonthStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
};
const fmtDate = s => {
  if (!s) return '';
  const [y, m, d] = s.split('-');
  return `${parseInt(m)}/${parseInt(d)}`;
};
const fmtDateFull = s => {
  if (!s) return '';
  const [y, m, d] = s.split('-');
  return `${y}年${parseInt(m)}月${parseInt(d)}日`;
};
const daysUntil = s => {
  if (!s) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const [y,m,d] = s.split('-').map(Number);
  return Math.ceil((new Date(y,m-1,d) - today) / 86400000);
};

// ── localStorage hook ────────────────────────────────────────
function useLS(key, init) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; }
    catch { return init; }
  });
  const set = useCallback(v => {
    setVal(prev => {
      const next = typeof v === 'function' ? v(prev) : v;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [key]);
  return [val, set];
}

// ── Status config ─────────────────────────────────────────────
const STATUSES = [
  { key: '未接触', color: '#9CA3AF', bg: '#F3F4F6' },
  { key: 'アポ済', color: '#2563EB', bg: '#EFF6FF' },
  { key: '面談済', color: '#7C3AED', bg: '#F5F3FF' },
  { key: 'フォロー中', color: '#059669', bg: '#ECFDF5' },
];
const statusInfo = key => STATUSES.find(s => s.key === key) || STATUSES[0];

const CONTACT_METHODS = ['電話', '個人LINE', 'その他'];

// ── StatusBadge ───────────────────────────────────────────────
const StatusBadge = ({ status }) => {
  const s = statusInfo(status);
  return (
    <span className="status-badge" style={{ background: s.bg, color: s.color }}>
      {status || '未接触'}
    </span>
  );
};

// ── Empty state ───────────────────────────────────────────────
const EmptyState = ({ icon, text }) => (
  <div className="empty">
    <div className="empty-icon">{icon}</div>
    <div>{text}</div>
  </div>
);

// ── Contract Form Block ───────────────────────────────────────
const PAYMENT_CYCLES  = ['月払', '年払', '一時払'];
const CURRENCIES      = ['円', 'ドル'];
const INS_CATEGORIES  = ['生保', '損保'];

// 金額入力ヘルパー
function AmountInput({ prefix, prefixColor, value, onChange, placeholder }) {
  return (
    <div style={{ position: 'relative' }}>
      <span style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', fontSize: 15, color: prefixColor || 'var(--text-sub)', fontWeight: 700, pointerEvents: 'none' }}>{prefix}</span>
      <input className="form-input" type="number" placeholder={placeholder} style={{ paddingLeft: 28 }} value={value} onChange={onChange} />
    </div>
  );
}

function ContractBlock({ contract, onChange, onRemove, index }) {
  const s  = k => e => onChange({ ...contract, [k]: e.target.value });
  const sv = k => v => onChange({ ...contract, [k]: v });
  const cat = contract.category || '生保';
  const cycle = contract.paymentCycle || '月払';
  const cur   = contract.currency || '円';

  return (
    <div className="contract-block" style={{ borderTop: `3px solid ${cat === '損保' ? '#F59E0B' : 'var(--accent)'}` }}>
      <div className="contract-block-title">
        <span>契約 {index + 1}</span>
        <button onClick={onRemove} style={{ background: 'none', border: 'none', color: 'var(--danger)', cursor: 'pointer', fontSize: 20, lineHeight: 1 }}>×</button>
      </div>

      {/* 生保 / 損保 切り替え */}
      <div className="form-group" style={{ marginBottom: 10 }}>
        <label className="form-label">保険区分</label>
        <div className="toggle-group">
          {INS_CATEGORIES.map(c => (
            <button key={c} type="button"
              className={`toggle-btn ${cat === c ? 'sel' : ''}`}
              style={cat === c ? { borderColor: c === '損保' ? '#F59E0B' : 'var(--accent)', background: c === '損保' ? '#FFFBEB' : 'var(--accent-light)', color: c === '損保' ? '#D97706' : 'var(--accent)' } : {}}
              onClick={() => sv('category')(c)}>{c}</button>
          ))}
        </div>
      </div>

      {/* 共通：種類・会社・証券番号 */}
      <div className="form-row" style={{ marginBottom: 8 }}>
        <div>
          <label className="form-label">保険種類</label>
          <input className="form-input" placeholder={cat === '損保' ? '例：自動車保険' : '例：生命保険'} value={contract.type || ''} onChange={s('type')} />
        </div>
        <div>
          <label className="form-label">保険会社</label>
          <input className="form-input" placeholder={cat === '損保' ? '例：〇〇損保' : '例：〇〇生命'} value={contract.company || ''} onChange={s('company')} />
        </div>
      </div>
      <div className="form-group" style={{ marginBottom: 8 }}>
        <label className="form-label">証券番号</label>
        <input className="form-input" placeholder="例：AB-1234567" value={contract.policyNum || ''} onChange={s('policyNum')} />
      </div>

      {/* 被保険者（契約者と異なる場合） */}
      <div style={{ background: 'var(--bg)', borderRadius: 10, padding: '10px 12px', marginBottom: 8 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--text-sub)', marginBottom: 8 }}>被保険者（契約者と異なる場合）</div>
        <div className="form-row">
          <div>
            <label className="form-label">被保険者名</label>
            <input className="form-input" placeholder="例：山田 花子" value={contract.insuredName || ''} onChange={s('insuredName')} />
          </div>
          <div>
            <label className="form-label">被保険者 生年月日</label>
            <input className="form-input" type="date" value={contract.insuredBirthdate || ''} onChange={s('insuredBirthdate')} />
          </div>
        </div>
      </div>

      {cat === '損保' ? (
        // ── 損保フィールド ──────────────────────────────
        <>
          <div className="form-group" style={{ marginBottom: 8 }}>
            <label className="form-label">保険対象</label>
            <input className="form-input" placeholder="例：車両（品川500 あ 1234）・自宅（大阪市北区〇〇）" value={contract.insuredObject || ''} onChange={s('insuredObject')} />
          </div>
          <div className="form-row" style={{ marginBottom: 8 }}>
            <div>
              <label className="form-label">契約日</label>
              <input className="form-input" type="date" value={contract.date || ''} onChange={s('date')} />
            </div>
            <div>
              <label className="form-label">満期日・更新日 🔔</label>
              <div style={{ position: 'relative' }}>
                <input className="form-input" type="date" value={contract.expiryDate || ''} onChange={s('expiryDate')}
                  style={{ paddingRight: contract.expiryDate ? 44 : 14 }} />
                {contract.expiryDate && (
                  <button type="button" onClick={() => onChange({ ...contract, expiryDate: '' })}
                    style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)',
                      background: '#C7C7CC', border: 'none', borderRadius: '50%',
                      width: 22, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center',
                      cursor: 'pointer', color: '#fff', fontSize: 13, fontWeight: 700, lineHeight: 1 }}>×</button>
                )}
              </div>
            </div>
          </div>

// ── 年齢自動計算（生年月日→今日時点の満年齢）────────────────
const calcAge = birthdate => {
  if (!birthdate) return null;
  const [y, m, d] = birthdate.split('-').map(Number);
  const today = new Date();
  let age = today.getFullYear() - y;
  if (today.getMonth() + 1 < m || (today.getMonth() + 1 === m && today.getDate() < d)) age--;
  return age;
};

          ＋ サスペクトを追加
        </button>

        {/* 紹介管理 */}
        <div className="section-header">紹介管理</div>
        <div className="card">
          <CustomerSelect
            label="紹介元（誰から紹介されたか）"
            value={form.referredBy}
            onChange={v => s('referredBy')(v)}
            customers={otherCustomers}
          />
          <div style={{ marginTop: 14 }}>
            <CustomerSelect
              label="紹介先（この顧客が紹介した人）"
              value={form.referredTo}
              onChange={v => s('referredTo')(v)}
              customers={otherCustomers}
            />
          </div>
        </div>

        <button className="btn btn-primary btn-full" style={{ marginTop: 8 }} onClick={save}>保存する</button>
      </div>
    </div>
  );
}

// ── Searchable Customer Select ────────────────────────────────
function CustomerSelect({ label, value, onChange, customers }) {
  const [query, setQuery] = useState('');
  const [open, setOpen] = useState(false);
  const selected = customers.find(c => c.id === value);

  const filtered = customers.filter(c =>
    !query || c.name.includes(query) || (c.phone || '').includes(query)
  );

  return (
    <div className="form-group" style={{ marginBottom: 0, position: 'relative' }}>
      <label className="form-label">{label}</label>
      {/* 選択済み表示 or 検索入力 */}
      {!open ? (
        <button type="button" onClick={() => { setOpen(true); setQuery(''); }}
          style={{ width: '100%', padding: '13px 14px', borderRadius: 12,
            border: '1.5px solid var(--border)', background: 'var(--bg)',
            fontSize: 16, textAlign: 'left', cursor: 'pointer', color: value ? 'var(--text)' : 'var(--text-sub)',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between', minHeight: 48 }}>
          <span>{selected ? selected.name : '— なし —'}</span>
          <span style={{ color: 'var(--text-sub)', fontSize: 13 }}>▼</span>
        </button>
      ) : (
        <div>
          <div style={{ position: 'relative' }}>
            <input autoFocus className="form-input"
              placeholder="名前で検索..." value={query}
              onChange={e => setQuery(e.target.value)}
              style={{ borderColor: 'var(--accent)', borderRadius: '12px 12px 0 0', marginBottom: 0 }} />
            {query && (
              <button type="button" onClick={() => setQuery('')}
                style={{ position: 'absolute', right: 12, top: '50%', transform: 'translateY(-50%)',
                  background: '#C7C7CC', border: 'none', borderRadius: '50%',
                  width: 20, height: 20, color: '#fff', fontSize: 13, cursor: 'pointer',
                  display: 'flex', alignItems: 'center', justifyContent: 'center' }}>×</button>
            )}
          </div>
          <div style={{ border: '1.5px solid var(--accent)', borderTop: 'none',
            borderRadius: '0 0 12px 12px', background: '#fff',
            maxHeight: 220, overflowY: 'auto', zIndex: 100 }}>
            {/* なし */}
            <button type="button" onClick={() => { onChange(''); setOpen(false); }}
              style={{ display: 'block', width: '100%', padding: '12px 16px', border: 'none',
                background: !value ? 'var(--accent-light)' : '#fff',
                color: !value ? 'var(--accent)' : 'var(--text-sub)',
                fontWeight: !value ? 700 : 400, fontSize: 15, textAlign: 'left', cursor: 'pointer',
                borderBottom: '1px solid var(--border)' }}>
              — なし —
            </button>
            {filtered.length === 0 && (
              <div style={{ padding: '12px 16px', color: 'var(--text-sub)', fontSize: 14 }}>該当なし</div>
            )}
            {filtered.map(c => (
              <button key={c.id} type="button" onClick={() => { onChange(c.id); setOpen(false); }}
                style={{ display: 'block', width: '100%', padding: '12px 16px', border: 'none',
                  background: value === c.id ? 'var(--accent-light)' : '#fff',
                  color: value === c.id ? 'var(--accent)' : 'var(--text)',
                  fontWeight: value === c.id ? 700 : 500, fontSize: 15,
                  textAlign: 'left', cursor: 'pointer', borderBottom: '1px solid var(--border)' }}>
                {c.name}
                {c.age && <span style={{ fontSize: 12, color: 'var(--text-sub)', marginLeft: 6 }}>{c.age}歳</span>}
              </button>
            ))}
          </div>
          {/* 外タップで閉じる */}
          <div style={{ position: 'fixed', inset: 0, zIndex: 99 }} onClick={() => setOpen(false)} />
        </div>
      )}
    </div>
  );
}

// ── Customer Detail Screen ────────────────────────────────────

  const c = customer;
  const referredByCustomer = customers.find(x => x.id === c.referredBy);

  return (
    <div className="full-screen">
      <div className="full-header">
        <button onClick={onClose} style={{
          background: 'none', border: 'none', cursor: 'pointer',
          fontSize: 15, color: 'var(--text-sub)', fontWeight: 600, padding: '4px 8px',
        }}>← 戻る</button>
        <div style={{ flex: 1 }} />
        <button className="btn btn-primary btn-sm" onClick={onEdit}>編集</button>

      <div className="full-content">
        {/* 顧客ヘッダー */}
        <div className="card" style={{ marginBottom: 10 }}>
          {/* 名前 + 年齢 横並び */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
            <div>
              {c.customerType === '法人' && (
                <div style={{ fontSize: 11, fontWeight: 700, color: '#D97706', background: '#FFFBEB', borderRadius: 6, padding: '2px 8px', display: 'inline-block', marginBottom: 4 }}>🏢 法人</div>
              )}
              <div style={{ fontSize: 24, fontWeight: 800, letterSpacing: -0.5 }}>
                {c.customerType === '法人' ? (c.corporateName || c.name) : c.name}
              </div>
              {c.customerType === '法人' && c.name && (
                <div style={{ fontSize: 13, color: 'var(--text-sub)', marginTop: 2 }}>担当：{c.name}</div>
              )}
            </div>
            {c.customerType !== '法人' && c.age && (
              <div style={{ textAlign: 'center', background: 'var(--accent-light)', borderRadius: 12, padding: '6px 14px', flexShrink: 0, marginLeft: 10 }}>
                <div style={{ fontSize: 24, fontWeight: 800, color: 'var(--accent)', lineHeight: 1 }}>{c.age}</div>
                <div style={{ fontSize: 11, color: 'var(--accent)', fontWeight: 700 }}>歳</div>
              </div>
            )}
          </div>
          {/* バッジ行 – 横並び固定 */}
          <div style={{ display: 'flex', gap: 6, marginBottom: 12, flexWrap: 'nowrap' }}>
            <StatusBadge status={c.status} />
            {c.gender && (
              <span className="badge" style={{ background: c.gender === '男性' ? '#EFF6FF' : c.gender === '女性' ? '#FDF2F8' : '#F3F4F6', color: c.gender === '男性' ? '#2563EB' : c.gender === '女性' ? '#DB2777' : '#6B7280', whiteSpace: 'nowrap' }}>
                {c.gender}
              </span>
            )}
            <span className={`badge ${c.lineRegistered ? 'badge-line' : 'badge-noline'}`} style={{ whiteSpace: 'nowrap' }}>
              {c.lineRegistered ? '✓ LINE済' : 'LINE未登録'}
            </span>
          </div>
          {/* 法人専用情報 */}
          {c.customerType === '法人' && (c.representative || c.industry || c.employeeCount) && (
            <div className="customer-info-row" style={{ marginBottom: 10 }}>
              {c.representative && <div className="info-item"><div className="info-label">代表者</div><div className="info-value">{c.representative}</div></div>}
              {c.industry && <div className="info-item"><div className="info-label">業種</div><div className="info-value">{c.industry}</div></div>}
              {c.employeeCount && <div className="info-item"><div className="info-label">従業員数</div><div className="info-value">{c.employeeCount}名</div></div>}
            </div>
          )}
          {/* 連絡先・属性情報 */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {c.phone && (
              <a href={`tel:${c.phone}`} style={{ display: 'flex', alignItems: 'center', gap: 10, textDecoration: 'none', color: 'var(--text)', background: 'var(--bg)', borderRadius: 10, padding: '10px 12px' }}>
                <span style={{ fontSize: 17 }}>📞</span>
                <span style={{ fontSize: 16, fontWeight: 700 }}>{c.phone}</span>
              </a>
            )}
            {c.email && (
              <a href={`mailto:${c.email}`} style={{ display: 'flex', alignItems: 'center', gap: 10, textDecoration: 'none', color: 'var(--text)', background: 'var(--bg)', borderRadius: 10, padding: '10px 12px' }}>
                <span style={{ fontSize: 17 }}>✉️</span>
                <span style={{ fontSize: 15, fontWeight: 600 }}>{c.email}</span>
              </a>
            )}
            {c.birthdate && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, background: 'var(--bg)', borderRadius: 10, padding: '10px 12px' }}>
                <span style={{ fontSize: 17 }}>🎂</span>
                <span style={{ fontSize: 15, fontWeight: 600, whiteSpace: 'nowrap' }}>{fmtDateFull(c.birthdate)}</span>
              </div>
            )}
            {(c.postalCode || c.address) && (
              <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10, background: 'var(--bg)', borderRadius: 10, padding: '10px 12px' }}>
                <span style={{ fontSize: 17, flexShrink: 0 }}>📍</span>
                <span style={{ fontSize: 15, color: 'var(--text)', lineHeight: 1.5 }}>
                  {c.postalCode && <span style={{ color: 'var(--text-sub)', fontSize: 13 }}>〒{c.postalCode}　</span>}
                  {c.address}
                </span>
              </div>
            )}
            {(c.occupation || c.workplace) && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, background: 'var(--bg)', borderRadius: 10, padding: '10px 12px' }}>
                <span style={{ fontSize: 17 }}>💼</span>
                <span style={{ fontSize: 15, fontWeight: 600 }}>
                  {[c.occupation, c.workplace].filter(Boolean).join('　')}
                </span>
              </div>
            )}
          </div>
        </div>

        {/* 接触情報 */}
        <div className="section-header">接触管理</div>
        <div className="card">
          <div className="customer-info-row">
            <div className="info-item">
              <div className="info-label">接触方法</div>
              <div className="info-value">{c.contactMethod || '—'}</div>
            </div>
            <div className="info-item">
              <div className="info-label">最終接触日</div>
              <div className="info-value">{c.lastContact ? fmtDate(c.lastContact) : '—'}</div>
            </div>
            <div className="info-item" style={{ gridColumn: '1 / -1' }}>
              <div className="info-label">次回アポイント</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <div className="info-value" style={{ color: apptDays !== null && apptDays <= 3 ? 'var(--danger)' : apptDays !== null && apptDays <= 7 ? 'var(--warning)' : 'var(--text)' }}>
                  {c.nextAppt ? fmtDateFull(c.nextAppt) : '—'}
                </div>
                {apptDays !== null && c.nextAppt && (
                  <span style={{
                    fontSize: 11, fontWeight: 700, padding: '2px 7px', borderRadius: 6,
                    background: apptDays <= 0 ? '#FEF2F2' : apptDays <= 3 ? '#FFF7ED' : 'var(--accent-light)',
                    color: apptDays <= 0 ? 'var(--danger)' : apptDays <= 3 ? 'var(--warning)' : 'var(--accent)',
                  }}>
                    {apptDays <= 0 ? '期限切れ' : `あと${apptDays}日`}
                  </span>
                )}
              </div>
            </div>
          </div>
          {c.memo && (
            <>
              <div className="divider" />
              <div className="info-label" style={{ marginBottom: 6 }}>面談メモ</div>
              <div style={{ fontSize: 14, lineHeight: 1.6, whiteSpace: 'pre-wrap', color: 'var(--text)' }}>{c.memo}</div>
            </>
          )}
        </div>

        {/* 契約情報 */}
        {c.contracts && c.contracts.length > 0 && (() => {
          // 保険料合計の計算
          let annualJpy = 0, annualUsd = 0, lumpJpy = 0, lumpUsd = 0;
          let recvJpy = 0, recvUsd = 0; // 定期支払金 年間合計
          (c.contracts || []).forEach(ct => {
            const amt  = Number(ct.premium)     || 0;
            const jpy  = Number(ct.premiumJpy)  || 0;
            const rate = Number(ct.exchangeRate)|| 0;
            const cur  = ct.currency || '円';
            const cyc  = ct.paymentCycle || '月払';
            const annualAmt = cyc === '年払' ? amt : cyc === '一時払' ? 0 : amt * 12;
            const annualJpyAmt = cyc === '年払' ? jpy : cyc === '一時払' ? 0 : jpy * 12;
            if (cyc === '一時払') {
              if (cur === 'ドル') { lumpUsd += amt; lumpJpy += jpy || amt * rate; }
              else { lumpJpy += amt; }
            } else {
              if (cur === 'ドル') { annualUsd += annualAmt; annualJpy += annualJpyAmt || annualAmt * rate; }
              else { annualJpy += annualAmt; }
            }
            // 定期支払金
            if (ct.hasPeriodicPay && ct.periodicAmt) {
              const pa = Number(ct.periodicAmt) || 0;
              const pj = Number(ct.periodicAmtJpy) || 0;
              const freq = ct.periodicFreq || '毎年';
              const mul = freq === '毎月' ? 12 : freq === '半年ごと' ? 2 : 1;
              if (cur === 'ドル') { recvUsd += pa * mul; recvJpy += (pj || pa * rate) * mul; }
              else { recvJpy += pa * mul; }
            }
          });
          const hasAnnual = annualJpy > 0 || annualUsd > 0;
          const hasLump   = lumpJpy  > 0 || lumpUsd  > 0;
          const hasRecv   = recvJpy  > 0 || recvUsd  > 0;
          return (
            <>
              <div className="section-header">契約情報 ({c.contracts.length}件)</div>
              {/* 保険料合計サマリー */}
              {(hasAnnual || hasLump || hasRecv) && (
                <div className="card" style={{ marginBottom: 10, background: 'var(--accent-light)', border: '1.5px solid var(--accent)' }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--accent)', marginBottom: 8 }}>💰 保険料・受取金 合計</div>
                  {hasAnnual && (
                    <div style={{ marginBottom: hasLump ? 10 : 0 }}>
                      <div style={{ fontSize: 11, color: 'var(--accent)', fontWeight: 700, marginBottom: 4 }}>年間保険料（月払・年払）</div>
                      <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', alignItems: 'baseline' }}>
                        {annualJpy > 0 && <span style={{ fontSize: 22, fontWeight: 800, color: 'var(--text)' }}>¥{annualJpy.toLocaleString()}</span>}
                        {annualUsd > 0 && <span style={{ fontSize: 18, fontWeight: 800, color: '#059669' }}>${annualUsd.toLocaleString()}</span>}
                        <span style={{ fontSize: 12, color: 'var(--text-sub)' }}>/ 年</span>
                        {annualJpy > 0 && <span style={{ fontSize: 13, color: 'var(--text-sub)' }}>（月割 ¥{Math.round(annualJpy/12).toLocaleString()}）</span>}
                      </div>
                    </div>
                  )}
                  {hasLump && (
                    <div style={{ paddingTop: hasAnnual ? 10 : 0, borderTop: hasAnnual ? '1px solid rgba(91,91,214,0.2)' : 'none' }}>
                      <div style={{ fontSize: 11, color: '#7C3AED', fontWeight: 700, marginBottom: 4 }}>一時払（別途）</div>
                      <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', alignItems: 'baseline' }}>
                        {lumpJpy > 0 && <span style={{ fontSize: 22, fontWeight: 800, color: 'var(--text)' }}>¥{lumpJpy.toLocaleString()}</span>}
                        {lumpUsd > 0 && <span style={{ fontSize: 18, fontWeight: 800, color: '#059669' }}>${lumpUsd.toLocaleString()}</span>}
                      </div>
                    </div>
                  )}
                  {hasRecv && (
                    <div style={{ paddingTop: 10, borderTop: '1px solid rgba(91,91,214,0.2)' }}>
                      <div style={{ fontSize: 11, color: '#15803D', fontWeight: 700, marginBottom: 4 }}>💚 定期支払金 年間受取合計</div>
                      <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', alignItems: 'baseline' }}>
                        {recvJpy > 0 && <span style={{ fontSize: 22, fontWeight: 800, color: '#15803D' }}>¥{recvJpy.toLocaleString()}</span>}
                        {recvUsd > 0 && <span style={{ fontSize: 18, fontWeight: 800, color: '#059669' }}>${recvUsd.toLocaleString()}</span>}
                        <span style={{ fontSize: 12, color: 'var(--text-sub)' }}>/ 年</span>
                      </div>
                    </div>
                  )}
                </div>
              )}
            {c.contracts.map((ct, i) => {
              const isSonpo = ct.category === '損保';
              const expiryDays = daysUntil(ct.expiryDate);
              return (
              <div className="card" key={ct.id} style={{ marginBottom: 8, borderTop: `3px solid ${isSonpo ? '#F59E0B' : 'var(--accent)'}` }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
                  <span style={{ fontSize: 14, fontWeight: 700, color: isSonpo ? '#D97706' : 'var(--accent)' }}>契約 {i + 1}</span>
                  <span style={{ fontSize: 11, fontWeight: 700, padding: '2px 8px', borderRadius: 6, background: isSonpo ? '#FFFBEB' : 'var(--accent-light)', color: isSonpo ? '#D97706' : 'var(--accent)' }}>
                    {isSonpo ? '損保' : '生保'}
                  </span>
                </div>
                <div className="customer-info-row">
                  <div className="info-item"><div className="info-label">保険種類</div><div className="info-value">{ct.type || '—'}</div></div>
                  <div className="info-item"><div className="info-label">保険会社</div><div className="info-value">{ct.company || '—'}</div></div>
                  {ct.policyNum && <div className="info-item" style={{gridColumn:'1/-1'}}><div className="info-label">証券番号</div><div className="info-value" style={{fontSize:15,letterSpacing:0.5}}>{ct.policyNum}</div></div>}

                  {/* 被保険者 */}
                  {ct.insuredName && <div className="info-item"><div className="info-label">被保険者</div><div className="info-value">{ct.insuredName}</div></div>}
                  {ct.insuredBirthdate && <div className="info-item"><div className="info-label">被保険者 生年月日</div><div className="info-value">{fmtDateFull(ct.insuredBirthdate)}</div></div>}

                  {/* 保険期間（生保） */}
                  {!isSonpo && (ct.termNote || ct.termEnd) && (
                    <div className="info-item" style={{gridColumn:'1/-1'}}>
                      <div className="info-label">保険期間</div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                        {ct.termNote && <span className="info-value">{ct.termNote}</span>}
                        {ct.termEnd && (
                          <>
                            {ct.termNote && <span style={{color:'var(--text-sub)'}}>／</span>}
                            <span className="info-value">{fmtDateFull(ct.termEnd)} まで</span>
                            {daysUntil(ct.termEnd) !== null && (
                              <span style={{ fontSize: 11, fontWeight: 700, padding: '2px 7px', borderRadius: 6,
                                background: daysUntil(ct.termEnd) <= 0 ? '#FEF2F2' : daysUntil(ct.termEnd) <= 365 ? '#FFF7ED' : 'var(--bg)',
                                color: daysUntil(ct.termEnd) <= 0 ? 'var(--danger)' : daysUntil(ct.termEnd) <= 365 ? 'var(--warning)' : 'var(--text-sub)' }}>
                                {daysUntil(ct.termEnd) <= 0 ? '期間終了' : `あと${Math.ceil(daysUntil(ct.termEnd)/365)}年`}
                              </span>
                            )}
                          </>
                        )}
                      </div>
                    </div>
                  )}

                  {/* 損保専用フィールド */}
                  {isSonpo && ct.insuredObject && (
                    <div className="info-item" style={{gridColumn:'1/-1'}}><div className="info-label">保険対象</div><div className="info-value">{ct.insuredObject}</div></div>
                  )}
                  {isSonpo && ct.expiryDate && (
                    <div className="info-item" style={{gridColumn:'1/-1'}}>
                      <div className="info-label">満期日・更新日</div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <div className="info-value" style={{ color: expiryDays !== null && expiryDays <= 30 ? 'var(--danger)' : expiryDays !== null && expiryDays <= 60 ? 'var(--warning)' : 'var(--text)' }}>
                          {fmtDateFull(ct.expiryDate)}
                        </div>
                        {expiryDays !== null && (
                          <span style={{ fontSize: 11, fontWeight: 700, padding: '2px 7px', borderRadius: 6,
                            background: expiryDays <= 0 ? '#FEF2F2' : expiryDays <= 30 ? '#FFF7ED' : '#F3F4F6',
                            color: expiryDays <= 0 ? 'var(--danger)' : expiryDays <= 30 ? 'var(--warning)' : 'var(--text-sub)' }}>
                            {expiryDays <= 0 ? '満期切れ' : `あと${expiryDays}日`}
                          </span>
                        )}
                      </div>
                    </div>
                  )}
                  {isSonpo && ct.coverage && (
                    <div className="info-item" style={{gridColumn:'1/-1'}}><div className="info-label">補償内容</div><div style={{fontSize:13,lineHeight:1.5,whiteSpace:'pre-wrap'}}>{ct.coverage}</div></div>
                  )}

                  {/* 保険料 */}
                  {ct.premium && (ct.currency || '円') === 'ドル' ? (
                    <div className="info-item" style={{ gridColumn: '1/-1' }}>
                      <div className="info-label" style={{ marginBottom: 6 }}>保険料（{ct.paymentCycle || '月払'}・ドル建）</div>
                      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center' }}>
                        <span style={{ fontSize: 17, fontWeight: 800, color: '#059669' }}>${Number(ct.premium).toLocaleString()}</span>
                        {ct.premiumJpy && (<><span style={{ color: 'var(--text-sub)', fontSize: 14 }}>＝</span><span style={{ fontSize: 17, fontWeight: 800 }}>¥{Number(ct.premiumJpy).toLocaleString()}</span></>)}
                        {ct.exchangeRate && <span style={{ fontSize: 12, color: 'var(--text-sub)', background: 'var(--bg)', borderRadius: 6, padding: '2px 8px' }}>1$=¥{ct.exchangeRate}</span>}
                      </div>
                    </div>
                  ) : ct.premium ? (
                    <div className="info-item">
                      <div className="info-label">{ct.paymentCycle === '一時払' ? '一時払込額' : ct.paymentCycle === '年払' ? '年間保険料' : '月額保険料'}</div>
                      <div className="info-value">¥{Number(ct.premium).toLocaleString()}
                        {ct.paymentCycle && ct.paymentCycle !== '月払' && <span style={{ fontSize: 11, color: 'var(--accent)', background: 'var(--accent-light)', borderRadius: 5, padding: '1px 6px', marginLeft: 5 }}>{ct.paymentCycle}</span>}
                      </div>
                    </div>
                  ) : null}
                  {ct.date && <div className="info-item"><div className="info-label">契約日</div><div className="info-value">{fmtDateFull(ct.date)}</div></div>}

                  {/* 定期支払金 */}
                  {ct.hasPeriodicPay && ct.periodicAmt && (
                    <div className="info-item" style={{ gridColumn:'1/-1', background:'#F0FDF4', border:'1px solid #BBF7D0' }}>
                      <div className="info-label" style={{ color:'#15803D' }}>💚 定期支払金（{ct.periodicFreq || '毎年'}受取）</div>
                      <div style={{ display:'flex', gap:8, flexWrap:'wrap', alignItems:'baseline', marginTop:4 }}>
                        <span style={{ fontSize:18, fontWeight:800, color:'#15803D' }}>
                          {(ct.currency||'円')==='ドル' ? '$' : '¥'}{Number(ct.periodicAmt).toLocaleString()}
                        </span>
                        {ct.periodicAmtJpy && <><span style={{color:'var(--text-sub)'}}>≒</span><span style={{fontSize:16,fontWeight:700}}>¥{Number(ct.periodicAmtJpy).toLocaleString()}</span></>}
                        {ct.periodicStart && <span style={{fontSize:12,color:'var(--text-sub)'}}>開始：{fmtDateFull(ct.periodicStart)}</span>}
                      </div>
                    </div>
                  )}
                </div>
              </div>
              );
            })}
            </>
          );
        })()}

        {/* サスペクト */}
        {c.suspects && c.suspects.length > 0 && (
          <>
            <div className="section-header">👥 サスペクト（{c.suspects.length}人）</div>
            {c.suspects.map(sp => (
              <div key={sp.id} className="card" style={{ marginBottom: 8, padding: '12px 14px' }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: sp.memo ? 8 : 0 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <span style={{ fontSize: 20 }}>👤</span>
                    <div>
                      <div style={{ fontSize: 16, fontWeight: 700 }}>
                        {sp.name || '（名前未入力）'}
                        {/* 生年月日があれば自動計算、なければ手動年齢 */}
                        {sp.birthdate
                          ? <span style={{ fontSize: 13, color: 'var(--accent)', marginLeft: 6, fontWeight: 600 }}>{calcAge(sp.birthdate)}歳</span>
                          : sp.age
                          ? <span style={{ fontSize: 13, color: 'var(--text-sub)', marginLeft: 6 }}>{sp.age}歳</span>
                          : null
                        }
                      </div>
                      {sp.birthdate && (
                        <div style={{ fontSize: 12, color: 'var(--text-sub)' }}>🎂 {fmtDateFull(sp.birthdate)}</div>
                      )}
                      {sp.relation && (
                        <span style={{ fontSize: 12, fontWeight: 700, background: 'var(--accent-light)', color: 'var(--accent)', borderRadius: 6, padding: '1px 7px' }}>
                          {sp.relation}
                        </span>
                      )}
                    </div>
                  </div>
                  <button
                    className="btn btn-sm btn-primary"
                    style={{ fontSize: 12, padding: '6px 10px', whiteSpace: 'nowrap' }}
                    onClick={() => onRegisterSuspect(sp)}>
                    顧客登録 →
                  </button>
                </div>
                {sp.memo && (
                  <div style={{ fontSize: 13, color: 'var(--text-sub)', background: 'var(--bg)', borderRadius: 8, padding: '7px 10px', marginTop: 8, lineHeight: 1.5 }}>
                    {sp.memo}
                  </div>
                )}
              </div>
            ))}
          </>
        )}

        {/* 紹介管理 */}
        {(referredByCustomer || referredToCustomer) && (
          <>
            <div className="section-header">紹介ネットワーク</div>
            <div className="card">
              {referredByCustomer && (
                <div style={{ marginBottom: referredToCustomer ? 10 : 0 }}>
                  <div className="info-label">紹介元</div>
                  <div style={{ fontSize: 15, fontWeight: 700 }}>👤 {referredByCustomer.name}</div>
                </div>
              )}
              {referredToCustomer && (
                <div>
                  <div className="info-label">紹介先</div>
                  <div style={{ fontSize: 15, fontWeight: 700 }}>👤 {referredToCustomer.name}</div>
                </div>
              )}
            </div>
          </>
        )}
      </div>

      {/* 削除確認ダイアログ */}
      {confirmDel && (
        <div className="overlay" style={{ zIndex: 60 }} onClick={() => setConfirmDel(false)}>
          <div className="drawer" onClick={e => e.stopPropagation()}>
            <div className="drawer-handle" />
            <div className="drawer-title" style={{ color: 'var(--danger)' }}>顧客を削除しますか？</div>
            <div style={{ fontSize: 14, color: 'var(--text-sub)', marginBottom: 20 }}>
              「{c.name}」のデータをすべて削除します。この操作は元に戻せません。
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <button className="btn btn-outline btn-full" onClick={() => setConfirmDel(false)}>キャンセル</button>
              <button className="btn btn-danger btn-full" onClick={() => { onDelete(c.id); onClose(); }}>削除する</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Tab: Dashboard ────────────────────────────────────────────
function DashboardTab({ customers, onNavigate }) {
  const total = customers.length;
  const lineCount = customers.filter(c => c.lineRegistered).length;
  const thisMonth = thisMonthStr();
  // 今月の月番号（整数で比較してゼロ埋め問題を回避）
  const nowM = new Date().getMonth() + 1; // 1〜12の整数
  const apptThisMonth = customers.filter(c => c.nextAppt && c.nextAppt.startsWith(thisMonth)).length;
  const noContact = customers.filter(c => !c.status || c.status === '未接触').length;

  const today = todayStr();
  const upcoming = customers
    .filter(c => c.nextAppt && c.nextAppt >= today)
    .sort((a, b) => a.nextAppt.localeCompare(b.nextAppt))
    .slice(0, 5);

  // 今月誕生日（整数比較）
  const birthdayThisMonth = customers.filter(c => {
    if (!c.birthdate) return false;
    return parseInt(c.birthdate.split('-')[1], 10) === nowM;
  }).sort((a, b) => parseInt(a.birthdate.split('-')[2],10) - parseInt(b.birthdate.split('-')[2],10));

  // 月計算ヘルパー（1〜12の範囲で循環）
  const addMonth = (m, n) => ((m - 1 + n) % 12) + 1;
  const nextM1 = addMonth(nowM, 1); // 来月
  const nextM2 = addMonth(nowM, 2); // 再来月

  // 生保：今月・来月・再来月が契約月（2ヶ月前からアラート）
  const contractThisMonth = customers.filter(c =>
    (c.contracts || []).some(ct => {
      if (ct.category === '損保' || !ct.date) return false;
      const m = parseInt(ct.date.split('-')[1], 10);
      return m === nowM || m === nextM1 || m === nextM2;
    })
  );

  // 損保：今月・来月満期
  const nextM = nextM1;
  const expiryAlert = customers.filter(c =>
    (c.contracts || []).some(ct => {
      if (ct.category !== '損保' || !ct.expiryDate) return false;
      const m = parseInt(ct.expiryDate.split('-')[1], 10);
      return m === nowM || m === nextM;
    })
  );

  const statusCounts = STATUSES.map(s => ({
    ...s,
    count: customers.filter(c => (c.status || '未接触') === s.key).length,
  }));

  return (
    <div>
      <div className="stat-grid">
        <div className="stat-card">
          <div className="stat-num">{total}</div>
          <div className="stat-label">顧客総数</div>
        </div>
        <div className="stat-card">
          <div className="stat-num" style={{ color: '#16A34A' }}>{lineCount}</div>
          <div className="stat-label">LINE登録済み</div>
        </div>
        <div className="stat-card">
          <div className="stat-num" style={{ color: '#2563EB' }}>{apptThisMonth}</div>
          <div className="stat-label">今月のアポイント</div>
        </div>
        <div className="stat-card">
          <div className="stat-num" style={{ color: 'var(--warning)' }}>{noContact}</div>
          <div className="stat-label">未接触顧客</div>
        </div>
      </div>

      {/* 今月のアラート */}
      {(birthdayThisMonth.length > 0 || contractThisMonth.length > 0 || expiryAlert.length > 0) && (
        <div className="card" style={{ borderLeft: '4px solid var(--warning)', marginBottom: 10 }}>
          <div className="card-title" style={{ color: 'var(--warning)' }}>🔔 今月のアラート</div>

          {birthdayThisMonth.length > 0 && (
            <div style={{ marginBottom: contractThisMonth.length > 0 ? 14 : 0 }}>
              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 8, display: 'flex', alignItems: 'center', gap: 6 }}>
                <span>🎂</span>
                <span>今月誕生日</span>
                <span style={{ background: '#FEF3C7', color: '#D97706', borderRadius: 10, padding: '1px 8px', fontSize: 12 }}>
                  {birthdayThisMonth.length}人
                </span>
              </div>
              {birthdayThisMonth.map(c => (
                <div key={c.id} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '8px 10px', background: '#FFFBEB', borderRadius: 10, marginBottom: 6 }}
                  onClick={() => onNavigate('customers', c)}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <span style={{ fontSize: 20 }}>🎂</span>
                    <div>
                      <div style={{ fontSize: 15, fontWeight: 700 }}>{c.name}</div>
                      <div style={{ fontSize: 12, color: 'var(--text-sub)' }}>
                        {parseInt(c.birthdate.slice(5,7))}月{parseInt(c.birthdate.slice(8,10))}日
                        {c.age && ` · ${c.age}歳`}
                      </div>
                    </div>
                  </div>
                  <span style={{ fontSize: 12, color: 'var(--text-sub)' }}>›</span>
                </div>
              ))}
            </div>
          )}

          {expiryAlert.length > 0 && (
            <div style={{ marginBottom: contractThisMonth.length > 0 ? 14 : 0 }}>
              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 8, display: 'flex', alignItems: 'center', gap: 6 }}>
                <span>🚗</span>
                <span>損保 満期・更新（今月〜来月）</span>
                <span style={{ background: '#FEF3C7', color: '#D97706', borderRadius: 10, padding: '1px 8px', fontSize: 12 }}>
                  {expiryAlert.length}人
                </span>
              </div>
              {expiryAlert.map(c => {
                const expContracts = (c.contracts || []).filter(ct =>
                  ct.category === '損保' && ct.expiryDate &&
                  (parseInt(ct.expiryDate.split('-')[1], 10) === nowM || parseInt(ct.expiryDate.split('-')[1], 10) === nextM)
                );
                return (
                  <div key={c.id} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '8px 10px', background: '#FFFBEB', borderRadius: 10, marginBottom: 6 }}
                    onClick={() => onNavigate('customers', c)}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <span style={{ fontSize: 20 }}>🚗</span>
                      <div>
                        <div style={{ fontSize: 15, fontWeight: 700 }}>{c.name}</div>
                        <div style={{ fontSize: 12, color: 'var(--text-sub)' }}>
                          {expContracts.map(ct => `${ct.type || '損保'} 満期：${fmtDateFull(ct.expiryDate)}`).join(' / ')}
                        </div>
                      </div>
                    </div>
                    <span style={{ fontSize: 12, color: 'var(--text-sub)' }}>›</span>
                  </div>
                );
              })}
            </div>
          )}

          {contractThisMonth.length > 0 && (
            <div>
              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 8, display: 'flex', alignItems: 'center', gap: 6 }}>
                <span>📋</span>
                <span>今月契約月（生保）</span>
                <span style={{ background: '#EDE9FE', color: '#7C3AED', borderRadius: 10, padding: '1px 8px', fontSize: 12 }}>
                  {contractThisMonth.length}人
                </span>
              </div>
              {contractThisMonth.map(c => {
                const monthContracts = (c.contracts || []).filter(ct => {
                  if (ct.category === '損保' || !ct.date) return false;
                  const m = parseInt(ct.date.split('-')[1], 10);
                  return m === nowM || m === nextM1 || m === nextM2;
                });
                const getLabel = m => m === nowM ? '今月' : m === nextM1 ? '来月' : '再来月';
                return (
                  <div key={c.id} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '8px 10px', background: '#F5F3FF', borderRadius: 10, marginBottom: 6 }}
                    onClick={() => onNavigate('customers', c)}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <span style={{ fontSize: 20 }}>📋</span>
                      <div>
                        <div style={{ fontSize: 15, fontWeight: 700 }}>{c.name}</div>
                        <div style={{ fontSize: 12, color: 'var(--text-sub)' }}>
                          {monthContracts.map(ct => {
                            const m = parseInt(ct.date.split('-')[1], 10);
                            return `${getLabel(m)}契約月：${ct.type || '契約'}`;
                          }).join(' / ')}
                        </div>
                      </div>
                    </div>
                    <span style={{ fontSize: 12, color: 'var(--text-sub)' }}>›</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* ステータス内訳 */}
      <div className="card">
        <div className="card-title">ステータス内訳</div>
        {statusCounts.map(s => (
          <div key={s.key} style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
            <span className="status-badge" style={{ background: s.bg, color: s.color, minWidth: 72, justifyContent: 'center' }}>
              {s.key}
            </span>
            <div style={{ flex: 1, background: '#F0F0F5', borderRadius: 4, height: 8, overflow: 'hidden' }}>
              <div style={{
                height: '100%', borderRadius: 4,
                width: total > 0 ? `${(s.count / total * 100)}%` : '0%',
                background: s.color, transition: 'width 0.4s',
              }} />
            </div>
            <span style={{ fontSize: 14, fontWeight: 700, minWidth: 24, textAlign: 'right' }}>{s.count}</span>
          </div>
        ))}
      </div>

      {/* 直近アポイント */}
      <div className="card">
        <div className="card-title">直近のアポイント</div>
        {upcoming.length === 0
          ? <EmptyState icon="📅" text="予定されているアポイントはありません" />
          : upcoming.map(c => {
            const days = daysUntil(c.nextAppt);
            const urgent = days !== null && days <= 3;
            const [, m, d] = c.nextAppt.split('-');
            return (
              <div key={c.id} className="appt-item">
                <div className={`appt-date-box ${urgent ? 'urgent' : ''}`}>
                  <div className="appt-date-month">{parseInt(m)}月</div>
                  <div className="appt-date-day">{parseInt(d)}</div>
                </div>
                <div className="appt-body">
                  <div className="appt-name">{c.name}</div>
                  <div className="appt-sub">
                    <StatusBadge status={c.status} />
                    {days !== null && (
                      <span style={{ marginLeft: 6, fontSize: 11, color: urgent ? 'var(--danger)' : 'var(--text-sub)', fontWeight: 600 }}>
                        {days <= 0 ? '本日以前' : `あと${days}日`}
                      </span>
                    )}
                  </div>
                </div>
              </div>
            );
          })
        }
        {upcoming.length > 0 && (
          <button className="btn btn-outline btn-full" style={{ marginTop: 8, fontSize: 13 }}
            onClick={() => onNavigate('appt')}>アポイント一覧を見る</button>
        )}
      </div>
    </div>
  );
}

// ── Tab: Customer List ────────────────────────────────────────
const SORT_OPTIONS = [
  { key: 'newer',  label: '登録順（新しい）' },
  { key: 'older',  label: '登録順（古い）' },
  { key: 'name',   label: '名前順' },
  { key: 'appt',   label: '次回アポ順' },
  { key: 'status', label: 'ステータス順' },
];

function CustomerListTab({ customers, onSelect, onAdd }) {
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('すべて');
  const [lineFilter, setLineFilter] = useState('すべて');
  const [sortKey, setSortKey] = useState('newer');
  const [showSort, setShowSort] = useState(false);

  const filtered = useMemo(() => {
    const list = customers
      .filter(c => statusFilter === 'すべて' || (c.status || '未接触') === statusFilter)
      .filter(c => lineFilter === 'すべて' || (lineFilter === 'LINE登録' ? c.lineRegistered : !c.lineRegistered))
      .filter(c => {
        if (!search) return true;
        const q = search.toLowerCase();
        return c.name.includes(search) ||
          (c.phone || '').includes(q) ||
          (c.memo || '').includes(search) ||
          (c.email || '').toLowerCase().includes(q);
      });

    const STATUS_ORDER = ['未接触', 'アポ済', '面談済', 'フォロー中'];
    list.sort((a, b) => {
      switch (sortKey) {
        case 'newer':  return customers.indexOf(b) - customers.indexOf(a);
        case 'older':  return customers.indexOf(a) - customers.indexOf(b);
        case 'name':   return (a.name || '').localeCompare(b.name || '', 'ja');
        case 'appt': {
          if (!a.nextAppt && !b.nextAppt) return 0;
          if (!a.nextAppt) return 1;
          if (!b.nextAppt) return -1;
          return a.nextAppt.localeCompare(b.nextAppt);
        }
        case 'status': return STATUS_ORDER.indexOf(a.status || '未接触') - STATUS_ORDER.indexOf(b.status || '未接触');
        default: return 0;
      }
    });
    return list;
  }, [customers, search, statusFilter, lineFilter, sortKey]);

  return (
    <div>
      <div style={{ position: 'sticky', top: 0, background: 'var(--bg)', zIndex: 5, paddingBottom: 4 }}>
        <div className="search-wrap">
          <span>🔍</span>
          <input
            className="search-input"
            placeholder="名前・電話番号・メモで検索..."
            value={search}
            onChange={e => setSearch(e.target.value)}
          />
          {search && <button className="search-clear" onClick={() => setSearch('')}>×</button>}
        </div>
        <div className="filter-chips">
          {['すべて', ...STATUSES.map(s => s.key)].map(st => (
            <button key={st} className={`chip ${statusFilter === st ? 'active' : ''}`}
              onClick={() => setStatusFilter(st)}>
              {st}
              <span style={{ marginLeft: 4, fontSize: 10 }}>
                {st === 'すべて' ? customers.length : customers.filter(c => (c.status || '未接触') === st).length}
              </span>
            </button>
          ))}
        </div>
        <div className="filter-chips" style={{ marginBottom: 6 }}>
          {['すべて', 'LINE登録', 'LINE未登録'].map(f => (
            <button key={f} className={`chip ${lineFilter === f ? 'active' : ''}`}
              onClick={() => setLineFilter(f)}>{f}</button>
          ))}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
          <div style={{ fontSize: 12, color: 'var(--text-sub)' }}>
            {filtered.length}件{search || statusFilter !== 'すべて' || lineFilter !== 'すべて' ? ` / 全${customers.length}件` : ''}
          </div>
          <div style={{ position: 'relative' }}>
            <button onClick={() => setShowSort(v => !v)}
              style={{ fontSize: 12, padding: '4px 10px', borderRadius: 8, border: '1.5px solid var(--border)',
                background: '#fff', color: 'var(--text-sub)', cursor: 'pointer', fontWeight: 600,
                display: 'flex', alignItems: 'center', gap: 4 }}>
              ↕ {SORT_OPTIONS.find(o => o.key === sortKey)?.label}
            </button>
            {showSort && (
              <div style={{ position: 'absolute', right: 0, top: '110%', background: '#fff', borderRadius: 12,
                boxShadow: '0 4px 20px rgba(0,0,0,0.15)', zIndex: 20, overflow: 'hidden', minWidth: 160 }}>
                {SORT_OPTIONS.map(o => (
                  <button key={o.key} onClick={() => { setSortKey(o.key); setShowSort(false); }}
                    style={{ display: 'block', width: '100%', padding: '12px 16px', border: 'none',
                      background: sortKey === o.key ? 'var(--accent-light)' : '#fff',
                      color: sortKey === o.key ? 'var(--accent)' : 'var(--text)',
                      fontWeight: sortKey === o.key ? 700 : 500, fontSize: 14,
                      textAlign: 'left', cursor: 'pointer' }}>
                    {sortKey === o.key ? '✓ ' : '　'}{o.label}
                  </button>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>

      {filtered.length === 0
        ? <EmptyState icon="👤" text={customers.length === 0 ? '顧客を追加してください' : '該当する顧客はいません'} />
        : filtered.map(c => {
          const apptDays = daysUntil(c.nextAppt);
          const nowM2 = new Date().getMonth() + 1;
          const nM1 = ((nowM2 - 1 + 1) % 12) + 1;
          const nM2 = ((nowM2 - 1 + 2) % 12) + 1;
          const isBirthMonth = c.birthdate && parseInt(c.birthdate.split('-')[1], 10) === nowM2;
          const isContractMonth = (c.contracts || []).some(ct => {
            if (ct.category === '損保' || !ct.date) return false;
            const m = parseInt(ct.date.split('-')[1], 10);
            return m === nowM2 || m === nM1 || m === nM2;
          });
          return (
            <div key={c.id} className="customer-card" onClick={() => onSelect(c)}
              style={ (isBirthMonth || isContractMonth) ? { borderLeft: '3px solid var(--warning)' } : {} }>
              <div className="customer-card-top">
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, minWidth: 0, flexWrap: 'wrap' }}>
                  {c.customerType === '法人' && (
                    <span style={{ fontSize: 11, fontWeight: 700, color: '#D97706', background: '#FFFBEB', borderRadius: 5, padding: '1px 6px' }}>🏢</span>
                  )}
                  <div className="customer-name">{c.customerType === '法人' ? (c.corporateName || c.name) : c.name}</div>
                  {c.customerType !== '法人' && c.age && <div style={{ fontSize: 12, color: 'var(--text-sub)', fontWeight: 500 }}>{c.age}歳</div>}
                  {c.gender && <div style={{ fontSize: 11, color: c.gender === '男性' ? '#2563EB' : '#DB2777', fontWeight: 600 }}>{c.gender}</div>}
                  {isBirthMonth && <span style={{ fontSize: 13 }}>🎂</span>}
                  {isContractMonth && <span style={{ fontSize: 13 }}>📋🔔</span>}
                </div>
                <div style={{ display: 'flex', gap: 5, flexShrink: 0 }}>
                  <StatusBadge status={c.status} />
                </div>
              </div>
              <div className="customer-meta">
                <span className={`badge ${c.lineRegistered ? 'badge-line' : 'badge-noline'}`}>
                  {c.lineRegistered ? '✓ LINE' : 'LINE未'}
                </span>
                {c.contracts && c.contracts.length > 0 && (
                  <span className="badge" style={{ background: '#F5F3FF', color: '#7C3AED' }}>
                    📋 {c.contracts.length}件
                  </span>
                )}
                {c.contactMethod && (
                  <span className="badge" style={{ background: 'var(--bg)', color: 'var(--text-sub)' }}>
                    {c.contactMethod}
                  </span>
                )}
              </div>
              {c.nextAppt && (
                <div className="customer-info-row">
                  <div className="info-item">
                    <div className="info-label">次回アポイント</div>
                    <div className="info-value" style={{
                      color: apptDays !== null && apptDays <= 3 ? 'var(--danger)' : apptDays !== null && apptDays <= 7 ? 'var(--warning)' : 'var(--text)',
                    }}>
                      {fmtDate(c.nextAppt)}
                      {apptDays !== null && (
                        <span style={{ marginLeft: 4, fontSize: 11, fontWeight: 600 }}>
                          ({apptDays <= 0 ? '期限切れ' : `あと${apptDays}日`})
                        </span>
                      )}
                    </div>
                  </div>
                  {c.lastContact && (
                    <div className="info-item">
                      <div className="info-label">最終接触</div>
                      <div className="info-value">{fmtDate(c.lastContact)}</div>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })
      }
    </div>
  );
}

// ── Tab: Appointments ─────────────────────────────────────────
function AppointmentTab({ customers, onSelect }) {
  const today = todayStr();
  const [showPast, setShowPast] = useState(false);

  const withAppt = customers
    .filter(c => c.nextAppt)
    .sort((a, b) => a.nextAppt.localeCompare(b.nextAppt));

  const upcoming = withAppt.filter(c => c.nextAppt >= today);
  const past = withAppt.filter(c => c.nextAppt < today);

  const ApptCard = ({ c }) => {
    const days = daysUntil(c.nextAppt);
    const [, m, d] = c.nextAppt.split('-');
    const urgent = days !== null && days <= 3;
    const overdue = days !== null && days < 0;
    return (
      <div className="customer-card" onClick={() => onSelect(c)}
        style={overdue ? { borderColor: '#FECACA', background: '#FEF2F2' } : urgent ? { borderColor: '#FDE68A', background: '#FFFBEB' } : {}}>
        <div style={{ display: 'flex', gap: 12, alignItems: 'flex-start' }}>
          <div className={`appt-date-box ${overdue ? 'urgent' : ''}`}
            style={urgent && !overdue ? { background: '#FFFBEB' } : {}}>
            <div className="appt-date-month" style={urgent && !overdue ? { color: 'var(--warning)' } : {}}>{parseInt(m)}月</div>
            <div className="appt-date-day" style={urgent && !overdue ? { color: 'var(--warning)' } : {}}>{parseInt(d)}</div>
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 4 }}>{c.name}</div>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', alignItems: 'center' }}>
              <StatusBadge status={c.status} />
              {days !== null && (
                <span style={{
                  fontSize: 11, fontWeight: 700, padding: '2px 7px', borderRadius: 6,
                  background: overdue ? '#FEF2F2' : urgent ? '#FFFBEB' : 'var(--accent-light)',
                  color: overdue ? 'var(--danger)' : urgent ? 'var(--warning)' : 'var(--accent)',
                }}>
                  {days === 0 ? '今日！' : days < 0 ? `${Math.abs(days)}日前` : `あと${days}日`}
                </span>
              )}
              {c.contactMethod && (
                <span style={{ fontSize: 11, color: 'var(--text-sub)' }}>{c.contactMethod}</span>
              )}
            </div>
            {c.memo && (
              <div style={{ fontSize: 12, color: 'var(--text-sub)', marginTop: 4, overflow: 'hidden', display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical' }}>
                {c.memo}
              </div>
            )}
          </div>
        </div>
      </div>
    );
  };

  return (
    <div>
      <div className="section-title">アポイント管理</div>

      {upcoming.length === 0 && past.length === 0 ? (
        <EmptyState icon="📅" text="アポイントが登録されている顧客はいません" />
      ) : (
        <>
          {upcoming.length > 0 ? (
            <>
              <div className="section-header">今後のアポイント ({upcoming.length}件)</div>
              {upcoming.map(c => <ApptCard key={c.id} c={c} />)}
            </>
          ) : (
            <EmptyState icon="✅" text="今後のアポイントはありません" />
          )}

          {past.length > 0 && (
            <>
              <button
                onClick={() => setShowPast(v => !v)}
                className="btn btn-outline btn-full"
                style={{ marginTop: 8, fontSize: 13 }}>
                {showPast ? '▲ 過去のアポイントを隠す' : `▼ 過去のアポイントを表示 (${past.length}件)`}
              </button>
              {showPast && past.map(c => <ApptCard key={c.id} c={c} />)}
            </>
          )}
        </>
      )}
    </div>
  );
}

// ── CSV Export ────────────────────────────────────────────────
function exportCSV(customers) {
  const headers = ['氏名', '年齢', '生年月日', '電話番号', 'メールアドレス', '郵便番号', '住所', '職業', '勤務先', 'LINE登録', 'ステータス', '接触方法', '最終接触日', '次回アポイント', '契約数', '証券番号一覧', '払込方法一覧', '通貨一覧', '面談メモ'];
  const rows = customers.map(c => [
    c.name, c.age || '', c.birthdate || '', c.phone || '', c.email || '',
    c.postalCode || '', c.address || '', c.occupation || '', c.workplace || '',
    c.lineRegistered ? '登録済' : '未登録',
    c.status || '未接触',
    c.contactMethod || '',
    c.lastContact || '',
    c.nextAppt || '',
    (c.contracts || []).length,
    (c.contracts || []).map(ct => ct.policyNum || '').filter(Boolean).join(' / '),
    (c.contracts || []).map(ct => ct.paymentCycle || '月払').join(' / '),
    (c.contracts || []).map(ct => ct.currency || '円').join(' / '),
    (c.memo || '').replace(/\n/g, '　'),
  ]);
  const csv = [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `既契約顧客_${todayStr()}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

// ── App ───────────────────────────────────────────────────────
function App() {
  const [customers, setCustomers] = useLS('customers_v1', []);
  const [tab, setTab] = useState('dashboard');
  const [selectedCustomer, setSelectedCustomer] = useState(null);
  const [editingCustomer, setEditingCustomer] = useState(null);
  const [showForm, setShowForm] = useState(false);

  const saveCustomer = c => {
    setCustomers(prev => {
      const idx = prev.findIndex(x => x.id === c.id);
      if (idx >= 0) {
        const next = [...prev]; next[idx] = c; return next;
      }
      return [...prev, c];
    });
  };

  const deleteCustomer = id => setCustomers(prev => prev.filter(c => c.id !== id));

  const openNew = () => { setEditingCustomer(null); setShowForm(true); };
  const openEdit = (c) => { setEditingCustomer(c); setSelectedCustomer(null); setShowForm(true); };

  // サスペクトを新規顧客として登録（名前・年齢を引き継ぎ）
  const registerSuspect = (sp) => {
    setEditingCustomer({
      name: sp.name || '',
      age: sp.age || '',
      memo: sp.memo || '',
      status: '未接触',
      contactMethod: '電話',
      contracts: [],
      suspects: [],
    });
    setSelectedCustomer(null);
    setShowForm(true);
  };

  const tabs = [
    { key: 'dashboard', icon: '🏠', label: 'ホーム' },
    { key: 'list',      icon: '👥', label: '顧客一覧' },
    { key: 'appt',      icon: '📅', label: 'アポイント' },
  ];

  return (
    <div>
      {/* Header */}
      <div className="header">
        <div className="header-row">
          <h1>既契約管理</h1>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <span className="header-sub">{customers.length}名</span>
            <button
              onClick={() => exportCSV(customers)}
              style={{
                fontSize: 11, padding: '5px 10px', borderRadius: 8,
                border: '1px solid var(--border)', background: '#fff',
                color: 'var(--text-sub)', cursor: 'pointer', fontWeight: 600,
              }}>
              CSV
            </button>
          </div>
        </div>
      </div>

      {/* Content */}
      <div className="content">
        {tab === 'dashboard' && (
          <DashboardTab customers={customers} onNavigate={(t, c) => { setTab(t === 'customers' ? 'list' : t); if (c) setSelectedCustomer(c); }} />
        )}
        {tab === 'list' && (
          <CustomerListTab customers={customers} onSelect={setSelectedCustomer} onAdd={openNew} />
        )}
        {tab === 'appt' && (
          <AppointmentTab customers={customers} onSelect={setSelectedCustomer} />
        )}
      </div>

      {/* Bottom Nav */}
      <nav className="bottom-nav">
        {tabs.map(t => (
          <button key={t.key} className={`nav-item ${tab === t.key ? 'active' : ''}`}
            onClick={() => setTab(t.key)}>
            <div className="nav-icon">{t.icon}</div>
            <div className="nav-label">{t.label}</div>
          </button>
        ))}
      </nav>

      {/* FAB */}
      {(tab === 'list' || tab === 'dashboard') && (
        <button className="fab" onClick={openNew}>＋</button>
      )}

      {/* Customer Detail */}
      {selectedCustomer && !showForm && (
        <CustomerDetail
          customer={selectedCustomer}
          customers={customers}
          onEdit={() => openEdit(selectedCustomer)}
          onDelete={id => { deleteCustomer(id); setSelectedCustomer(null); }}
          onClose={() => setSelectedCustomer(null)}
          onRegisterSuspect={sp => { setSelectedCustomer(null); registerSuspect(sp); }}
        />
      )}

      {/* Customer Form */}
      {showForm && (
        <CustomerForm
          editing={editingCustomer}
          customers={customers}
          onSave={c => {
            saveCustomer(c);
            if (editingCustomer) setSelectedCustomer(c);
          }}
          onClose={() => { setShowForm(false); setEditingCustomer(null); }}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
