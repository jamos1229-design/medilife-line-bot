<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Medilife 業務管理</title>
  <!-- iPhone ホーム画面追加対応 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Medilife">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#5B5BD6">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%235B5BD6'/><text y='68' x='50' text-anchor='middle' font-size='55'>📋</text></svg>">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #5B5BD6;
      --accent-light: #EEEEFF;
      --bg: #F6F6F8;
      --surface: #FFFFFF;
      --border: #E4E4E8;
      --text: #18181B;
      --text-sub: #71717A;
      --danger: #EF4444;
      --warning: #F59E0B;
      --success: #22C55E;
      --nav-h: 64px;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }

    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Hiragino Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      font-size: 15px;
      line-height: 1.5;
      overscroll-behavior: none;
    }

    #root {
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 12px;
      padding-top: calc(14px + var(--safe-t));
    }
    .header-row { display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; color: var(--accent); }
    .header-date { font-size: 12px; color: var(--text-sub); font-weight: 500; }

    /* ── Content ── */
    .content {
      padding: 14px 14px;
      padding-bottom: calc(var(--nav-h) + var(--safe-b) + 72px);
    }

    /* ── Bottom Nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: var(--safe-b);
      z-index: 20;
      height: calc(var(--nav-h) + var(--safe-b));
    }
    .bottom-nav::-webkit-scrollbar { display: none; }
    .nav-item {
      flex: 0 0 58px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6px 2px 4px;
      cursor: pointer;
      border: none;
      background: none;
      gap: 2px;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.1s;
    }
    .nav-item:active { opacity: 0.5; }
    .nav-icon {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
      font-size: 17px;
      transition: background 0.15s;
    }
    .nav-item.active .nav-icon { background: var(--accent-light); }
    .nav-label { font-size: 9px; font-weight: 600; color: var(--text-sub); white-space: nowrap; }
    .nav-item.active .nav-label { color: var(--accent); }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
    }
    .card-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 14px;
      letter-spacing: -0.4px;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 5px;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; border: none;
      transition: opacity 0.1s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: 0.7; transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost { background: transparent; color: var(--text-sub); padding: 6px 8px; font-size: 16px; }
    .btn-danger { color: var(--danger); background: #FEF2F2; }
    .btn-sm { padding: 6px 10px; font-size: 13px; border-radius: 8px; }
    .btn-full { width: 100%; }

    /* ── Form ── */
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 13px; font-weight: 600; color: var(--text-sub); margin-bottom: 6px; display: block; }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 11px 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px; font-family: inherit;
      background: var(--bg); color: var(--text);
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      -webkit-appearance: none;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--accent);
      background: var(--surface);
    }
    .form-textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

    .toggle-group { display: flex; gap: 6px; }
    .toggle-btn {
      flex: 1; padding: 9px 6px;
      border-radius: 9px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      font-size: 13px; font-weight: 600;
      cursor: pointer; text-align: center;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .toggle-btn.sel-red { border-color: var(--danger); background: #FEF2F2; color: var(--danger); }
    .toggle-btn.sel-blue { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }

    /* ── Task Item ── */
    .task-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
    }
    .task-item:last-child { border-bottom: none; }
    .task-check {
      width: 23px; height: 23px; border-radius: 7px;
      border: 2px solid var(--border);
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; margin-top: 1px;
      -webkit-tap-highlight-color: transparent;
    }
    .task-check.done { background: var(--accent); border-color: var(--accent); }
    .task-check.done::after { content: '✓'; color: #fff; font-size: 12px; font-weight: 800; }
    .task-body { flex: 1; min-width: 0; cursor: pointer; }
    .task-name { font-size: 15px; font-weight: 500; word-break: break-all; }
    .task-name.done { text-decoration: line-through; color: var(--text-sub); }
    .task-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
    .tag {
      display: inline-flex; align-items: center;
      padding: 2px 7px; border-radius: 5px;
      font-size: 11px; font-weight: 600;
    }
    .tag-date { background: #F0F0F5; color: #555; }
    .tag-client { background: var(--accent-light); color: var(--accent); }
    .tag-imp { background: #FEF2F2; color: #DC2626; }
    .tag-urg { background: #FFF7ED; color: #C2410C; }

    /* ── Matrix ── */
    .matrix-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .matrix-cell {
      border-radius: 12px; padding: 12px; min-height: 110px;
    }
    .mc-q1 { background: #FEF2F2; border: 1.5px solid #FECACA; }
    .mc-q2 { background: #EFF6FF; border: 1.5px solid #BFDBFE; }
    .mc-q3 { background: #FFFBEB; border: 1.5px solid #FDE68A; }
    .mc-q4 { background: #F0FDF4; border: 1.5px solid #BBF7D0; }
    .mc-label { font-size: 12px; font-weight: 800; margin-bottom: 2px; }
    .mc-q1 .mc-label { color: #DC2626; }
    .mc-q2 .mc-label { color: #2563EB; }
    .mc-q3 .mc-label { color: #D97706; }
    .mc-q4 .mc-label { color: #16A34A; }
    .mc-sub { font-size: 10px; opacity: 0.6; margin-bottom: 8px; font-weight: 500; }
    .mc-task { font-size: 12px; padding: 3px 0; border-bottom: 1px solid rgba(0,0,0,0.06); line-height: 1.4; }
    .mc-task:last-child { border-bottom: none; }
    .matrix-axis {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      margin-bottom: 4px;
    }
    .ax { text-align: center; font-size: 11px; font-weight: 700; color: var(--text-sub); padding: 3px 0; }

    /* ── Client ── */
    .client-item {
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .client-item:last-child { border-bottom: none; }
    .client-top { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .client-name { font-size: 16px; font-weight: 700; }
    .client-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .cat-badge {
      padding: 3px 9px; border-radius: 6px;
      font-size: 11px; font-weight: 700;
    }
    .cat-etax { background: #EDE9FE; color: #7C3AED; }
    .cat-april { background: #FEF9C3; color: #92400E; }
    .cat-other { background: #F3F4F6; color: #4B5563; }
    .client-info-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px; margin-top: 8px;
    }
    .client-info-item {
      background: var(--bg); border-radius: 8px;
      padding: 7px 10px;
    }
    .client-info-label { font-size: 10px; font-weight: 700; color: var(--text-sub); margin-bottom: 2px; letter-spacing: 0.3px; }
    .client-info-value { font-size: 13px; font-weight: 600; color: var(--text); }
    .client-info-full { grid-column: 1 / -1; }
    .client-help { font-size: 13px; color: var(--text-sub); white-space: pre-wrap; line-height: 1.5; }
    .ac-value { color: var(--accent); font-size: 15px; font-weight: 800; }
    .task-badge {
      background: var(--accent); color: #fff;
      border-radius: 10px; padding: 1px 7px;
      font-size: 11px; font-weight: 700;
    }

    /* ── 神メモ Vision ── */
    .km-band {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    /* 3列グリッド：タスク左 | 神センター | タスク右 */
    .km-grid { display: grid; grid-template-columns: 1fr 1.5fr 1fr; }
    /* ヘッダー行 */
    .km-head-cell {
      padding: 8px 6px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      text-align: center;
    }
    .km-head-cell:last-child { border-right: none; }
    .km-head-tag { font-size: 9px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.4px; }
    .km-head-period { font-size: 12px; font-weight: 800; color: var(--text); margin-top: 1px; }
    .km-head-center { }
    .km-head-axis { font-size: 15px; font-weight: 800; margin-top: 1px; }
    .km-head-sub { font-size: 9px; font-weight: 500; opacity: 0.65; margin-top: 1px; }
    /* データセル */
    .km-data-cell {
      padding: 8px 6px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    .km-data-cell:last-child { border-right: none; }
    .km-data-cell.km-last-row { border-bottom: none; }
    .km-data-label {
      font-size: 9px; font-weight: 700;
      color: var(--text-sub); margin-bottom: 4px;
      letter-spacing: 0.3px;
    }
    .km-data-hint {
      font-size: 9px; color: var(--text-sub);
      line-height: 1.4; margin-bottom: 5px;
    }
    .km-ta {
      width: 100%; border: 1.5px solid var(--border);
      background: var(--bg); border-radius: 6px;
      padding: 6px; font-size: 11px; font-family: inherit;
      color: var(--text); resize: none; outline: none;
      min-height: 68px; line-height: 1.4;
      transition: border-color 0.15s, background 0.15s;
    }
    .km-ta:focus { border-color: var(--accent); background: var(--surface); }
    .km-ta::placeholder { color: #C4C4CC; font-size: 10px; }
    .km-ta-center { background: var(--surface); }

    /* ── Calendar ── */
    .cal-wrap {
      border-radius: 14px; overflow: hidden;
      border: 1px solid var(--border);
    }
    .cal-wrap iframe {
      display: block; width: 100%; border: none;
      height: calc(100dvh - 170px);
      min-height: 400px;
    }

    /* ── Drawer / Modal ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 50;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .drawer {
      background: var(--surface);
      border-radius: 22px 22px 0 0;
      padding: 18px 16px;
      padding-bottom: calc(24px + var(--safe-b));
      width: 100%; max-width: 430px;
      max-height: 92vh; overflow-y: auto;
    }
    .drawer-handle {
      width: 38px; height: 4px;
      background: var(--border);
      border-radius: 2px; margin: 0 auto 18px;
    }
    .drawer-title { font-size: 19px; font-weight: 800; margin-bottom: 18px; letter-spacing: -0.4px; }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: calc(var(--nav-h) + var(--safe-b) + 14px);
      right: calc(50% - 215px + 14px);
      width: 54px; height: 54px;
      border-radius: 50%;
      background: var(--accent); color: #fff;
      border: none; font-size: 26px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(91,91,214,0.45);
      z-index: 30;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s;
    }
    .fab:active { transform: scale(0.91); }

    /* ── Empty ── */
    .empty { text-align: center; padding: 28px 16px; color: var(--text-sub); font-size: 13px; }
    .empty-icon { font-size: 34px; margin-bottom: 8px; }

    /* ── Misc ── */
    .filter-row { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 2px; }
    .filter-btn {
      padding: 5px 12px; border-radius: 20px;
      border: none; cursor: pointer;
      font-size: 13px; font-weight: 600;
      white-space: nowrap; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
    }
    .overdue-card { background: #FEF2F2 !important; border-color: #FECACA !important; }
    .overdue-title { color: #DC2626 !important; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;

// ── Utils ────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2, 9);
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const JP_DAY = ['日','月','火','水','木','金','土'];
const todayFull = () => {
  const d = new Date();
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${JP_DAY[d.getDay()]}）`;
};
const fmtDate = (s) => {
  if (!s) return '';
  const [, m, d] = s.split('-');
  return `${parseInt(m)}/${parseInt(d)}`;
};

// タスク → Googleカレンダー新規イベントURL
const toGCalUrl = (task) => {
  const title = encodeURIComponent(task.title);
  let dates = '';
  if (task.date) {
    const d = task.date.replace(/-/g, '');
    // 終日イベント：翌日を終了日にする
    const next = new Date(task.date);
    next.setDate(next.getDate() + 1);
    const nd = next.toISOString().split('T')[0].replace(/-/g, '');
    dates = `&dates=${d}/${nd}`;
  }
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}${dates}`;
};

// 神メモ軸カラー
const KM_AXIS_MAP = {
  'ロマン':   { color: '#7C3AED', bg: '#F5F3FF' },
  'ソロバン': { color: '#2563EB', bg: '#EFF6FF' },
  'チャージ': { color: '#059669', bg: '#ECFDF5' },
};
const KM_AXES = ['ロマン', 'ソロバン', 'チャージ'];

const AxisBadge = ({ axis }) => {
  if (!axis) return null;
  const a = KM_AXIS_MAP[axis];
  if (!a) return null;
  return (
    <span style={{
      display:'inline-flex', alignItems:'center',
      padding:'2px 7px', borderRadius:5,
      fontSize:11, fontWeight:700,
      background: a.bg, color: a.color,
    }}>{axis}</span>
  );
};

// タスク日付 → 残り日数
const daysUntil = (dateStr) => {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  // ローカル時間でパース（UTCにするとJSTでズレる）
  const [y, m, d] = dateStr.split('-').map(Number);
  const target = new Date(y, m - 1, d);
  return Math.ceil((target - today) / 86400000);
};

// ── localStorage hook ────────────────────────────────────────
function useLS(key, init) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; }
    catch { return init; }
  });
  const set = useCallback(v => {
    setVal(prev => {
      const next = typeof v === 'function' ? v(prev) : v;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [key]);
  return [val, set];
}

// ── Client Picker（検索付きドロップダウン）────────────────────
function ClientPicker({ clients, value, onChange }) {
  const [open, setOpen]   = React.useState(false);
  const [query, setQuery] = React.useState('');

  const selected = clients.find(c => c.id === value);
  const filtered = clients.filter(c =>
    !query || c.name.includes(query)
  );

  const select = (id) => { onChange(id); setOpen(false); setQuery(''); };

  return (
    <div style={{position:'relative'}}>
      {/* 選択表示ボタン */}
      <button type="button" onClick={() => setOpen(o => !o)} style={{
        width:'100%', padding:'10px 12px', border:'1.5px solid var(--border)',
        borderRadius:8, background:'#fff', textAlign:'left', fontSize:15,
        color: selected ? 'var(--text)' : 'var(--text-sub)', cursor:'pointer',
        display:'flex', justifyContent:'space-between', alignItems:'center',
      }}>
        <span>{selected ? selected.name : 'なし'}</span>
        <span style={{fontSize:11, color:'var(--text-sub)'}}>▼</span>
      </button>

      {/* ドロップダウン */}
      {open && (
        <div style={{
          position:'absolute', top:'calc(100% + 4px)', left:0, right:0,
          background:'#fff', border:'1.5px solid var(--border)', borderRadius:10,
          zIndex:50, boxShadow:'0 4px 16px rgba(0,0,0,0.12)', maxHeight:260, display:'flex', flexDirection:'column',
        }}>
          {/* 検索 */}
          <div style={{padding:'8px 10px', borderBottom:'1px solid var(--border)'}}>
            <input
              autoFocus
              placeholder="🔍 名前で検索..."
              value={query}
              onChange={e => setQuery(e.target.value)}
              style={{width:'100%', padding:'7px 10px', border:'1px solid var(--border)', borderRadius:7, fontSize:14}}
            />
          </div>
          {/* リスト */}
          <div style={{overflowY:'auto', flex:1}}>
            <div onClick={() => select('')} style={{
              padding:'10px 14px', cursor:'pointer', fontSize:14,
              color:'var(--text-sub)', borderBottom:'1px solid var(--border)',
            }}>なし</div>
            {filtered.length === 0 ? (
              <div style={{padding:'12px', textAlign:'center', color:'var(--text-sub)', fontSize:13}}>見つかりません</div>
            ) : filtered.map(c => (
              <div key={c.id} onClick={() => select(c.id)} style={{
                padding:'10px 14px', cursor:'pointer', fontSize:14,
                background: c.id===value ? 'var(--accent-light)' : '#fff',
                color: c.id===value ? 'var(--accent)' : 'var(--text)',
                borderBottom:'1px solid var(--border)',
                fontWeight: c.id===value ? 700 : 400,
              }}>{c.name}</div>
            ))}
          </div>
        </div>
      )}

      {/* 外クリックで閉じる */}
      {open && <div style={{position:'fixed', inset:0, zIndex:49}} onClick={() => { setOpen(false); setQuery(''); }} />}
    </div>
  );
}

// ── Task Drawer ───────────────────────────────────────────────
function TaskDrawer({ clients, editing, onSave, onClose }) {
  const [form, setForm] = useState({
    title: '', date: '', importance: 1, urgency: 1,
    clientId: '', rowType: 'work', axis: '', recurrence: 'none', completed: false,
    steps: [],
    ...(editing || {}),
  });
  const s = k => v => setForm(f => ({ ...f, [k]: v }));

  // ベビーステップ操作
  const [stepInput, setStepInput] = useState('');
  const addStep = () => {
    const txt = stepInput.trim();
    if (!txt) return;
    setForm(f => ({ ...f, steps: [...(f.steps||[]), { id: Date.now().toString(), text: txt, done: false }] }));
    setStepInput('');
  };
  const removeStep = (id) => setForm(f => ({ ...f, steps: (f.steps||[]).filter(s => s.id !== id) }));
  const moveStep = (idx, dir) => {
    setForm(f => {
      const arr = [...(f.steps||[])];
      const to = idx + dir;
      if (to < 0 || to >= arr.length) return f;
      [arr[idx], arr[to]] = [arr[to], arr[idx]];
      return { ...f, steps: arr };
    });
  };

  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="drawer">
        <div className="drawer-handle"/>
        <div className="drawer-title">{editing ? 'タスク編集' : 'タスク追加'}</div>

        <div className="form-group">
          <label className="form-label">タスク名</label>
          <input className="form-input" placeholder="タスク名を入力..." value={form.title}
            onChange={e => s('title')(e.target.value)} autoFocus />
        </div>

        <div className="form-group">
          <label className="form-label">繰り返し</label>
          <div className="toggle-group">
            <button className={`toggle-btn ${form.recurrence==='none'||!form.recurrence ? 'sel-blue' : ''}`}
              onClick={() => s('recurrence')('none')}>なし</button>
            <button className={`toggle-btn ${form.recurrence==='daily' ? 'sel-blue' : ''}`}
              onClick={() => s('recurrence')('daily')}>🔁 毎日</button>
            <button className={`toggle-btn ${form.recurrence==='monthly' ? 'sel-blue' : ''}`}
              onClick={() => s('recurrence')('monthly')}>📅 毎月</button>
          </div>
        </div>

        {form.recurrence !== 'daily' && (
          <div className="form-group">
            <label className="form-label">
              {form.recurrence === 'monthly' ? '繰り返し日（毎月この日）' : '日付（任意）'}
            </label>
            <input className="form-input" type="date" value={form.date}
              onChange={e => s('date')(e.target.value)} />
          </div>
        )}

        <div className="form-group">
          <label className="form-label">重要度</label>
          <div className="toggle-group">
            <button className={`toggle-btn ${form.importance===1 ? 'sel-red' : ''}`} onClick={() => s('importance')(1)}>🔴 重要</button>
            <button className={`toggle-btn ${form.importance===0 ? 'sel-blue' : ''}`} onClick={() => s('importance')(0)}>⚪ 通常</button>
          </div>
        </div>

        <div className="form-group">
          <label className="form-label">緊急度</label>
          <div className="toggle-group">
            <button className={`toggle-btn ${form.urgency===1 ? 'sel-red' : ''}`} onClick={() => s('urgency')(1)}>⚡ 緊急</button>
            <button className={`toggle-btn ${form.urgency===0 ? 'sel-blue' : ''}`} onClick={() => s('urgency')(0)}>🕐 通常</button>
          </div>
        </div>

        <div className="form-group">
          <label className="form-label">神メモ軸（任意）</label>
          <div className="toggle-group">
            <button className={`toggle-btn ${!form.axis ? 'sel-blue' : ''}`} onClick={() => s('axis')('')}>なし</button>
            {KM_AXES.map(ax => {
              const a = KM_AXIS_MAP[ax];
              return (
                <button key={ax} className="toggle-btn"
                  style={form.axis===ax ? {borderColor:a.color, background:a.bg, color:a.color} : {}}
                  onClick={() => s('axis')(ax)}>{ax}</button>
              );
            })}
          </div>
        </div>

        <div className="form-group">
          <label className="form-label">神メモの区分（仕事 or プライベート）</label>
          <div className="toggle-group">
            <button className={`toggle-btn ${form.rowType==='work' ? 'sel-blue' : ''}`}
              onClick={() => s('rowType')('work')}>💼 仕事上</button>
            <button className={`toggle-btn ${form.rowType==='private' ? 'sel-blue' : ''}`}
              onClick={() => s('rowType')('private')}>🌱 プライベート</button>
          </div>
        </div>

        <div className="form-group">
          <label className="form-label">クライアント（任意）</label>
          <ClientPicker clients={clients} value={form.clientId} onChange={s('clientId')} />
        </div>

        {/* ── ベビーステップ ── */}
        <div className="form-group">
          <label className="form-label">🪜 ベビーステップ（任意）</label>
          <div style={{fontSize:12, color:'var(--text-sub)', marginBottom:8}}>タスクを小さなステップに分けて書けます</div>

          {/* 既存ステップ一覧 */}
          {(form.steps||[]).map((step, idx) => (
            <div key={step.id} style={{
              display:'flex', alignItems:'center', gap:6,
              padding:'7px 8px', marginBottom:4,
              background:'var(--bg)', borderRadius:8,
              border:'1px solid var(--border)',
            }}>
              <span style={{fontSize:13, color:'var(--text-sub)', flexShrink:0}}>・</span>
              <span style={{flex:1, fontSize:13}}>{step.text}</span>
              <button onClick={() => moveStep(idx, -1)} style={{background:'none',border:'none',color:'#BBB',cursor:'pointer',fontSize:12,padding:'0 2px'}}>↑</button>
              <button onClick={() => moveStep(idx,  1)} style={{background:'none',border:'none',color:'#BBB',cursor:'pointer',fontSize:12,padding:'0 2px'}}>↓</button>
              <button onClick={() => removeStep(step.id)} style={{background:'none',border:'none',color:'#CCC',cursor:'pointer',fontSize:15,padding:'0 2px'}}>×</button>
            </div>
          ))}

          {/* 新規入力 */}
          <div style={{display:'flex', gap:6, marginTop:4}}>
            <input
              className="form-input" style={{flex:1, marginBottom:0}}
              placeholder="例：資料を印刷する"
              value={stepInput}
              onChange={e => setStepInput(e.target.value)}
              onKeyDown={e => e.key==='Enter' && addStep()}
            />
            <button onClick={addStep} style={{
              padding:'0 14px', borderRadius:8, border:'none',
              background:'var(--accent)', color:'#fff',
              fontSize:18, cursor:'pointer', flexShrink:0,
            }}>＋</button>
          </div>
        </div>

        <button className="btn btn-primary btn-full" style={{marginTop:4}}
          onClick={() => { if (!form.title.trim()) return; onSave({...form, id: form.id || uid()}); onClose(); }}>
          保存
        </button>
      </div>
    </div>
  );
}

// ── Sales Tracker ─────────────────────────────────────────────
function SalesTracker({ sales, onChange, clients }) {
  const [editing, setEditing] = React.useState(false);
  const [form, setForm] = React.useState(sales);

  const target  = Number(sales.target)  || 0;
  const current = Number(sales.current) || 0;
  const pct     = target > 0 ? Math.min(Math.round(current / target * 100), 999) : 0;
  const achieved = target > 0 && current >= target;

  const fmt = v => Number(v).toLocaleString('ja-JP');

  // 見込みAC合計（クライアント全員の prospectAC の合計・万円単位）
  const totalAC = (clients || []).reduce((sum, c) => sum + (Number(c.prospectAC) || 0), 0);
  const acClients = (clients || []).filter(c => Number(c.prospectAC) > 0).length;

  const open = () => { setForm(sales); setEditing(true); };
  const save = () => { onChange(form); setEditing(false); };

  return (
    <div className="card" style={{marginBottom:12, position:'relative', overflow:'hidden'}}>
      {/* グラデーション背景バー */}
      {target > 0 && (
        <div style={{
          position:'absolute', top:0, left:0, bottom:0,
          width: `${Math.min(pct, 100)}%`,
          background: achieved
            ? 'linear-gradient(90deg, #D1FAE5, #A7F3D0)'
            : 'linear-gradient(90deg, #EEF2FF, #C7D2FE)',
          transition: 'width 0.6s ease',
          zIndex:0,
        }} />
      )}
      <div style={{position:'relative', zIndex:1}}>
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:6}}>
          <div style={{fontSize:13, fontWeight:700, color:'var(--text-sub)'}}>
            💰 売上トラッカー
            {sales.label && <span style={{marginLeft:6, color:'var(--text-sub)', fontWeight:500}}>（{sales.label}）</span>}
          </div>
          <button onClick={open} style={{
            fontSize:11, padding:'3px 10px', borderRadius:6,
            border:'1px solid var(--border)', background:'rgba(255,255,255,0.8)',
            color:'var(--text-sub)', cursor:'pointer', fontWeight:600,
          }}>設定</button>
        </div>

        {target === 0 ? (
          <div style={{textAlign:'center', color:'var(--text-sub)', fontSize:13, padding:'8px 0'}}>
            「設定」から目標額を入力してください
          </div>
        ) : (
          <>
            <div style={{display:'flex', alignItems:'baseline', gap:6, marginBottom:6}}>
              <span style={{fontSize:26, fontWeight:800, color: achieved ? '#059669' : 'var(--accent)'}}>
                ¥{fmt(current)}
              </span>
              <span style={{fontSize:13, color:'var(--text-sub)'}}>/ ¥{fmt(target)}</span>
              {achieved && <span style={{fontSize:18, marginLeft:4}}>🎉</span>}
            </div>

            {/* プログレスバー */}
            <div style={{background:'rgba(0,0,0,0.08)', borderRadius:6, height:8, overflow:'hidden', marginBottom:4}}>
              <div style={{
                height:'100%', borderRadius:6,
                width:`${Math.min(pct, 100)}%`,
                background: achieved ? '#10B981' : 'var(--accent)',
                transition:'width 0.6s ease',
              }} />
            </div>

            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
              <span style={{fontSize:12, color:'var(--text-sub)'}}>
                {achieved ? '🎉 目標達成！' : `残り ¥${fmt(Math.max(target - current, 0))}`}
              </span>
              <span style={{fontSize:13, fontWeight:700, color: achieved ? '#059669' : 'var(--accent)'}}>
                {pct}%
              </span>
            </div>
          </>
        )}

        {/* 見込みAC合計 */}
        <div style={{
          marginTop:10, paddingTop:10,
          borderTop:'1px solid rgba(0,0,0,0.07)',
          display:'flex', alignItems:'center', justifyContent:'space-between',
        }}>
          <div style={{fontSize:12, color:'var(--text-sub)', fontWeight:600}}>
            📋 見込みAC合計
            {acClients > 0 && <span style={{marginLeft:4, fontSize:11}}>（{acClients}件）</span>}
          </div>
          <div style={{fontSize:16, fontWeight:800, color:'#8B5CF6'}}>
            {totalAC > 0 ? `${fmt(totalAC)} 万円` : <span style={{fontSize:12, color:'var(--text-sub)', fontWeight:500}}>未入力</span>}
          </div>
        </div>
      </div>

      {/* 設定ドロワー */}
      {editing && (
        <div style={{
          position:'fixed', inset:0, background:'rgba(0,0,0,0.45)',
          display:'flex', alignItems:'flex-end', justifyContent:'center',
          zIndex:200,
        }} onClick={() => setEditing(false)}>
          <div style={{
            background:'#fff', borderRadius:'16px 16px 0 0', padding:24,
            width:'100%', maxWidth:430,
          }} onClick={e => e.stopPropagation()}>
            <div style={{fontSize:16, fontWeight:700, marginBottom:16}}>💰 売上トラッカー設定</div>

            {[
              { label:'期間ラベル（例：今月・6月）', key:'label', type:'text', placeholder:'今月' },
              { label:'目標額（円）',   key:'target',  type:'number', placeholder:'例: 500000' },
              { label:'現在の売上（円）', key:'current', type:'number', placeholder:'例: 320000' },
            ].map(f => (
              <div key={f.key} style={{marginBottom:14}}>
                <label style={{fontSize:12, fontWeight:600, color:'var(--text-sub)', display:'block', marginBottom:4}}>
                  {f.label}
                </label>
                <input
                  type={f.type}
                  inputMode={f.type === 'number' ? 'numeric' : 'text'}
                  placeholder={f.placeholder}
                  value={form[f.key] || ''}
                  onChange={e => setForm(p => ({...p, [f.key]: e.target.value}))}
                  style={{
                    width:'100%', padding:'10px 12px', border:'1.5px solid var(--border)',
                    borderRadius:8, fontSize:15,
                  }}
                />
              </div>
            ))}

            <div style={{display:'flex', gap:8, marginTop:8}}>
              <button onClick={() => setEditing(false)} style={{
                flex:1, padding:'12px', border:'1px solid var(--border)',
                borderRadius:10, background:'#fff', fontSize:15, cursor:'pointer',
              }}>キャンセル</button>
              <button onClick={save} style={{
                flex:2, padding:'12px', border:'none',
                borderRadius:10, background:'var(--accent)', color:'#fff',
                fontSize:15, fontWeight:700, cursor:'pointer',
              }}>保存</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Tab: Today ────────────────────────────────────────────────
function TodayTab({ tasks, clients, onToggle, onEdit, onDelete, sales, onSalesChange }) {
  const td = todayStr();
  const todayDate = new Date();
  const clientName = id => clients.find(c => c.id === id)?.name;
  const [showDone, setShowDone] = useState(false);

  const isRecurring = t => t.recurrence && t.recurrence !== 'none';

  // 完了フォルダー（全タスクの完了済み）
  const doneTasks = tasks.filter(t => t.completed);

  // 繰り返しタスク（未完了のみ表示）
  const recurringToday = tasks.filter(t => {
    if (!isRecurring(t) || t.completed) return false;
    if (t.recurrence === 'daily') return true;
    if (t.recurrence === 'monthly' && t.date) {
      return new Date(t.date + 'T00:00:00').getDate() === todayDate.getDate();
    }
    return false;
  });

  // 通常タスク（未完了のみ）
  const onceOnly = tasks.filter(t => !isRecurring(t) && !t.completed);
  const todayTasks = onceOnly.filter(t => t.date === td);
  const overdue    = onceOnly.filter(t => t.date && t.date < td);
  const upcoming   = onceOnly.filter(t => t.date && t.date > td);
  const undated    = onceOnly.filter(t => !t.date);

  const RecurBadge = ({ t }) => {
    if (t.recurrence === 'daily') return (
      <span style={{fontSize:11, background:'#ECFDF5', color:'#059669',
        border:'1px solid #A7F3D0', borderRadius:4, padding:'1px 5px', fontWeight:600}}>🔁 毎日</span>
    );
    if (t.recurrence === 'monthly' && t.date) {
      const day = new Date(t.date + 'T00:00:00').getDate();
      return (
        <span style={{fontSize:11, background:'#EFF6FF', color:'#2563EB',
          border:'1px solid #BFDBFE', borderRadius:4, padding:'1px 5px', fontWeight:600}}>📅 毎月{day}日</span>
      );
    }
    return null;
  };

  // ステップのチェック切り替え
  const toggleStep = (taskId, stepId) => {
    const task = tasks.find(t => t.id === taskId);
    if (!task) return;
    const newSteps = (task.steps||[]).map(s => s.id===stepId ? {...s, done:!s.done} : s);
    onEdit({ ...task, steps: newSteps, _saveOnly: true });
  };

  // 通常タスク行
  const TaskRow = ({ t, hideDate }) => {
    const steps = t.steps || [];
    const doneCount = steps.filter(s => s.done).length;
    return (
      <div className="task-item" style={{flexDirection:'column', alignItems:'stretch', gap:0}}>
        <div style={{display:'flex', alignItems:'center'}}>
          <div className="task-check" onClick={() => onToggle(t.id)} />
          <div className="task-body" onClick={() => onEdit(t)}>
            <div className="task-name">{t.title}</div>
            <div className="task-tags">
              {isRecurring(t)
                ? <RecurBadge t={t} />
                : (!hideDate && t.date && t.date !== td) && <span className="tag tag-date">{fmtDate(t.date)}</span>}
              {t.importance === 1 && <span className="tag tag-imp">重要</span>}
              {t.urgency === 1    && <span className="tag tag-urg">緊急</span>}
              {clientName(t.clientId) && <span className="tag tag-client">{clientName(t.clientId)}</span>}
              {t.axis && <AxisBadge axis={t.axis} />}
              {steps.length > 0 && (
                <span style={{fontSize:11, background:'#EEF2FF', color:'var(--accent)',
                  borderRadius:4, padding:'1px 6px', fontWeight:600}}>
                  🪜 {doneCount}/{steps.length}
                </span>
              )}
            </div>
          </div>
          <a href={toGCalUrl(t)} target="_blank" rel="noreferrer"
            style={{color:'#AAA', fontSize:16, padding:'4px 6px', textDecoration:'none', lineHeight:1}}
            title="Googleカレンダーに追加">📅</a>
          <button className="btn btn-ghost" style={{color:'#CCC',padding:'4px 6px'}} onClick={() => onDelete(t.id)}>×</button>
        </div>

        {/* ベビーステップ一覧 */}
        {steps.length > 0 && (
          <div style={{paddingLeft:36, paddingBottom:8}}>
            {steps.map(step => (
              <div key={step.id} onClick={() => toggleStep(t.id, step.id)}
                style={{
                  display:'flex', alignItems:'center', gap:7, padding:'4px 0',
                  cursor:'pointer', borderTop:'1px solid var(--border)',
                }}>
                <div style={{
                  width:14, height:14, borderRadius:3, flexShrink:0,
                  border: step.done ? 'none' : '2px solid var(--border)',
                  background: step.done ? 'var(--success)' : 'transparent',
                  display:'flex', alignItems:'center', justifyContent:'center',
                }}>
                  {step.done && <span style={{color:'#fff', fontSize:10, lineHeight:1}}>✓</span>}
                </div>
                <span style={{
                  fontSize:12, color: step.done ? 'var(--text-sub)' : 'var(--text)',
                  textDecoration: step.done ? 'line-through' : 'none',
                }}>{step.text}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  };

  // 完了フォルダー内のタスク行
  const DoneRow = ({ t }) => (
    <div style={{
      display:'flex', alignItems:'center', gap:8,
      padding:'10px 0', borderBottom:'1px solid var(--border)',
    }}>
      <div className="task-check done" style={{flexShrink:0}} />
      <div style={{flex:1, minWidth:0}}>
        <div style={{fontSize:14, fontWeight:500, textDecoration:'line-through',
          color:'var(--text-sub)', wordBreak:'break-all'}}>{t.title}</div>
        {t.date && <div style={{fontSize:11, color:'var(--text-sub)', marginTop:2}}>{fmtDate(t.date)}</div>}
      </div>
      <button
        onClick={() => onToggle(t.id)}
        style={{
          fontSize:12, fontWeight:700, padding:'5px 10px', borderRadius:8,
          border:'1.5px solid var(--accent)', background:'var(--accent-light)',
          color:'var(--accent)', cursor:'pointer', whiteSpace:'nowrap', flexShrink:0,
        }}>↩ 戻す</button>
      <button
        onClick={() => onDelete(t.id)}
        style={{
          fontSize:12, fontWeight:700, padding:'5px 10px', borderRadius:8,
          border:'1.5px solid var(--danger)', background:'#FEF2F2',
          color:'var(--danger)', cursor:'pointer', whiteSpace:'nowrap', flexShrink:0,
        }}>🗑 消去</button>
    </div>
  );

  return (
    <div>
      <div style={{fontSize:13, color:'var(--text-sub)', fontWeight:500, marginBottom:12}}>{todayFull()}</div>

      <SalesTracker sales={sales} onChange={onSalesChange} clients={clients} />

      {recurringToday.length > 0 && (
        <div className="card">
          <div className="card-title">🔁 定期タスク</div>
          {recurringToday.map(t => <TaskRow key={t.id} t={t} hideDate />)}
        </div>
      )}

      {overdue.length > 0 && (
        <div className="card overdue-card">
          <div className="card-title overdue-title">⚠ 未完了（期限切れ {overdue.length}件）</div>
          {overdue.map(t => <TaskRow key={t.id} t={t} />)}
        </div>
      )}

      <div className="card">
        <div className="card-title">今日のタスク</div>
        {todayTasks.length === 0
          ? <div className="empty"><div className="empty-icon">✓</div><div>本日のタスクはありません</div></div>
          : todayTasks.map(t => <TaskRow key={t.id} t={t} hideDate />)
        }
      </div>

      {upcoming.length > 0 && (
        <div className="card">
          <div className="card-title">今後の予定</div>
          {upcoming.map(t => <TaskRow key={t.id} t={t} />)}
        </div>
      )}

      {undated.length > 0 && (
        <div className="card">
          <div className="card-title" style={{color:'var(--text-sub)'}}>📋 日付未定</div>
          {undated.map(t => <TaskRow key={t.id} t={t} hideDate />)}
        </div>
      )}

      {/* 完了フォルダー */}
      <div className="card" style={{marginTop:8}}>
        <div
          className="card-title"
          onClick={() => setShowDone(v => !v)}
          style={{
            display:'flex', justifyContent:'space-between', alignItems:'center',
            cursor:'pointer', userSelect:'none',
            color: doneTasks.length > 0 ? 'var(--text)' : 'var(--text-sub)',
          }}>
          <span>✅ 完了フォルダー {doneTasks.length > 0 && <span style={{
            fontSize:12, background:'var(--success)', color:'#fff',
            borderRadius:10, padding:'1px 7px', marginLeft:4, fontWeight:700,
          }}>{doneTasks.length}</span>}</span>
          <span style={{fontSize:13, color:'var(--text-sub)'}}>{showDone ? '▲' : '▼'}</span>
        </div>
        {showDone && (
          doneTasks.length === 0
            ? <div className="empty" style={{padding:'16px 0'}}>
                <div>完了済みタスクはありません</div>
              </div>
            : doneTasks.map(t => <DoneRow key={t.id} t={t} />)
        )}
      </div>
    </div>
  );
}

function ClientsTab({ clients, tasks, onAdd, onEdit, onDelete }) {

  const openTasks = id => tasks.filter(t => t.clientId===id && !t.completed).length;

  const filtered = clients

      c.name.includes(search) ||

      (c.memo||'').includes(search) ||
      (c.prospectAC||'').includes(search) ||
      (c.prospectMonth||'').includes(search)

// ── Tab: Gantt ────────────────────────────────────────────────
function GanttTab({ tasks, clients }) {
  const CELL_W    = 34;   // 1日あたりの幅(px)
  const LABEL_W   = 108;  // 左ラベル幅(px)
  const DAYS_BEFORE = 4;  // 今日より前を何日表示するか
  const DAYS_TOTAL  = 56; // 合計8週間

  const todayD = new Date(); todayD.setHours(0,0,0,0);
  const startD = new Date(todayD); startD.setDate(startD.getDate() - DAYS_BEFORE);

  const toStr = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const todaySt = toStr(todayD);

  // 日付配列を生成
  const dates = Array.from({ length: DAYS_TOTAL }, (_, i) => {
    const d = new Date(startD);
    d.setDate(d.getDate() + i);
    return d;
  });

  // 月ヘッダーグループ
  const monthGroups = [];
  dates.forEach((d, i) => {
    const label = `${d.getMonth()+1}月`;
    if (!monthGroups.length || monthGroups[monthGroups.length-1].label !== label) {
      monthGroups.push({ label, start: i, count: 1 });
    } else {
      monthGroups[monthGroups.length-1].count++;
    }
  });

  const clientName = id => clients.find(c => c.id === id)?.name;

  // 日付あり・非繰り返しタスクを日付順に
  const scheduled = [...tasks]
    .filter(t => t.date && (!t.recurrence || t.recurrence === 'none'))
    .sort((a, b) => a.date.localeCompare(b.date));

  // ドットの色
  const dotColor = t => {
    if (t.completed) return '#D1D5DB';
    if (t.axis && KM_AXIS_MAP[t.axis]) return KM_AXIS_MAP[t.axis].color;
    if (t.importance === 1) return '#EF4444';
    return 'var(--accent)';
  };

  // 今日列へ自動スクロール
  const scrollRef = React.useRef(null);
  React.useEffect(() => {
    if (scrollRef.current) {
      scrollRef.current.scrollLeft = DAYS_BEFORE * CELL_W - 8;
    }
  }, []);

  const headerBg = '#FFFFFF';

  return (
    <div>
      <div className="section-title">ガントチャート</div>
      <p style={{fontSize:12, color:'var(--text-sub)', marginBottom:10, lineHeight:1.6}}>
        タスクの締切日を横軸で確認。横スクロールで8週先まで見えます。
      </p>

      {scheduled.length === 0 ? (
        <div className="empty" style={{marginTop:40}}>
          <div className="empty-icon">📊</div>
          <div>日付付きのタスクを追加すると<br/>ここに表示されます</div>
        </div>
      ) : (
