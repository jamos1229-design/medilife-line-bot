const GCAL_SCOPE     = 'https://www.googleapis.com/auth/calendar.readonly';

// カテゴリ定義
// ai: 'high'=Claude自動化◎ / 'mid'=部分的に可 / 'low'=対人必須 / 'check'=要確認
const LOG_CATS = [
  { key:'商談・面談',    icon:'🤝', ai:'low',   aiLabel:'対人が必要',      aiColor:'#EF4444',
    keywords:['商談','面談','訪問','アポ','ミーティング','meeting','打ち合わせ','相談','申し込み','申込','成約','提案','営業','見込み','フォロー','紹介','面会','契約','クライアント','保険'] },
  { key:'メール・連絡',  icon:'📧', ai:'high',  aiLabel:'Claude自動化◎',   aiColor:'#22C55E',
    keywords:['メール','mail','LINE','ライン','連絡','返信','電話','チャット','DM','メッセージ'] },
  { key:'資料・文章作成',icon:'📝', ai:'high',  aiLabel:'Claude自動化◎',   aiColor:'#22C55E',
    keywords:['資料','作成','プレゼン','スライド','提案書','報告書','ガンマ','gamma','文章','ライティング','原稿'] },
  { key:'SNS・発信',    icon:'📱', ai:'high',  aiLabel:'Claude自動化◎',   aiColor:'#22C55E',
    keywords:['SNS','instagram','インスタ','投稿','ブログ','Twitter','X','発信','コンテンツ'] },
  { key:'事務・手続き',  icon:'📋', ai:'mid',   aiLabel:'部分的に自動化可', aiColor:'#F59E0B',
    keywords:['事務','申請','手続き','書類','更新','処理','入力','整理','郵送','記入','データ'] },
  { key:'勉強・研究',    icon:'📚', ai:'mid',   aiLabel:'AI活用で効率化',   aiColor:'#F59E0B',
    keywords:['勉強','研修','セミナー','学習','研究','読書','FP','fp','ウェビナー'] },
  { key:'移動',          icon:'🚗', ai:'low',   aiLabel:'自動化困難',       aiColor:'#6B7280',
    keywords:['移動','電車','車','出張','通勤','往復','交通','ドライブ'] },
  { key:'その他',        icon:'📌', ai:'check', aiLabel:'要確認',           aiColor:'#8B5CF6',
    keywords:[] },
];

function detectCategory(title) {
  const t = (title || '').toLowerCase();
  for (const cat of LOG_CATS) {
    if (cat.keywords.some(kw => t.includes(kw))) return cat.key;
  }
  return 'その他';
}

function LogTab({ tasks, clients, suspects, vision, sales, logs, onLogsChange, onRestore }) {
  const completedTasks = tasks.filter(t => t.completed);
  const activeTasks    = tasks.filter(t => !t.completed).length;
  const [restoreMsg, setRestoreMsg] = React.useState('');
  const [confirmRestore, setConfirmRestore] = React.useState(null);

  // 手動ログ入力
  const [showLogForm, setShowLogForm] = React.useState(false);
  const [logForm, setLogForm] = React.useState({ date: '', cat: '商談', title: '', hours: '', mins: '', memo: '' });
  const todayVal = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };

  const saveLog = () => {
    if (!logForm.title) return;
    const totalMins = (Number(logForm.hours)||0)*60 + (Number(logForm.mins)||0);
    const entry = { id: Date.now().toString(), ...logForm, date: logForm.date || todayVal(), totalMins };
    onLogsChange(prev => [entry, ...prev]);
    setLogForm({ date: '', cat: '商談', title: '', hours: '', mins: '', memo: '' });
    setShowLogForm(false);
  };

  const deleteLog = (id) => onLogsChange(prev => prev.filter(l => l.id !== id));

  // ── Google Calendar ──
  const [gcalToken,   setGcalToken]   = React.useState(null);
  const [gcalEvents,  setGcalEvents]  = React.useState([]);
  const [gcalLoading, setGcalLoading] = React.useState(false);
  const [gcalError,   setGcalError]   = React.useState('');
  const [gcalDays,    setGcalDays]    = React.useState(7); // 何日分表示するか

  const fetchCalendarEvents = async (token, days) => {
    setGcalLoading(true);
    setGcalError('');
    try {
      const now  = new Date();
      const from = new Date(now - days * 24 * 60 * 60 * 1000);
      const url  = `https://www.googleapis.com/calendar/v3/calendars/primary/events?` +
        `timeMin=${from.toISOString()}&timeMax=${now.toISOString()}` +
        `&maxResults=200&singleEvents=true&orderBy=startTime`;
      const res  = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) { setGcalError('再度ログインしてください'); setGcalToken(null); setGcalLoading(false); return; }
      const data = await res.json();
      setGcalEvents(data.items || []);
    } catch(e) {
      setGcalError('取得に失敗しました');
    }
    setGcalLoading(false);
  };

  const signIn = () => {
    if (!window.google) { setGcalError('Googleライブラリ読み込み中…少し待ってから再度タップ'); return; }
    const client = window.google.accounts.oauth2.initTokenClient({
      client_id: GCAL_CLIENT_ID,
      scope: GCAL_SCOPE,
      callback: (resp) => {
        if (resp.access_token) {
          setGcalToken(resp.access_token);
          fetchCalendarEvents(resp.access_token, gcalDays);
        } else {
          setGcalError('ログインに失敗しました');
        }
      },
    });
    client.requestAccessToken({ prompt: 'consent' });
  };

  const signOut = () => { setGcalToken(null); setGcalEvents([]); };

  const changeDays = (d) => {
    setGcalDays(d);
    if (gcalToken) fetchCalendarEvents(gcalToken, d);
  };

  // カテゴリ別集計（カレンダー + 手動ログ）
  const [viewMode, setViewMode] = React.useState('category'); // 'category' | 'day'

  const groupByCategory = (events, manualLogs, days) => {
    const cutoff = new Date(Date.now() - days * 24 * 60 * 60 * 1000);
    const result = {};
    LOG_CATS.forEach(c => result[c.key] = { mins: 0, items: [] });

    // カレンダーイベント
    events.forEach(ev => {
      const title = ev.summary || '（タイトルなし）';
      const cat   = detectCategory(title);
      let mins = 0;
      if (ev.start?.dateTime && ev.end?.dateTime)
        mins = Math.round((new Date(ev.end.dateTime) - new Date(ev.start.dateTime)) / 60000);
      result[cat].mins += mins;
      result[cat].items.push({ title, mins, src: 'gcal' });
    });

    // 手動ログ
    manualLogs.filter(l => new Date(l.date + 'T00:00:00') >= cutoff).forEach(l => {
      const cat = l.cat || 'その他';
      if (!result[cat]) result[cat] = { mins: 0, items: [] };
      result[cat].mins += l.totalMins || 0;
      result[cat].items.push({ title: l.title, mins: l.totalMins || 0, src: 'manual', id: l.id, memo: l.memo });
    });

    return LOG_CATS.map(c => ({ ...c, ...result[c.key] })).filter(c => c.items.length > 0);
  };

  // イベントを日付ごとにグループ化
  const groupByDay = (events) => {
    const groups = {};
    events.forEach(ev => {
      const start = ev.start?.dateTime || ev.start?.date;
      if (!start) return;
      const day = start.slice(0, 10);
      if (!groups[day]) groups[day] = [];
      let mins = 0;
      if (ev.start?.dateTime && ev.end?.dateTime)
        mins = Math.round((new Date(ev.end.dateTime) - new Date(ev.start.dateTime)) / 60000);
      groups[day].push({ title: ev.summary || '（タイトルなし）', mins, cat: detectCategory(ev.summary), allDay: !ev.start?.dateTime });
    });
    return Object.entries(groups).sort((a, b) => b[0].localeCompare(a[0]));
  };

  const fmtMins = (m) => {
    if (!m) return '終日';
    const h = Math.floor(m / 60), min = m % 60;
    return h > 0 ? `${h}時間${min > 0 ? min + '分' : ''}` : `${min}分`;
  };

  const fmtDay = (dateStr) => {
    const d = new Date(dateStr + 'T00:00:00');
    const days = ['日','月','火','水','木','金','土'];
    return `${d.getMonth()+1}/${d.getDate()}（${days[d.getDay()]}）`;
  };

  const catGrouped  = groupByCategory(gcalEvents, logs, gcalDays);
  const dayGrouped  = groupByDay(gcalEvents);
  const totalMins   = gcalEvents.reduce((s, ev) => {
    if (ev.start?.dateTime && ev.end?.dateTime)
      return s + Math.round((new Date(ev.end.dateTime) - new Date(ev.start.dateTime)) / 60000);
    return s;
  }, 0);
  const manualInRange = logs.filter(l => {
    const cutoff = new Date(Date.now() - gcalDays * 24 * 60 * 60 * 1000);
    return new Date(l.date + 'T00:00:00') >= cutoff;
  });

  const clientName = (id) => {
    const c = clients.find(c => c.id === id);
    return c ? c.name : '';
  };

  const recentDone = [...completedTasks]
    .sort((a, b) => (b.updatedAt || b.id) - (a.updatedAt || a.id))
    .slice(0, 20);

  // ── バックアップ書き出し ──
  const handleExport = () => {
    const data = {
      exportedAt: new Date().toISOString(),
      version: 1,
      tasks, clients, suspects, vision, sales, logs,
    };
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const now  = new Date();
    const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
    const a = document.createElement('a');
    a.href = url;
    a.download = `medilife_backup_${stamp}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  // ── バックアップ読み込み ──
  const handleImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.tasks && !data.clients && !data.suspects) {
          setRestoreMsg('❌ ファイルの形式が違います');
          return;
        }
        setConfirmRestore(data);
      } catch {
        setRestoreMsg('❌ ファイルの読み込みに失敗しました');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const doRestore = () => {
    onRestore(confirmRestore);
    setConfirmRestore(null);
    setRestoreMsg('✅ データを復元しました！');
    setTimeout(() => setRestoreMsg(''), 3000);
  };

  return (
    <div>
      <h2 style={{fontSize:18, fontWeight:700, marginBottom:16}}>📝 ログ</h2>

      {/* ── Googleカレンダー振り返り ── */}
      <div className="card" style={{marginBottom:16}}>
        <div style={{fontSize:15, fontWeight:700, marginBottom:4}}>📅 Googleカレンダー振り返り</div>
        <div style={{fontSize:12, color:'var(--text-sub)', marginBottom:12, lineHeight:1.6}}>
          Googleカレンダーと連携して、何に時間を使ったかを確認できます。
        </div>

        {!gcalToken ? (
          <>
            <button onClick={signIn} style={{
              display:'flex', alignItems:'center', justifyContent:'center', gap:8,
              width:'100%', padding:'13px', borderRadius:10, border:'none',
              background:'#4285F4', color:'#fff', fontSize:15, fontWeight:700, cursor:'pointer',
            }}>
              <span style={{fontSize:18}}>G</span> Googleでログインして連携する
            </button>
            {gcalError && <div style={{marginTop:8, fontSize:12, color:'var(--danger)', textAlign:'center'}}>{gcalError}</div>}
          </>
        ) : (
          <>
            {/* 期間選択 */}
            <div style={{display:'flex', gap:6, marginBottom:12, flexWrap:'wrap'}}>
              {[
                {label:'3日', days:3}, {label:'1週間', days:7},
                {label:'2週間', days:14}, {label:'1ヶ月', days:30},
              ].map(o => (
                <button key={o.days} onClick={() => changeDays(o.days)} style={{
                  padding:'6px 12px', borderRadius:8, border:'none', cursor:'pointer',
                  background: gcalDays === o.days ? 'var(--accent)' : 'var(--bg)',
                  color: gcalDays === o.days ? '#fff' : 'var(--text-sub)',
                  fontSize:13, fontWeight:600,
                }}>{o.label}</button>
              ))}
              <button onClick={signOut} style={{
                marginLeft:'auto', padding:'6px 12px', borderRadius:8,
                border:'1px solid var(--border)', background:'none',
                color:'var(--text-sub)', fontSize:12, cursor:'pointer',
              }}>ログアウト</button>
            </div>

            {gcalLoading && (
              <div style={{textAlign:'center', color:'var(--text-sub)', padding:'20px 0'}}>
                ⏳ 読み込み中...
              </div>
            )}

            {!gcalLoading && gcalEvents.length === 0 && (
              <div style={{textAlign:'center', color:'var(--text-sub)', padding:'16px 0', fontSize:13}}>
                この期間にカレンダーイベントはありません
              </div>
            )}

            {!gcalLoading && gcalEvents.length > 0 && (
              <>
                {/* 合計 + 表示切替 */}
                <div style={{
                  background:'var(--accent-light)', borderRadius:10, padding:'10px 14px',
                  marginBottom:10, display:'flex', justifyContent:'space-between', alignItems:'center',
                }}>
                  <span style={{fontSize:13, color:'var(--accent)', fontWeight:600}}>{gcalDays}日間合計</span>
                  <span style={{fontSize:16, fontWeight:800, color:'var(--accent)'}}>{fmtMins(totalMins)}</span>
                </div>

                {/* カテゴリ / 日別 切替 */}
                <div style={{display:'flex', gap:6, marginBottom:12}}>
                  {[['category','📊 カテゴリ別'],['day','📅 日別']].map(([m,l]) => (
                    <button key={m} onClick={() => setViewMode(m)} style={{
                      flex:1, padding:'7px', borderRadius:8, border:'none', cursor:'pointer',
                      background: viewMode===m ? 'var(--accent)' : 'var(--bg)',
                      color: viewMode===m ? '#fff' : 'var(--text-sub)',
                      fontSize:13, fontWeight:600,
                    }}>{l}</button>
                  ))}
                </div>

                {/* カテゴリ別ビュー */}
                {viewMode === 'category' && (
                  <>
                    {/* AI自動化サマリー */}
                    {(() => {
                      const highMins  = catGrouped.filter(c=>c.ai==='high').reduce((s,c)=>s+c.mins,0);
                      const midMins   = catGrouped.filter(c=>c.ai==='mid').reduce((s,c)=>s+c.mins,0);
                      const lowMins   = catGrouped.filter(c=>c.ai==='low').reduce((s,c)=>s+c.mins,0);
                      const checkMins = catGrouped.filter(c=>c.ai==='check').reduce((s,c)=>s+c.mins,0);
                      const total = highMins + midMins + lowMins + checkMins || 1;
                      return (
                        <div style={{background:'#F0FDF4', border:'1px solid #BBF7D0', borderRadius:12, padding:'12px 14px', marginBottom:14}}>
                          <div style={{fontSize:13, fontWeight:700, color:'#15803D', marginBottom:10}}>🤖 AI自動化ポテンシャル</div>
                          {[
                            { label:'Claude自動化◎', mins:highMins,  color:'#22C55E', bg:'#DCFCE7' },
                            { label:'部分的に可',     mins:midMins,   color:'#F59E0B', bg:'#FEF9C3' },
                            { label:'対人・移動',     mins:lowMins,   color:'#EF4444', bg:'#FEE2E2' },
                            { label:'要確認',         mins:checkMins, color:'#8B5CF6', bg:'#EDE9FE' },
                          ].filter(r=>r.mins>0).map(r => (
                            <div key={r.label} style={{display:'flex', alignItems:'center', gap:8, marginBottom:6}}>
                              <div style={{fontSize:11, fontWeight:600, color:r.color, width:110, flexShrink:0}}>{r.label}</div>
                              <div style={{flex:1, background:'#E5E7EB', borderRadius:4, height:10, overflow:'hidden'}}>
                                <div style={{height:'100%', width:`${Math.round(r.mins/total*100)}%`, background:r.color, borderRadius:4}} />
                              </div>
                              <div style={{fontSize:12, fontWeight:700, color:r.color, width:60, textAlign:'right', flexShrink:0}}>{fmtMins(r.mins)}</div>
                            </div>
                          ))}
                        </div>
                      );
                    })()}

                    {catGrouped.map(cat => (
                      <div key={cat.key} style={{marginBottom:10, background:'var(--bg)', borderRadius:10, padding:'10px 12px'}}>
                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6}}>
                          <div>
                            <span style={{fontSize:14, fontWeight:700}}>{cat.icon} {cat.key}</span>
                            <span style={{
                              marginLeft:8, fontSize:10, fontWeight:700, padding:'2px 7px',
                              borderRadius:10, background: cat.aiColor+'22', color: cat.aiColor,
                            }}>{cat.aiLabel}</span>
                          </div>
                          <span style={{fontSize:14, fontWeight:800, color:'var(--accent)'}}>{fmtMins(cat.mins)}</span>
                        </div>
                        {cat.items.map((it, i) => (
                          <div key={i} style={{display:'flex', alignItems:'center', gap:6, padding:'4px 0', borderTop:'1px solid var(--border)'}}>
                            <span style={{fontSize:11, color: it.src==='manual' ? 'var(--warning)' : 'var(--text-sub)', flexShrink:0}}>
                              {it.src==='manual' ? '✏️' : '📅'}
                            </span>
                            <span style={{fontSize:12, flex:1}}>{it.title}</span>
                            {it.memo && <span style={{fontSize:11, color:'var(--text-sub)'}}>{it.memo}</span>}
                            <span style={{fontSize:11, color:'var(--text-sub)', whiteSpace:'nowrap'}}>{fmtMins(it.mins)}</span>
                            {it.src==='manual' && <button onClick={() => deleteLog(it.id)} style={{background:'none',border:'none',color:'#CCC',cursor:'pointer',fontSize:13,padding:'0 2px'}}>×</button>}
                          </div>
                        ))}
                      </div>
                    ))}
                  </>
                )}

                {/* 日別ビュー */}
                {viewMode === 'day' && dayGrouped.map(([day, evs]) => {
                  const dayTotal = evs.reduce((s, e) => s + (e.mins || 0), 0);
                  return (
                    <div key={day} style={{marginBottom:10}}>
                      <div style={{display:'flex', justifyContent:'space-between', fontSize:12, fontWeight:700, color:'var(--text-sub)', marginBottom:4, paddingBottom:4, borderBottom:'1px solid var(--border)'}}>
                        <span>{fmtDay(day)}</span>
                        {dayTotal > 0 && <span style={{color:'var(--accent)'}}>{fmtMins(dayTotal)}</span>}
                      </div>
                      {evs.map((ev, i) => (
                        <div key={i} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'4px 0', borderBottom:'1px solid var(--border)'}}>
                          <span style={{fontSize:12, flex:1, marginRight:6}}>{ev.title}</span>
                          <span style={{fontSize:10, color:'var(--text-sub)', background:'var(--bg)', borderRadius:4, padding:'1px 5px', marginRight:4}}>{ev.cat}</span>
                          <span style={{fontSize:11, color:'var(--text-sub)', whiteSpace:'nowrap'}}>{fmtMins(ev.mins)}</span>
                        </div>
                      ))}
                    </div>
                  );
                })}
              </>
            )}
          </>
        )}
      </div>

      {/* ── 手動ログ ── */}
      <div className="card" style={{marginBottom:16}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10}}>
          <div style={{fontSize:15, fontWeight:700}}>✏️ 手動ログ</div>
          <button onClick={() => { setLogForm({ date: todayVal(), cat:'商談', title:'', hours:'', mins:'', memo:'' }); setShowLogForm(true); }} style={{
            padding:'6px 14px', borderRadius:8, border:'none',
            background:'var(--accent)', color:'#fff', fontSize:13, fontWeight:700, cursor:'pointer',
          }}>＋ 追加</button>
        </div>
        <div style={{fontSize:12, color:'var(--text-sub)', marginBottom:10, lineHeight:1.6}}>
          カレンダーにない作業を手動で記録できます
        </div>

        {logs.length === 0 ? (
          <div style={{textAlign:'center', color:'var(--text-sub)', fontSize:13, padding:'12px 0'}}>まだ記録がありません</div>
        ) : (
          logs.slice(0, 10).map(l => (
            <div key={l.id} style={{display:'flex', alignItems:'center', gap:8, padding:'8px 0', borderBottom:'1px solid var(--border)'}}>
              <div style={{fontSize:18, flexShrink:0}}>{LOG_CATS.find(c=>c.key===l.cat)?.icon || '📝'}</div>
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontSize:13, fontWeight:600}}>{l.title}</div>
                <div style={{fontSize:11, color:'var(--text-sub)'}}>{l.date} · {l.cat}{l.memo ? ' · ' + l.memo : ''}</div>
              </div>
              <div style={{fontSize:13, fontWeight:700, color:'var(--accent)', whiteSpace:'nowrap'}}>{fmtMins(l.totalMins)}</div>
              <button onClick={() => deleteLog(l.id)} style={{background:'none', border:'none', color:'#CCC', cursor:'pointer', fontSize:16, padding:'0 4px'}}>×</button>
            </div>
          ))
        )}
      </div>

      {/* 手動ログ入力フォーム */}
      {showLogForm && (
        <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.5)', display:'flex', alignItems:'flex-end', justifyContent:'center', zIndex:200}}
          onClick={() => setShowLogForm(false)}>
          <div style={{background:'#fff', borderRadius:'16px 16px 0 0', padding:24, width:'100%', maxWidth:430, maxHeight:'90vh', overflowY:'auto'}}
            onClick={e => e.stopPropagation()}>
            <div style={{fontSize:16, fontWeight:700, marginBottom:16}}>✏️ 作業ログを追加</div>

            {/* カテゴリ */}
            <label style={{fontSize:12, fontWeight:600, color:'var(--text-sub)', display:'block', marginBottom:6}}>カテゴリ</label>
            <div style={{display:'flex', gap:6, flexWrap:'wrap', marginBottom:14}}>
              {LOG_CATS.map(c => (
                <button key={c.key} onClick={() => setLogForm(f => ({...f, cat: c.key}))} style={{
                  padding:'6px 12px', borderRadius:8, border:'2px solid',
                  borderColor: logForm.cat===c.key ? 'var(--accent)' : 'var(--border)',
                  background: logForm.cat===c.key ? 'var(--accent-light)' : '#fff',
                  color: logForm.cat===c.key ? 'var(--accent)' : 'var(--text-sub)',
                  fontSize:13, fontWeight:600, cursor:'pointer',
                }}>{c.icon} {c.key}</button>
              ))}
            </div>

            {/* 内容 */}
            <label style={{fontSize:12, fontWeight:600, color:'var(--text-sub)', display:'block', marginBottom:4}}>内容 *</label>
            <input value={logForm.title} onChange={e => setLogForm(f => ({...f, title: e.target.value}))}
              placeholder="例：A社へ契約書を持参"
              style={{width:'100%', padding:'10px 12px', border:'1.5px solid var(--border)', borderRadius:8, fontSize:15, marginBottom:14}} />

            {/* 日付 */}
            <label style={{fontSize:12, fontWeight:600, color:'var(--text-sub)', display:'block', marginBottom:4}}>日付</label>
            <input type="date" value={logForm.date} onChange={e => setLogForm(f => ({...f, date: e.target.value}))}
              style={{width:'100%', padding:'10px 12px', border:'1.5px solid var(--border)', borderRadius:8, fontSize:15, marginBottom:14}} />

            {/* 時間 */}
            <label style={{fontSize:12, fontWeight:600, color:'var(--text-sub)', display:'block', marginBottom:4}}>所要時間</label>
            <div style={{display:'flex', gap:8, marginBottom:14}}>
              <div style={{flex:1}}>
                <input type="number" placeholder="0" value={logForm.hours} onChange={e => setLogForm(f => ({...f, hours: e.target.value}))}
                  style={{width:'100%', padding:'10px 12px', border:'1.5px solid var(--border)', borderRadius:8, fontSize:15}} />
                <div style={{fontSize:11, color:'var(--text-sub)', textAlign:'center', marginTop:2}}>時間</div>
              </div>
              <div style={{flex:1}}>
                <input type="number" placeholder="0" value={logForm.mins} onChange={e => setLogForm(f => ({...f, mins: e.target.value}))}
                  style={{width:'100%', padding:'10px 12px', border:'1.5px solid var(--border)', borderRadius:8, fontSize:15}} />
                <div style={{fontSize:11, color:'var(--text-sub)', textAlign:'center', marginTop:2}}>分</div>
              </div>
            </div>

            {/* メモ */}
            <label style={{fontSize:12, fontWeight:600, color:'var(--text-sub)', display:'block', marginBottom:4}}>メモ</label>
            <input value={logForm.memo} onChange={e => setLogForm(f => ({...f, memo: e.target.value}))}
              placeholder="任意"
              style={{width:'100%', padding:'10px 12px', border:'1.5px solid var(--border)', borderRadius:8, fontSize:15, marginBottom:20}} />

            <div style={{display:'flex', gap:8}}>
              <button onClick={() => setShowLogForm(false)} style={{flex:1, padding:'12px', border:'1px solid var(--border)', borderRadius:10, background:'#fff', fontSize:15, cursor:'pointer'}}>キャンセル</button>
              <button onClick={saveLog} style={{flex:2, padding:'12px', border:'none', borderRadius:10, background:'var(--accent)', color:'#fff', fontSize:15, fontWeight:700, cursor:'pointer'}}>保存</button>
            </div>
          </div>
        </div>
      )}

      {/* サマリーカード */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:20}}>
        {[
          { label:'アクティブタスク', value: activeTasks,           color:'var(--accent)' },
          { label:'完了タスク',       value: completedTasks.length, color:'var(--success)' },
          { label:'クライアント数',   value: clients.length,        color:'#8B5CF6' },
          { label:'サスペクト数',     value: suspects.length,       color:'#F59E0B' },
        ].map(s => (
          <div key={s.label} className="card" style={{textAlign:'center', padding:'14px 8px'}}>
            <div style={{fontSize:28, fontWeight:800, color:s.color}}>{s.value}</div>
            <div style={{fontSize:11, color:'var(--text-sub)', marginTop:2}}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* バックアップ */}
      <div className="card" style={{marginBottom:16}}>
        <div style={{fontSize:15, fontWeight:700, marginBottom:4}}>🔒 データバックアップ</div>
        <div style={{fontSize:12, color:'var(--text-sub)', marginBottom:14, lineHeight:1.6}}>
          打ち込んだデータをファイルに保存します。<br/>
          Safariのデータ消去や機種変更の前にかならず書き出してください。
        </div>

        {/* 書き出し */}
        <button onClick={handleExport} style={{
          display:'block', width:'100%', padding:'13px',
          background:'var(--accent)', color:'#fff',
          border:'none', borderRadius:10, fontSize:15, fontWeight:700,
          marginBottom:10, cursor:'pointer',
        }}>
          📤 バックアップを書き出す
        </button>

        {/* 読み込み */}
        <label style={{
          display:'block', width:'100%', padding:'13px',
          background:'var(--bg)', color:'var(--text)',
          border:'2px dashed var(--border)', borderRadius:10,
          fontSize:15, fontWeight:700, textAlign:'center', cursor:'pointer',
        }}>
          📥 バックアップから復元する
          <input type="file" accept=".json" onChange={handleImport}
            style={{display:'none'}} />
        </label>

        {restoreMsg && (
          <div style={{marginTop:10, fontSize:13, textAlign:'center', color: restoreMsg.startsWith('✅') ? 'var(--success)' : 'var(--danger)'}}>
            {restoreMsg}
          </div>
        )}
      </div>

      {/* 復元確認ダイアログ */}
      {confirmRestore && (
        <div style={{
          position:'fixed', inset:0, background:'rgba(0,0,0,0.5)',
          display:'flex', alignItems:'center', justifyContent:'center',
          zIndex:200, padding:20,
        }}>
          <div style={{background:'#fff', borderRadius:16, padding:24, width:'100%', maxWidth:340}}>
            <div style={{fontSize:16, fontWeight:700, marginBottom:8}}>データを復元しますか？</div>
            <div style={{fontSize:13, color:'var(--text-sub)', marginBottom:6, lineHeight:1.6}}>
              バックアップファイルの内容：
            </div>
            <div style={{fontSize:13, background:'var(--bg)', borderRadius:8, padding:10, marginBottom:16}}>
              📋 タスク: {confirmRestore.tasks?.length || 0}件<br/>
              👥 クライアント: {confirmRestore.clients?.length || 0}件<br/>
              🎯 サスペクト: {confirmRestore.suspects?.length || 0}件<br/>
              🗓 保存日: {confirmRestore.exportedAt ? new Date(confirmRestore.exportedAt).toLocaleDateString('ja-JP') : '不明'}
            </div>
            <div style={{fontSize:12, color:'var(--danger)', marginBottom:16}}>
              ⚠️ 現在のデータはすべて上書きされます
            </div>
            <div style={{display:'flex', gap:8}}>
              <button onClick={() => setConfirmRestore(null)} style={{
                flex:1, padding:'11px', border:'1px solid var(--border)',
                borderRadius:8, background:'#fff', fontSize:14, cursor:'pointer',
              }}>キャンセル</button>
              <button onClick={doRestore} style={{
                flex:1, padding:'11px', border:'none',
                borderRadius:8, background:'var(--danger)', color:'#fff',
                fontSize:14, fontWeight:700, cursor:'pointer',
              }}>復元する</button>
            </div>
          </div>
        </div>
      )}

      {/* 完了タスク履歴 */}
      <div className="card">
        <div style={{fontSize:14, fontWeight:700, marginBottom:12, color:'var(--text-sub)'}}>
          ✅ 完了したタスク
        </div>
        {recentDone.length === 0 ? (
          <div style={{textAlign:'center', color:'var(--text-sub)', padding:'20px 0', fontSize:13}}>
            完了タスクはまだありません
          </div>
        ) : (
          recentDone.map(t => (
            <div key={t.id} style={{
              display:'flex', alignItems:'center', gap:8,
              padding:'8px 0', borderBottom:'1px solid var(--border)'
            }}>
              <div style={{
                width:8, height:8, borderRadius:'50%',
                background:'var(--success)', flexShrink:0
              }} />
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontSize:13, fontWeight:500, textDecoration:'line-through', color:'var(--text-sub)'}}>
                  {t.title}
                </div>
                {t.clientId && clientName(t.clientId) && (
                  <div style={{fontSize:11, color:'var(--text-sub)', marginTop:1}}>
                    👤 {clientName(t.clientId)}
                  </div>
                )}
              </div>
            </div>
          ))
        )}
      </div>
    </div>
  );
}

// ── Bottom Nav Config ─────────────────────────────────────────
const TABS = [
  { id:'today',    label:'今日',       icon:'✓'  },
  { id:'gantt',    label:'ガント',     icon:'📊' },
  { id:'matrix',   label:'マトリクス', icon:'▦'  },
  { id:'clients',  label:'クライアント', icon:'👥' },
  { id:'vision',   label:'ビジョン',   icon:'⭐' },
  { id:'log',      label:'ログ',       icon:'📝' },
  { id:'suspects', label:'サスペクト', icon:'🎯' },
];

// ── App ───────────────────────────────────────────────────────
function App() {
  const [tab, setTab]         = useState('today');
  const [tasks,    setTasks]    = useLS('ml_tasks_v1', []);
  const [clients,  setClients]  = useLS('ml_clients_v1', []);
  const [suspects, setSuspects] = useLS('ml_suspects_v1', []);
  const [vision,   setVision]   = useLS('ml_vision_v1', {});
  const [sales,    setSales]    = useLS('ml_sales_v1',  { target:0, current:0, label:'今月' });
  const [logs,     setLogs]     = useLS('ml_logs_v1',   []);

  const [taskDrawer,    setTaskDrawer]    = useState(null);
  const [clientDrawer,  setClientDrawer]  = useState(null);
  const [suspectDrawer, setSuspectDrawer] = useState(null);

  // Task CRUD
  const upsertTask = t => setTasks(prev => {
    const i = prev.findIndex(x => x.id===t.id);
    if (i>=0) { const a=[...prev]; a[i]=t; return a; }
    return [t, ...prev];
  });
  const toggleTask = id => setTasks(prev => prev.map(t => t.id===id ? {...t, completed:!t.completed} : t));
  const deleteTask = id => setTasks(prev => prev.filter(t => t.id!==id));

  // Client CRUD
  const upsertClient = c => setClients(prev => {
    const i = prev.findIndex(x => x.id===c.id);
    if (i>=0) { const a=[...prev]; a[i]=c; return a; }
    return [c, ...prev];
  });
  const deleteClient = id => setClients(prev => prev.filter(c => c.id!==id));

  // Suspect CRUD
  const upsertSuspect = s => setSuspects(prev => {
    const i = prev.findIndex(x => x.id===s.id);
    if (i>=0) { const a=[...prev]; a[i]=s; return a; }
    return [s, ...prev];
  });
  const deleteSuspect = id => setSuspects(prev => prev.filter(s => s.id!==id));

  const updateVision = (key, val) => setVision(prev => ({...prev, [key]: val}));

  const showFab = tab==='today' || tab==='clients' || tab==='suspects';

  return (
    <>
      <div className="header">
        <div className="header-row">
          <h1>Medilife</h1>
          <span className="header-date">{todayFull()}</span>
        </div>
      </div>

      <div className="content">
        {tab==='today' && (
          <TodayTab tasks={tasks} clients={clients}
            onToggle={toggleTask}
            onEdit={t => {
              if (t._saveOnly) {
                // ステップのチェックだけ保存してドロワーを開かない
                const {_saveOnly, ...taskData} = t;
                setTasks(prev => prev.map(p => p.id===taskData.id ? taskData : p));
              } else {
                setTaskDrawer(t);
              }
            }}
            onDelete={deleteTask}
            sales={sales} onSalesChange={setSales} />
        )}
        {tab==='gantt'    && <GanttTab tasks={tasks} clients={clients} />}
        {tab==='matrix'   && <MatrixTab tasks={tasks} clients={clients} />}
        {tab==='clients'  && (
          <ClientsTab clients={clients} tasks={tasks}
            onAdd={() => setClientDrawer('new')}
            onEdit={c => setClientDrawer(c)}
            onDelete={deleteClient} />
        )}
        {tab==='suspects' && (
          <SuspectsTab suspects={suspects}
            onAdd={() => setSuspectDrawer('new')}
            onEdit={s => setSuspectDrawer(s)}
            onDelete={deleteSuspect} />
        )}
        {tab==='vision'   && <VisionTab vision={vision} onChange={updateVision} tasks={tasks} clients={clients} />}
        {tab==='log'      && <LogTab tasks={tasks} clients={clients} suspects={suspects} vision={vision} sales={sales}
            logs={logs} onLogsChange={setLogs}
            onRestore={(data) => {
              if (data.tasks)    setTasks(data.tasks);
              if (data.clients)  setClients(data.clients);
              if (data.suspects) setSuspects(data.suspects);
              if (data.vision)   setVision(data.vision);
              if (data.sales)    setSales(data.sales);
              if (data.logs)     setLogs(data.logs);
            }} />}
      </div>

      {showFab && (
        <button className="fab"
          onClick={() => tab==='today' ? setTaskDrawer('new') : tab==='clients' ? setClientDrawer('new') : setSuspectDrawer('new')}>
          +
        </button>
      )}

      <div className="bottom-nav">
        {TABS.map(t => (
          <button key={t.id} className={`nav-item ${tab===t.id ? 'active' : ''}`} onClick={() => setTab(t.id)}>
            <div className="nav-icon"
              style={{color: tab===t.id ? 'var(--accent)' : 'var(--text-sub)'}}>
              {t.icon}
            </div>
            <span className="nav-label">{t.label}</span>
          </button>
        ))}
      </div>

      {taskDrawer && (
        <TaskDrawer
          clients={clients}
          editing={taskDrawer==='new' ? null : taskDrawer}
          onSave={upsertTask}
          onClose={() => setTaskDrawer(null)}
        />
      )}

      {clientDrawer && (
        <ClientDrawer
          editing={clientDrawer==='new' ? null : clientDrawer}
          onSave={upsertClient}
          onClose={() => setClientDrawer(null)}
        />
      )}
      {suspectDrawer && (
        <SuspectDrawer
          editing={suspectDrawer==='new' ? null : suspectDrawer}
          onSave={upsertSuspect}
          onClose={() => setSuspectDrawer(null)}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
