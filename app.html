<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Medilife 業務管理</title>
  <!-- iPhone ホーム画面追加対応 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Medilife">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#5B5BD6">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%235B5BD6'/><text y='68' x='50' text-anchor='middle' font-size='55'>📋</text></svg>">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #5B5BD6;
      --accent-light: #EEEEFF;
      --bg: #F6F6F8;
      --surface: #FFFFFF;
      --border: #E4E4E8;
      --text: #18181B;
      --text-sub: #71717A;
      --danger: #EF4444;
      --warning: #F59E0B;
      --success: #22C55E;
      --nav-h: 64px;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }

    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Hiragino Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      font-size: 15px;
      line-height: 1.5;
      overscroll-behavior: none;
    }

    #root {
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 12px;
      padding-top: calc(14px + var(--safe-t));
    }
    .header-row { display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; color: var(--accent); }
    .header-date { font-size: 12px; color: var(--text-sub); font-weight: 500; }

    /* ── Content ── */
    .content {
      padding: 14px 14px;
      padding-bottom: calc(var(--nav-h) + var(--safe-b) + 72px);
    }

    /* ── Bottom Nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: var(--safe-b);
      z-index: 20;
      height: calc(var(--nav-h) + var(--safe-b));
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6px 2px 4px;
      cursor: pointer;
      border: none;
      background: none;
      gap: 2px;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.1s;
    }
    .nav-item:active { opacity: 0.5; }
    .nav-icon {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
      font-size: 17px;
      transition: background 0.15s;
    }
    .nav-item.active .nav-icon { background: var(--accent-light); }
    .nav-label { font-size: 10px; font-weight: 600; color: var(--text-sub); }
    .nav-item.active .nav-label { color: var(--accent); }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
    }
    .card-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 14px;
      letter-spacing: -0.4px;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 5px;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; border: none;
      transition: opacity 0.1s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: 0.7; transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost { background: transparent; color: var(--text-sub); padding: 6px 8px; font-size: 16px; }
    .btn-danger { color: var(--danger); background: #FEF2F2; }
    .btn-sm { padding: 6px 10px; font-size: 13px; border-radius: 8px; }
    .btn-full { width: 100%; }

    /* ── Form ── */
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 13px; font-weight: 600; color: var(--text-sub); margin-bottom: 6px; display: block; }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 11px 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px; font-family: inherit;
      background: var(--bg); color: var(--text);
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      -webkit-appearance: none;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--accent);
      background: var(--surface);
    }
    .form-textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

    .toggle-group { display: flex; gap: 6px; }
    .toggle-btn {
      flex: 1; padding: 9px 6px;
      border-radius: 9px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      font-size: 13px; font-weight: 600;
      cursor: pointer; text-align: center;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .toggle-btn.sel-red { border-color: var(--danger); background: #FEF2F2; color: var(--danger); }
    .toggle-btn.sel-blue { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }

    /* ── Task Item ── */
    .task-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
    }
    .task-item:last-child { border-bottom: none; }
    .task-check {
      width: 23px; height: 23px; border-radius: 7px;
      border: 2px solid var(--border);
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; margin-top: 1px;
      -webkit-tap-highlight-color: transparent;
    }
    .task-check.done { background: var(--accent); border-color: var(--accent); }
    .task-check.done::after { content: '✓'; color: #fff; font-size: 12px; font-weight: 800; }
    .task-body { flex: 1; min-width: 0; cursor: pointer; }
    .task-name { font-size: 15px; font-weight: 500; word-break: break-all; }
    .task-name.done { text-decoration: line-through; color: var(--text-sub); }
    .task-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
    .tag {
      display: inline-flex; align-items: center;
      padding: 2px 7px; border-radius: 5px;
      font-size: 11px; font-weight: 600;
    }
    .tag-date { background: #F0F0F5; color: #555; }
    .tag-client { background: var(--accent-light); color: var(--accent); }
    .tag-imp { background: #FEF2F2; color: #DC2626; }
    .tag-urg { background: #FFF7ED; color: #C2410C; }

    /* ── Matrix ── */
    .matrix-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .matrix-cell {
      border-radius: 12px; padding: 12px; min-height: 110px;
    }
    .mc-q1 { background: #FEF2F2; border: 1.5px solid #FECACA; }
    .mc-q2 { background: #EFF6FF; border: 1.5px solid #BFDBFE; }
    .mc-q3 { background: #FFFBEB; border: 1.5px solid #FDE68A; }
    .mc-q4 { background: #F0FDF4; border: 1.5px solid #BBF7D0; }
    .mc-label { font-size: 12px; font-weight: 800; margin-bottom: 2px; }
    .mc-q1 .mc-label { color: #DC2626; }
    .mc-q2 .mc-label { color: #2563EB; }
    .mc-q3 .mc-label { color: #D97706; }
    .mc-q4 .mc-label { color: #16A34A; }
    .mc-sub { font-size: 10px; opacity: 0.6; margin-bottom: 8px; font-weight: 500; }
    .mc-task { font-size: 12px; padding: 3px 0; border-bottom: 1px solid rgba(0,0,0,0.06); line-height: 1.4; }
    .mc-task:last-child { border-bottom: none; }
    .matrix-axis {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      margin-bottom: 4px;
    }
    .ax { text-align: center; font-size: 11px; font-weight: 700; color: var(--text-sub); padding: 3px 0; }

    /* ── Client ── */
    .client-item {
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .client-item:last-child { border-bottom: none; }
    .client-top { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .client-name { font-size: 16px; font-weight: 700; }
    .client-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .cat-badge {
      padding: 3px 9px; border-radius: 6px;
      font-size: 11px; font-weight: 700;
    }
    .cat-etax { background: #EDE9FE; color: #7C3AED; }
    .cat-april { background: #FEF9C3; color: #92400E; }
    .cat-other { background: #F3F4F6; color: #4B5563; }
    .client-info-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px; margin-top: 8px;
    }
    .client-info-item {
      background: var(--bg); border-radius: 8px;
      padding: 7px 10px;
    }
    .client-info-label { font-size: 10px; font-weight: 700; color: var(--text-sub); margin-bottom: 2px; letter-spacing: 0.3px; }
    .client-info-value { font-size: 13px; font-weight: 600; color: var(--text); }
    .client-info-full { grid-column: 1 / -1; }
    .client-help { font-size: 13px; color: var(--text-sub); white-space: pre-wrap; line-height: 1.5; }
    .ac-value { color: var(--accent); font-size: 15px; font-weight: 800; }
    .task-badge {
      background: var(--accent); color: #fff;
      border-radius: 10px; padding: 1px 7px;
      font-size: 11px; font-weight: 700;
    }

    /* ── 神メモ Vision ── */
    .km-band {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    /* 3列グリッド：タスク左 | 神センター | タスク右 */
    .km-grid { display: grid; grid-template-columns: 1fr 1.5fr 1fr; }
    /* ヘッダー行 */
    .km-head-cell {
      padding: 8px 6px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      text-align: center;
    }
    .km-head-cell:last-child { border-right: none; }
    .km-head-tag { font-size: 9px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.4px; }
    .km-head-period { font-size: 12px; font-weight: 800; color: var(--text); margin-top: 1px; }
    .km-head-center { }
    .km-head-axis { font-size: 15px; font-weight: 800; margin-top: 1px; }
    .km-head-sub { font-size: 9px; font-weight: 500; opacity: 0.65; margin-top: 1px; }
    /* データセル */
    .km-data-cell {
      padding: 8px 6px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    .km-data-cell:last-child { border-right: none; }
    .km-data-cell.km-last-row { border-bottom: none; }
    .km-data-label {
      font-size: 9px; font-weight: 700;
      color: var(--text-sub); margin-bottom: 4px;
      letter-spacing: 0.3px;
    }
    .km-data-hint {
      font-size: 9px; color: var(--text-sub);
      line-height: 1.4; margin-bottom: 5px;
    }
    .km-ta {
      width: 100%; border: 1.5px solid var(--border);
      background: var(--bg); border-radius: 6px;
      padding: 6px; font-size: 11px; font-family: inherit;
      color: var(--text); resize: none; outline: none;
      min-height: 68px; line-height: 1.4;
      transition: border-color 0.15s, background 0.15s;
    }
    .km-ta:focus { border-color: var(--accent); background: var(--surface); }
    .km-ta::placeholder { color: #C4C4CC; font-size: 10px; }
    .km-ta-center { background: var(--surface); }

    /* ── Calendar ── */
    .cal-wrap {
      border-radius: 14px; overflow: hidden;
      border: 1px solid var(--border);
    }
    .cal-wrap iframe {
      display: block; width: 100%; border: none;
      height: calc(100dvh - 170px);
      min-height: 400px;
    }

    /* ── Drawer / Modal ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 50;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .drawer {
      background: var(--surface);
      border-radius: 22px 22px 0 0;
      padding: 18px 16px;
      padding-bottom: calc(24px + var(--safe-b));
      width: 100%; max-width: 430px;
      max-height: 92vh; overflow-y: auto;
    }
    .drawer-handle {
      width: 38px; height: 4px;
      background: var(--border);
      border-radius: 2px; margin: 0 auto 18px;
    }
    .drawer-title { font-size: 19px; font-weight: 800; margin-bottom: 18px; letter-spacing: -0.4px; }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: calc(var(--nav-h) + var(--safe-b) + 14px);
      right: calc(50% - 215px + 14px);
      width: 54px; height: 54px;
      border-radius: 50%;
      background: var(--accent); color: #fff;
      border: none; font-size: 26px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(91,91,214,0.45);
      z-index: 30;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s;
    }
    .fab:active { transform: scale(0.91); }

    /* ── Empty ── */
    .empty { text-align: center; padding: 28px 16px; color: var(--text-sub); font-size: 13px; }
    .empty-icon { font-size: 34px; margin-bottom: 8px; }

    /* ── Misc ── */
    .filter-row { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 2px; }
    .filter-btn {
      padding: 5px 12px; border-radius: 20px;
      border: none; cursor: pointer;
      font-size: 13px; font-weight: 600;
      white-space: nowrap; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
    }
    .overdue-card { background: #FEF2F2 !important; border-color: #FECACA !important; }
    .overdue-title { color: #DC2626 !important; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;

// ── Utils ────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2, 9);
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const JP_DAY = ['日','月','火','水','木','金','土'];
const todayFull = () => {
  const d = new Date();
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${JP_DAY[d.getDay()]}）`;
};
const fmtDate = (s) => {
  if (!s) return '';
  const [, m, d] = s.split('-');
  return `${parseInt(m)}/${parseInt(d)}`;
};

// タスク → Googleカレンダー新規イベントURL
const toGCalUrl = (task) => {
  const title = encodeURIComponent(task.title);
  let dates = '';
  if (task.date) {
    const d = task.date.replace(/-/g, '');
    // 終日イベント：翌日を終了日にする
    const next = new Date(task.date);
    next.setDate(next.getDate() + 1);
    const nd = next.toISOString().split('T')[0].replace(/-/g, '');
    dates = `&dates=${d}/${nd}`;
  }
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}${dates}`;
};

// 神メモ軸カラー
const KM_AXIS_MAP = {
  'ロマン':   { color: '#7C3AED', bg: '#F5F3FF' },
  'ソロバン': { color: '#2563EB', bg: '#EFF6FF' },
  'チャージ': { color: '#059669', bg: '#ECFDF5' },
};
const KM_AXES = ['ロマン', 'ソロバン', 'チャージ'];

// ── Log constants ─────────────────────────────────────────────
const LOG_CATS = [
  { id: 'call',     label: '📞 電話/商談', color: '#2563EB', bg: '#EFF6FF' },
  { id: 'meeting',  label: '🤝 会議',      color: '#7C3AED', bg: '#F5F3FF' },
  { id: 'admin',    label: '📝 事務',      color: '#D97706', bg: '#FFFBEB' },
  { id: 'create',   label: '💻 資料作成',  color: '#0891B2', bg: '#ECFEFF' },
  { id: 'travel',   label: '🚗 移動',      color: '#059669', bg: '#ECFDF5' },
  { id: 'learning', label: '📚 学習',      color: '#DC2626', bg: '#FEF2F2' },
  { id: 'other',    label: 'その他',       color: '#6B7280', bg: '#F3F4F6' },
];
const fmtDur = m => {
  if (!m) return '—';
  if (m < 60) return `${m}分`;
  const h = Math.floor(m / 60), min = m % 60;
  return min ? `${h}時間${min}分` : `${h}時間`;
};
const logCat = id => LOG_CATS.find(c => c.id === id) || LOG_CATS[LOG_CATS.length - 1];
const shiftDate = (dateStr, delta) => {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

const AxisBadge = ({ axis }) => {
  if (!axis) return null;
  const a = KM_AXIS_MAP[axis];
  if (!a) return null;
  return (
    <span style={{
      display:'inline-flex', alignItems:'center',
      padding:'2px 7px', borderRadius:5,
      fontSize:11, fontWeight:700,
      background: a.bg, color: a.color,
    }}>{axis}</span>
  );
};

// タスク日付 → 残り日数
const daysUntil = (dateStr) => {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  // ローカル時間でパース（UTCにするとJSTでズレる）
  const [y, m, d] = dateStr.split('-').map(Number);
  const target = new Date(y, m - 1, d);
  return Math.ceil((target - today) / 86400000);
};

// ── localStorage hook ────────────────────────────────────────
function useLS(key, init) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; }
    catch { return init; }
  });
  const set = useCallback(v => {
    setVal(prev => {
      const next = typeof v === 'function' ? v(prev) : v;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [key]);
  return [val, set];
}

// ── Task Drawer ───────────────────────────────────────────────
function TaskDrawer({ clients, editing, onSave, onClose }) {
  // デフォルト値を先に設定し、editing で上書き（rowType など古いタスクに無いフィールドを補完）
  const [form, setForm] = useState({
    title: '', date: '', importance: 1, urgency: 1,
    clientId: '', rowType: 'work', axis: '', recurrence: 'none', completed: false,
    steps: [],
    ...(editing || {}),
  });
  const s = k => v => setForm(f => ({ ...f, [k]: v }));

  const addStep = () => setForm(f => ({ ...f, steps: [...(f.steps||[]), { id: uid(), text: '', done: false }] }));
  const updateStep = (id, text) => setForm(f => ({ ...f, steps: f.steps.map(st => st.id===id ? {...st, text} : st) }));
  const removeStep = id => setForm(f => ({ ...f, steps: f.steps.filter(st => st.id!==id) }));

  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="drawer">
        <div className="drawer-handle"/>
        <div className="drawer-title">{editing ? 'タスク編集' : 'タスク追加'}</div>

        <div className="form-group">
          <label className="form-label">タスク名</label>
          <input className="form-input" placeholder="タスク名を入力..." value={form.title}
            onChange={e => s('title')(e.target.value)} autoFocus />
        </div>

        <div className="form-group">
          <label className="form-label">繰り返し</label>
          <div className="toggle-group">
            <button className={`toggle-btn ${form.recurrence==='none'||!form.recurrence ? 'sel-blue' : ''}`}
              onClick={() => s('recurrence')('none')}>なし</button>
            <button className={`toggle-btn ${form.recurrence==='daily' ? 'sel-blue' : ''}`}
              onClick={() => s('recurrence')('daily')}>🔁 毎日</button>

// ── Tab: Today ────────────────────────────────────────────────
function TodayTab({ tasks, clients, onToggle, onToggleStep, onEdit, onDelete }) {
  const td = todayStr();
  const todayDate = new Date();
  const clientName = id => clients.find(c => c.id === id)?.name;
  const [showDone, setShowDone] = useState(false);

  const isRecurring = t => t.recurrence && t.recurrence !== 'none';

  // 完了フォルダー（全タスクの完了済み）
  const doneTasks = tasks.filter(t => t.completed);

  // 繰り返しタスク（未完了のみ表示）
  const recurringToday = tasks.filter(t => {
    if (!isRecurring(t) || t.completed) return false;
    if (t.recurrence === 'daily') return true;
    if (t.recurrence === 'monthly' && t.date) {
      return new Date(t.date + 'T00:00:00').getDate() === todayDate.getDate();
    }
    return false;
  });

  // 通常タスク（未完了のみ）
  const onceOnly = tasks.filter(t => !isRecurring(t) && !t.completed);
  const todayTasks = onceOnly.filter(t => t.date === td);
  const overdue    = onceOnly.filter(t => t.date && t.date < td);
  const upcoming   = onceOnly.filter(t => t.date && t.date > td);
  const undated    = onceOnly.filter(t => !t.date);

  const RecurBadge = ({ t }) => {
    if (t.recurrence === 'daily') return (
      <span style={{fontSize:11, background:'#ECFDF5', color:'#059669',
        border:'1px solid #A7F3D0', borderRadius:4, padding:'1px 5px', fontWeight:600}}>🔁 毎日</span>
    );
    if (t.recurrence === 'monthly' && t.date) {
      const day = new Date(t.date + 'T00:00:00').getDate();
      return (
        <span style={{fontSize:11, background:'#EFF6FF', color:'#2563EB',
          border:'1px solid #BFDBFE', borderRadius:4, padding:'1px 5px', fontWeight:600}}>📅 毎月{day}日</span>
      );
    }
    return null;
  };

  // 通常タスク行
  const TaskRow = ({ t, hideDate }) => {
    const steps = t.steps || [];
    const doneCount = steps.filter(st => st.done).length;
    return (
      <div className="task-item">
        <div className="task-check" onClick={() => onToggle(t.id)} />
        <div className="task-body" onClick={() => onEdit(t)}>
          <div className="task-name">{t.title}</div>
          <div className="task-tags">
            {isRecurring(t)
              ? <RecurBadge t={t} />
              : (!hideDate && t.date && t.date !== td) && <span className="tag tag-date">{fmtDate(t.date)}</span>}
            {t.importance === 1 && <span className="tag tag-imp">重要</span>}
            {t.urgency === 1    && <span className="tag tag-urg">緊急</span>}
            {clientName(t.clientId) && <span className="tag tag-client">{clientName(t.clientId)}</span>}
            {t.axis && <AxisBadge axis={t.axis} />}
            {steps.length > 0 && (
              <span style={{fontSize:11, fontWeight:700, padding:'2px 7px', borderRadius:5,
                background: doneCount===steps.length ? '#ECFDF5' : '#F0F0F5',
                color: doneCount===steps.length ? '#059669' : '#555'}}>
                {doneCount}/{steps.length}
              </span>
            )}
          </div>
          {steps.length > 0 && (
            <div style={{marginTop:7, display:'flex', flexDirection:'column', gap:4}}>
              {steps.map(st => (
                <div key={st.id}
                  onClick={e => { e.stopPropagation(); onToggleStep(t.id, st.id); }}
                  style={{display:'flex', alignItems:'center', gap:7, cursor:'pointer'}}>
                  <div style={{
                    width:16, height:16, borderRadius:4, flexShrink:0,
                    border: st.done ? 'none' : '2px solid #CCC',
                    background: st.done ? 'var(--accent)' : 'transparent',
                    display:'flex', alignItems:'center', justifyContent:'center',
                  }}>
                    {st.done && <span style={{color:'#fff', fontSize:10, fontWeight:800}}>✓</span>}
                  </div>
                  <span style={{
                    fontSize:13, color: st.done ? 'var(--text-sub)' : 'var(--text)',
                    textDecoration: st.done ? 'line-through' : 'none',
                  }}>{st.text}</span>
                </div>
              ))}
            </div>
          )}
        </div>
        <a href={toGCalUrl(t)} target="_blank" rel="noreferrer"
          style={{color:'#AAA', fontSize:16, padding:'4px 6px', textDecoration:'none', lineHeight:1}}
          title="Googleカレンダーに追加">📅</a>
        <button className="btn btn-ghost" style={{color:'#CCC',padding:'4px 6px'}} onClick={() => onDelete(t.id)}>×</button>
      </div>
    );
  };

  // 完了フォルダー内のタスク行
  const DoneRow = ({ t }) => (
    <div style={{
      display:'flex', alignItems:'center', gap:8,
      padding:'10px 0', borderBottom:'1px solid var(--border)',
    }}>
      <div className="task-check done" style={{flexShrink:0}} />
      <div style={{flex:1, minWidth:0}}>
        <div style={{fontSize:14, fontWeight:500, textDecoration:'line-through',
          color:'var(--text-sub)', wordBreak:'break-all'}}>{t.title}</div>
        {t.date && <div style={{fontSize:11, color:'var(--text-sub)', marginTop:2}}>{fmtDate(t.date)}</div>}
      </div>
      <button
        onClick={() => onToggle(t.id)}
        style={{
          fontSize:12, fontWeight:700, padding:'5px 10px', borderRadius:8,
          border:'1.5px solid var(--accent)', background:'var(--accent-light)',
          color:'var(--accent)', cursor:'pointer', whiteSpace:'nowrap', flexShrink:0,
        }}>↩ 戻す</button>
      <button
        onClick={() => onDelete(t.id)}
        style={{
          fontSize:12, fontWeight:700, padding:'5px 10px', borderRadius:8,
          border:'1.5px solid var(--danger)', background:'#FEF2F2',
          color:'var(--danger)', cursor:'pointer', whiteSpace:'nowrap', flexShrink:0,
        }}>🗑 消去</button>
    </div>
  );

  return (
    <div>
      <div style={{fontSize:13, color:'var(--text-sub)', fontWeight:500, marginBottom:12}}>{todayFull()}</div>

      {recurringToday.length > 0 && (
        <div className="card">
          <div className="card-title">🔁 定期タスク</div>
          {recurringToday.map(t => <TaskRow key={t.id} t={t} hideDate />)}
        </div>
      )}

      {overdue.length > 0 && (
        <div className="card overdue-card">
          <div className="card-title overdue-title">⚠ 未完了（期限切れ {overdue.length}件）</div>
          {overdue.map(t => <TaskRow key={t.id} t={t} />)}
        </div>
      )}

      <div className="card">
        <div className="card-title">今日のタスク</div>
        {todayTasks.length === 0
          ? <div className="empty"><div className="empty-icon">✓</div><div>本日のタスクはありません</div></div>
          : todayTasks.map(t => <TaskRow key={t.id} t={t} hideDate />)
        }
      </div>

      {upcoming.length > 0 && (
        <div className="card">
          <div className="card-title">今後の予定</div>
          {upcoming.map(t => <TaskRow key={t.id} t={t} />)}
        </div>
      )}

      {undated.length > 0 && (
        <div className="card">
          <div className="card-title" style={{color:'var(--text-sub)'}}>📋 日付未定</div>
          {undated.map(t => <TaskRow key={t.id} t={t} hideDate />)}
        </div>
      )}

      {/* 完了フォルダー */}
      <div className="card" style={{marginTop:8}}>
        <div
          className="card-title"
          onClick={() => setShowDone(v => !v)}
          style={{
            display:'flex', justifyContent:'space-between', alignItems:'center',
            cursor:'pointer', userSelect:'none',
            color: doneTasks.length > 0 ? 'var(--text)' : 'var(--text-sub)',
          }}>
          <span>✅ 完了フォルダー {doneTasks.length > 0 && <span style={{
            fontSize:12, background:'var(--success)', color:'#fff',
            borderRadius:10, padding:'1px 7px', marginLeft:4, fontWeight:700,
          }}>{doneTasks.length}</span>}</span>
          <span style={{fontSize:13, color:'var(--text-sub)'}}>{showDone ? '▲' : '▼'}</span>
        </div>
        {showDone && (
          doneTasks.length === 0
            ? <div className="empty" style={{padding:'16px 0'}}>
                <div>完了済みタスクはありません</div>
              </div>
            : doneTasks.map(t => <DoneRow key={t.id} t={t} />)
        )}
      </div>
    </div>
  );
}

// ── Tab: Matrix ───────────────────────────────────────────────
function MatrixTab({ tasks, clients }) {
  const active = tasks.filter(t => !t.completed);
  const cn = id => clients.find(c => c.id === id)?.name;

  const quads = [
    { imp:1, urg:1, cls:'mc-q1', badge:'🔴', label:'すぐやる',  sub:'重要 × 緊急' },
    { imp:1, urg:0, cls:'mc-q2', badge:'🔵', label:'計画する',  sub:'重要 × 非緊急' },
    { imp:0, urg:1, cls:'mc-q3', badge:'🟡', label:'委任する',  sub:'通常 × 緊急' },
    { imp:0, urg:0, cls:'mc-q4', badge:'🟢', label:'減らす',    sub:'通常 × 非緊急' },
  ];

  return (
    <div>
      <div className="section-title">タスクマトリクス</div>

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', marginBottom:6, paddingLeft:2}}>
        <div style={{textAlign:'center', fontSize:11, fontWeight:700, color:'#DC2626', padding:'4px 0'}}>← 緊急</div>
        <div style={{textAlign:'center', fontSize:11, fontWeight:700, color:'var(--text-sub)', padding:'4px 0'}}>非緊急 →</div>
      </div>

      <div className="matrix-grid">
        {quads.map(q => {
          const items = active.filter(t => t.importance===q.imp && t.urgency===q.urg);
          return (
            <div key={q.label} className={`matrix-cell ${q.cls}`}>
              <div className="mc-label">{q.badge} {q.label}</div>
              <div className="mc-sub">{q.sub}</div>
              {items.length === 0
                ? <div style={{fontSize:11, opacity:0.35}}>タスクなし</div>
                : items.map(t => (
                    <div key={t.id} className="mc-task">
                      · {t.title}
                      {cn(t.clientId) && <span style={{opacity:0.6}}> ({cn(t.clientId)})</span>}
                      {t.date && <span style={{opacity:0.5, fontSize:10}}> {fmtDate(t.date)}</span>}
                    </div>
                  ))
              }
            </div>
          );
        })}
      </div>

      <div style={{marginTop:12, padding:'10px 12px', background:'var(--surface)', borderRadius:10, border:'1px solid var(--border)'}}>
        <div style={{fontSize:11, color:'var(--text-sub)', lineHeight:1.7}}>
          タスク追加時に重要度・緊急度を設定するとここに自動分類されます。
        </div>
      </div>
    </div>
  );
}

      })}

// ── Tab: Gantt ────────────────────────────────────────────────
function GanttTab({ tasks, clients }) {
  const CELL_W    = 34;   // 1日あたりの幅(px)
  const LABEL_W   = 108;  // 左ラベル幅(px)
  const DAYS_BEFORE = 4;  // 今日より前を何日表示するか
  const DAYS_TOTAL  = 56; // 合計8週間

  const todayD = new Date(); todayD.setHours(0,0,0,0);
  const startD = new Date(todayD); startD.setDate(startD.getDate() - DAYS_BEFORE);

  const toStr = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const todaySt = toStr(todayD);

  // 日付配列を生成
  const dates = Array.from({ length: DAYS_TOTAL }, (_, i) => {
    const d = new Date(startD);
    d.setDate(d.getDate() + i);
    return d;
  });

  // 月ヘッダーグループ
  const monthGroups = [];
  dates.forEach((d, i) => {
    const label = `${d.getMonth()+1}月`;
    if (!monthGroups.length || monthGroups[monthGroups.length-1].label !== label) {
      monthGroups.push({ label, start: i, count: 1 });
    } else {
      monthGroups[monthGroups.length-1].count++;
    }
  });

  const clientName = id => clients.find(c => c.id === id)?.name;

  // 日付あり・非繰り返しタスクを日付順に
  const scheduled = [...tasks]
    .filter(t => t.date && (!t.recurrence || t.recurrence === 'none'))
    .sort((a, b) => a.date.localeCompare(b.date));

  // ドットの色
  const dotColor = t => {
    if (t.completed) return '#D1D5DB';
    if (t.axis && KM_AXIS_MAP[t.axis]) return KM_AXIS_MAP[t.axis].color;
    if (t.importance === 1) return '#EF4444';
    return 'var(--accent)';
  };

  // 今日列へ自動スクロール
  const scrollRef = React.useRef(null);
  React.useEffect(() => {
    if (scrollRef.current) {
      scrollRef.current.scrollLeft = DAYS_BEFORE * CELL_W - 8;
    }
  }, []);

  const headerBg = '#FFFFFF';

  return (
    <div>
      <div className="section-title">ガントチャート</div>
      <p style={{fontSize:12, color:'var(--text-sub)', marginBottom:10, lineHeight:1.6}}>
        タスクの締切日を横軸で確認。横スクロールで8週先まで見えます。
      </p>

      {scheduled.length === 0 ? (
        <div className="empty" style={{marginTop:40}}>
          <div className="empty-icon">📊</div>
          <div>日付付きのタスクを追加すると<br/>ここに表示されます</div>
        </div>
      ) : (
        <div style={{overflowX:'auto', WebkitOverflowScrolling:'touch', borderRadius:12, border:'1px solid var(--border)'}} ref={scrollRef}>
          <div style={{minWidth: LABEL_W + CELL_W * DAYS_TOTAL}}>

            {/* 月ヘッダー */}
            <div style={{display:'flex', background: headerBg, borderBottom:'1px solid var(--border)'}}>
              <div style={{width:LABEL_W, flexShrink:0}} />
              {monthGroups.map((mg, i) => (
                <div key={i} style={{
                  width: CELL_W * mg.count, flexShrink:0,
                  fontSize:10, fontWeight:800, color:'var(--accent)',
                  padding:'4px 6px',
                  borderLeft: i > 0 ? '2px solid var(--accent)' : 'none',
                }}>{mg.label}</div>
              ))}
            </div>

            {/* 日付ヘッダー */}
            <div style={{display:'flex', background: headerBg, borderBottom:'2px solid var(--border)'}}>
              <div style={{
                width:LABEL_W, flexShrink:0,
                fontSize:10, fontWeight:600, color:'var(--text-sub)',
                padding:'4px 8px', display:'flex', alignItems:'center',
              }}>タスク名</div>
              {dates.map((d, i) => {
                const isToday  = toStr(d) === todaySt;
                const isSun    = d.getDay() === 0;
                const isSat    = d.getDay() === 6;
                return (
                  <div key={i} style={{
                    width:CELL_W, flexShrink:0, textAlign:'center', padding:'3px 0',
                    borderLeft:'1px solid var(--border)',
                    background: isToday ? 'var(--accent)' : isSun ? '#FEF2F2' : isSat ? '#EFF6FF' : '',
                  }}>
                    <div style={{fontSize:9, fontWeight:700,
                      color: isToday ? '#fff' : isSun ? '#EF4444' : isSat ? '#2563EB' : 'var(--text-sub)',
                    }}>{JP_DAY[d.getDay()]}</div>
                    <div style={{fontSize:11, fontWeight: isToday ? 800 : 500,
                      color: isToday ? '#fff' : isSun ? '#EF4444' : isSat ? '#2563EB' : 'var(--text)',
                    }}>{d.getDate()}</div>
                  </div>
                );
              })}
            </div>

            {/* タスク行 */}
            {scheduled.map((t, ti) => (
              <div key={t.id} style={{
                display:'flex', alignItems:'center',
                borderBottom: ti < scheduled.length-1 ? '1px solid var(--border)' : 'none',
                minHeight:44,
              }}>
                {/* 左ラベル */}
                <div style={{
                  width:LABEL_W, flexShrink:0, padding:'6px 8px',
                  borderRight:'1px solid var(--border)', alignSelf:'stretch',
                  display:'flex', flexDirection:'column', justifyContent:'center',
                }}>
                  <div style={{
                    fontSize:12, fontWeight:600, lineHeight:1.3,
                    whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
                    color: t.completed ? 'var(--text-sub)' : 'var(--text)',
                    textDecoration: t.completed ? 'line-through' : 'none',
                  }}>{t.title}</div>
                  {clientName(t.clientId) && (
                    <div style={{fontSize:10, color:'var(--text-sub)', marginTop:2,
                      whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>
                      👤 {clientName(t.clientId)}
                    </div>
                  )}
                  {t.axis && (
                    <div style={{fontSize:10, color: KM_AXIS_MAP[t.axis]?.color, marginTop:1, fontWeight:600}}>
                      {t.axis}
                    </div>
                  )}
                </div>

                {/* グリッドセル */}
                {dates.map((d, i) => {
                  const ds      = toStr(d);
                  const isToday = ds === todaySt;
                  const isSun   = d.getDay() === 0;
                  const isSat   = d.getDay() === 6;
                  const hit     = t.date === ds;
                  return (
                    <div key={i} style={{
                      width:CELL_W, flexShrink:0, height:44,
                      display:'flex', alignItems:'center', justifyContent:'center',
                      borderLeft:'1px solid var(--border)',
                      background: isToday ? '#EEEEFF' : isSun ? '#FFF8F8' : isSat ? '#F5F9FF' : ti%2===1 ? '#FAFAFA' : '',
                    }}>
                      {hit && (
                        <div style={{
                          width:14, height:14, borderRadius:'50%',
                          background: dotColor(t),
                          boxShadow:`0 0 0 4px ${dotColor(t)}30`,
                          flexShrink:0,
                        }} title={t.title} />
                      )}
                    </div>
                  );
                })}
              </div>
            ))}

          </div>
        </div>
      )}
    </div>
  );
}

                <option key={h} value={h}>{h}時間</option>

              合計 <span style={{fontWeight:700, color:'var(--accent)'}}>{fmtDur(form.duration)}</span>
            </div>

        </div>

        <div style={{display:'flex', gap:10}}>
          <div className="form-group" style={{flex:1}}>
            <label className="form-label">日付</label>
            <input className="form-input" type="date" value={form.date}
              onChange={e => s('date')(e.target.value)} />
          </div>
          <div className="form-group" style={{width:105}}>
            <label className="form-label">時刻</label>
            <input className="form-input" type="time" value={form.time}
              onChange={e => s('time')(e.target.value)} />

          <select className="form-select" value={form.clientId} onChange={e => s('clientId')(e.target.value)}>

          <label className="form-label">神メモ軸（任意）</label>

            <button className={`toggle-btn ${!form.axis ? 'sel-blue' : ''}`} onClick={() => s('axis')('')}>なし</button>
            {KM_AXES.map(ax => {
              const a = KM_AXIS_MAP[ax];
              return (
                <button key={ax} className="toggle-btn"
                  style={form.axis===ax ? {borderColor:a.color, background:a.bg, color:a.color} : {}}
                  onClick={() => s('axis')(ax)}>{ax}</button>

        </div>

    </div>
  );

// ── Tab: Log ──────────────────────────────────────────────────
function LogTab({ logs, clients, onEdit, onDelete }) {
  const [viewDate, setViewDate] = useState(todayStr());
  const [showWeekly, setShowWeekly] = useState(false);
  const clientName = id => clients.find(c => c.id === id)?.name;

  const dayEntries = [...logs]
    .filter(l => l.date === viewDate)
    .sort((a, b) => (b.time || '').localeCompare(a.time || ''));

  const totalMin = dayEntries.reduce((s, l) => s + (l.duration || 0), 0);

  const today = todayStr();
  const weekAgo = shiftDate(today, -6);
  const weekLogs = logs.filter(l => l.date >= weekAgo && l.date <= today);
  const weekTotal = weekLogs.reduce((s, l) => s + (l.duration || 0), 0);
  const catTotals = LOG_CATS.map(c => ({
    ...c,
    total: weekLogs.filter(l => l.category === c.id).reduce((s, l) => s + (l.duration || 0), 0),
  })).filter(c => c.total > 0).sort((a, b) => b.total - a.total);

  const dateLabel = (() => {
    if (viewDate === today) return `今日（${parseInt(today.slice(5,7))}/${parseInt(today.slice(8))}）`;
    const yest = shiftDate(today, -1);
    if (viewDate === yest) {
      return `昨日（${parseInt(viewDate.slice(5,7))}/${parseInt(viewDate.slice(8))}）`;
    }
    const d = new Date(viewDate + 'T00:00:00');
    return `${d.getMonth()+1}月${d.getDate()}日（${JP_DAY[d.getDay()]}）`;
  })();

  return (
    <div>

                  {l.memo && <div style={{fontSize:12, color:'var(--text-sub)', marginTop:4, lineHeight:1.4}}>{l.memo}</div>}
                </div>
                <div style={{display:'flex', flexDirection:'column', gap:2, flexShrink:0}}>
                  <button className="btn btn-ghost btn-sm" style={{fontSize:14, padding:'4px 7px'}} onClick={() => onEdit(l)}>✎</button>
                  <button className="btn btn-ghost btn-sm" style={{color:'var(--danger)', fontSize:16, padding:'4px 7px'}} onClick={() => onDelete(l.id)}>×</button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* 週次サマリ */}
      <div className="card" style={{marginTop:10}}>
        <div style={{
          display:'flex', justifyContent:'space-between', alignItems:'center',
          cursor:'pointer', userSelect:'none',
        }} onClick={() => setShowWeekly(v => !v)}>
          <div className="card-title" style={{margin:0}}>📊 週次サマリ（7日間）</div>
          <span style={{fontSize:13, color:'var(--text-sub)'}}>{showWeekly ? '▲' : '▼'}</span>
        </div>
        {showWeekly && (
          weekTotal === 0
            ? <div className="empty" style={{padding:'12px 0'}}>記録がありません</div>
            : <div style={{marginTop:12}}>
                <div style={{fontSize:12, color:'var(--text-sub)', marginBottom:10}}>
                  合計 <span style={{fontWeight:700, color:'var(--text)'}}>{fmtDur(weekTotal)}</span> · {weekLogs.length}件
                </div>
                {catTotals.map(c => (
                  <div key={c.id} style={{marginBottom:10}}>
                    <div style={{display:'flex', justifyContent:'space-between', marginBottom:4}}>
                      <span style={{fontSize:12, fontWeight:600, color:c.color}}>{c.label}</span>
                      <span style={{fontSize:12, fontWeight:700}}>{fmtDur(c.total)}</span>
                    </div>
                    <div style={{height:6, borderRadius:3, background:'var(--border)', overflow:'hidden'}}>
                      <div style={{
                        height:'100%', borderRadius:3, background:c.color,
                        width:`${Math.round(c.total / weekTotal * 100)}%`,
                      }}/>
                    </div>
                  </div>
                ))}
              </div>
        )}
      </div>
    </div>
  );
}

// ── Bottom Nav Config ─────────────────────────────────────────
const TABS = [
  { id:'today',    label:'今日',    icon:'✓' },
  { id:'gantt',    label:'ガント',  icon:'📊' },
  { id:'matrix',   label:'マトリクス',   icon:'▦' },
  { id:'clients',  label:'クライアント', icon:'👥' },
  { id:'vision',   label:'ビジョン',icon:'⭐' },
  { id:'log',      label:'ログ',    icon:'📋' },
];

// ── App ───────────────────────────────────────────────────────
function App() {
  const [tab, setTab]         = useState('today');
  const [tasks, setTasks]     = useLS('ml_tasks_v1', []);
  const [clients, setClients] = useLS('ml_clients_v1', []);
  const [vision, setVision]   = useLS('ml_vision_v1', {});
  const [logs, setLogs]       = useLS('ml_logs_v1', []);

  const [taskDrawer,   setTaskDrawer]   = useState(null);
  const [clientDrawer, setClientDrawer] = useState(null);
  const [logDrawer,    setLogDrawer]    = useState(null);

  // Task CRUD
  const upsertTask = t => setTasks(prev => {
    const i = prev.findIndex(x => x.id===t.id);
    if (i>=0) { const a=[...prev]; a[i]=t; return a; }
    return [t, ...prev];
  });
  const toggleTask = id => setTasks(prev => prev.map(t => t.id===id ? {...t, completed:!t.completed} : t));
  const toggleStep = (taskId, stepId) => setTasks(prev => prev.map(t =>
    t.id===taskId ? {...t, steps: (t.steps||[]).map(st => st.id===stepId ? {...st, done:!st.done} : st)} : t
  ));
  const deleteTask = id => setTasks(prev => prev.filter(t => t.id!==id));

  // Client CRUD
  const upsertClient = c => setClients(prev => {
    const i = prev.findIndex(x => x.id===c.id);
    if (i>=0) { const a=[...prev]; a[i]=c; return a; }
    return [c, ...prev];
  });
  const deleteClient = id => setClients(prev => prev.filter(c => c.id!==id));

  const updateVision = (key, val) => setVision(prev => ({...prev, [key]: val}));

  // Log CRUD
  const upsertLog = l => setLogs(prev => {
    const i = prev.findIndex(x => x.id === l.id);
    if (i >= 0) { const a = [...prev]; a[i] = l; return a; }
    return [l, ...prev];
  });
  const deleteLog = id => setLogs(prev => prev.filter(l => l.id !== id));

  const showFab = tab==='today' || tab==='clients' || tab==='log';

  return (
    <>
      <div className="header">
        <div className="header-row">
          <h1>Medilife</h1>
          <span className="header-date">{todayFull()}</span>
        </div>
      </div>

      <div className="content">
        {tab==='today' && (
          <TodayTab tasks={tasks} clients={clients}
            onToggle={toggleTask}
            onToggleStep={toggleStep}
            onEdit={t => setTaskDrawer(t)}
            onDelete={deleteTask} />
        )}
        {tab==='gantt'    && <GanttTab tasks={tasks} clients={clients} />}
        {tab==='matrix'   && <MatrixTab tasks={tasks} clients={clients} />}
        {tab==='clients'  && (
          <ClientsTab clients={clients} tasks={tasks}
            onAdd={() => setClientDrawer('new')}
            onEdit={c => setClientDrawer(c)}
            onDelete={deleteClient} />
        )}
        {tab==='vision'   && <VisionTab vision={vision} onChange={updateVision} tasks={tasks} clients={clients} />}
        {tab==='log'      && <LogTab logs={logs} clients={clients} onEdit={l => setLogDrawer(l)} onDelete={deleteLog} />}
      </div>

      {showFab && (
        <button className="fab"
          onClick={() => {
            if (tab==='today') setTaskDrawer('new');
            else if (tab==='clients') setClientDrawer('new');
            else if (tab==='log') setLogDrawer('new');
          }}>
          +
        </button>
      )}

      <div className="bottom-nav">
        {TABS.map(t => (
          <button key={t.id} className={`nav-item ${tab===t.id ? 'active' : ''}`} onClick={() => setTab(t.id)}>
            <div className="nav-icon"
              style={{color: tab===t.id ? 'var(--accent)' : 'var(--text-sub)'}}>
              {t.icon}
            </div>
            <span className="nav-label">{t.label}</span>
          </button>
        ))}
      </div>

      {taskDrawer && (
        <TaskDrawer
          clients={clients}
          editing={taskDrawer==='new' ? null : taskDrawer}
          onSave={upsertTask}
          onClose={() => setTaskDrawer(null)}
        />
      )}

      {clientDrawer && (
        <ClientDrawer
          editing={clientDrawer==='new' ? null : clientDrawer}
          onSave={upsertClient}
          onClose={() => setClientDrawer(null)}
        />
      )}

      {logDrawer && (
        <LogDrawer
          clients={clients}
          editing={logDrawer==='new' ? null : logDrawer}
          onSave={upsertLog}
          onClose={() => setLogDrawer(null)}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
