                )}
              </div>
              {c.nextAppt && (
                <div className="customer-info-row">
                  <div className="info-item">
                    <div className="info-label">次回アポイント</div>
                    <div className="info-value" style={{
                      color: apptDays !== null && apptDays <= 3 ? 'var(--danger)' : apptDays !== null && apptDays <= 7 ? 'var(--warning)' : 'var(--text)',
                    }}>
                      {fmtDate(c.nextAppt)}
                      {apptDays !== null && (
                        <span style={{ marginLeft: 4, fontSize: 11, fontWeight: 600 }}>
                          ({apptDays <= 0 ? '期限切れ' : `あと${apptDays}日`})
                        </span>
                      )}
                    </div>
                  </div>
                  {c.lastContact && (
                    <div className="info-item">
                      <div className="info-label">最終接触</div>
                      <div className="info-value">{fmtDate(c.lastContact)}</div>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })
      }
    </div>
  );
}

// ── Tab: Appointments ─────────────────────────────────────────
function AppointmentTab({ customers, onSelect }) {
  const today = todayStr();
  const [showPast, setShowPast] = useState(false);

  const withAppt = customers
    .filter(c => c.nextAppt)
    .sort((a, b) => a.nextAppt.localeCompare(b.nextAppt));

  const upcoming = withAppt.filter(c => c.nextAppt >= today);
  const past = withAppt.filter(c => c.nextAppt < today);

  const ApptCard = ({ c }) => {
    const days = daysUntil(c.nextAppt);
    const [, m, d] = c.nextAppt.split('-');
    const urgent = days !== null && days <= 3;
    const overdue = days !== null && days < 0;
    return (
      <div className="customer-card" onClick={() => onSelect(c)}
        style={overdue ? { borderColor: '#FECACA', background: '#FEF2F2' } : urgent ? { borderColor: '#FDE68A', background: '#FFFBEB' } : {}}>
        <div style={{ display: 'flex', gap: 12, alignItems: 'flex-start' }}>
          <div className={`appt-date-box ${overdue ? 'urgent' : ''}`}
            style={urgent && !overdue ? { background: '#FFFBEB' } : {}}>
            <div className="appt-date-month" style={urgent && !overdue ? { color: 'var(--warning)' } : {}}>{parseInt(m)}月</div>
            <div className="appt-date-day" style={urgent && !overdue ? { color: 'var(--warning)' } : {}}>{parseInt(d)}</div>
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 4 }}>{c.name}</div>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', alignItems: 'center' }}>
              <StatusBadge status={c.status} />
              {days !== null && (
                <span style={{
                  fontSize: 11, fontWeight: 700, padding: '2px 7px', borderRadius: 6,
                  background: overdue ? '#FEF2F2' : urgent ? '#FFFBEB' : 'var(--accent-light)',
                  color: overdue ? 'var(--danger)' : urgent ? 'var(--warning)' : 'var(--accent)',
                }}>
                  {days === 0 ? '今日！' : days < 0 ? `${Math.abs(days)}日前` : `あと${days}日`}
                </span>
              )}
              {c.contactMethod && (
                <span style={{ fontSize: 11, color: 'var(--text-sub)' }}>{c.contactMethod}</span>
              )}
            </div>
            {c.memo && (
              <div style={{ fontSize: 12, color: 'var(--text-sub)', marginTop: 4, overflow: 'hidden', display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical' }}>
                {c.memo}
              </div>
            )}
          </div>
        </div>
      </div>
    );
  };

  return (
    <div>
      <div className="section-title">アポイント管理</div>

      {upcoming.length === 0 && past.length === 0 ? (
        <EmptyState icon="📅" text="アポイントが登録されている顧客はいません" />
      ) : (
        <>
          {upcoming.length > 0 ? (
            <>
              <div className="section-header">今後のアポイント ({upcoming.length}件)</div>
              {upcoming.map(c => <ApptCard key={c.id} c={c} />)}
            </>
          ) : (
            <EmptyState icon="✅" text="今後のアポイントはありません" />
          )}

          {past.length > 0 && (
            <>
              <button
                onClick={() => setShowPast(v => !v)}
                className="btn btn-outline btn-full"
                style={{ marginTop: 8, fontSize: 13 }}>
                {showPast ? '▲ 過去のアポイントを隠す' : `▼ 過去のアポイントを表示 (${past.length}件)`}
              </button>
              {showPast && past.map(c => <ApptCard key={c.id} c={c} />)}
            </>
          )}
        </>
      )}
    </div>
  );
}

`;

const RESULT_OPTIONS = ['継続中', '成約', '見送り', '保留', '紹介待ち'];

// 温度感表示
const TempDisplay = ({ temp }) => {
  if (!temp) return null;

// ── 商談メモ Form ─────────────────────────────────────────────
function NegotiationForm({ editing, customers, onSave, onClose }) {
  const blank = { id:'', date:todayStr(), customerId:'', personName:'', memo:'', temp:3, result:'継続中' };
  const [form, setForm] = useState({ ...blank, ...(editing || {}) });
  const s = k => v => setForm(f => ({ ...f, [k]: v }));
  const si = k => e => s(k)(e.target.value);

  const save = () => {
    if (!form.memo.trim() && !form.personName.trim() && !form.customerId) return;
    onSave({ ...form, id: form.id || uid() });
    onClose();
  };

  const applyTemplate = () => {
    if (form.memo.trim() && !window.confirm('メモを商談テンプレートで上書きしますか？')) return;
    setForm(f => ({ ...f, memo: MEMO_TEMPLATE }));
  };

  return (
    <div className="full-screen">
      <div className="full-header">
        <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', fontSize:15, color:'var(--text-sub)', fontWeight:600, padding:'4px 8px' }}>← 戻る</button>
        <div style={{ flex:1, fontSize:18, fontWeight:800, letterSpacing:-0.4 }}>{editing ? '商談メモ編集' : '商談メモを追加'}</div>
        <button className="btn btn-primary btn-sm" onClick={save}>保存</button>
      </div>
      <div className="full-content">

        {/* 相手 */}
        <div className="section-header">相手</div>
        <div className="card">
          <CustomerSelect label="既存顧客から選ぶ" value={form.customerId}
            onChange={v => s('customerId')(v)} customers={customers} />
          {!form.customerId && (
            <div className="form-group" style={{ marginTop:14, marginBottom:0 }}>
              <label className="form-label">または名前を入力（新規の場合）</label>
              <input className="form-input" placeholder="例：田中 一郎" value={form.personName} onChange={si('personName')} />
            </div>
          )}
        </div>

        {/* 商談情報 */}
        <div className="section-header">商談情報</div>
        <div className="card">
          <div className="form-group">
            <label className="form-label">商談日</label>
            <input className="form-input" type="date" value={form.date} onChange={si('date')} />
          </div>

          {/* 結果 */}
          <div className="form-group">
            <label className="form-label">結果</label>
            <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
              {RESULT_OPTIONS.map(r => (
                <button key={r} onClick={() => s('result')(r)} style={{
                  padding:'6px 12px', borderRadius:20, border:'1.5px solid', fontSize:12, fontWeight:700, cursor:'pointer',
                  borderColor: form.result===r ? (r==='成約'?'#16A34A':r==='見送り'?'#DC2626':'var(--accent)') : 'var(--border)',
                  background:  form.result===r ? (r==='成約'?'#DCFCE7':r==='見送り'?'#FEE2E2':'var(--accent-light)') : 'var(--bg)',
                  color:       form.result===r ? (r==='成約'?'#16A34A':r==='見送り'?'#DC2626':'var(--accent)') : 'var(--text-sub)',
                }}>{r}</button>
              ))}
            </div>
          </div>

          {/* 温度感 */}
          <div className="form-group" style={{ marginBottom:0 }}>
            <label className="form-label">温度感（{form.temp || 3}/5）<TempDisplay temp={form.temp || 3} /></label>
            <input type="range" min="1" max="5" step="1"
              value={form.temp || 3}
              onChange={e => s('temp')(Number(e.target.value))}
              style={{ width:'100%', accentColor:'var(--accent)', marginTop:4 }} />
            <div style={{ display:'flex', justifyContent:'space-between', fontSize:10, color:'var(--text-sub)', marginTop:2 }}>
              <span>冷たい</span><span>熱い</span>
            </div>
          </div>
        </div>

        {/* メモ */}
        <div className="section-header" style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <span>メモ</span>
          <button onClick={applyTemplate} style={{
            fontSize:11, padding:'4px 10px', borderRadius:8,
            border:'1.5px solid var(--accent)', background:'var(--accent-light)',
            color:'var(--accent)', cursor:'pointer', fontWeight:700,
          }}>📋 テンプレート挿入</button>
        </div>
        <div className="card">
          <textarea className="form-textarea" style={{ minHeight:240 }}
            placeholder="Geminiで書き起こしたテキストを貼り付け、またはテンプレートを使ってください..."
            value={form.memo} onChange={si('memo')} />
        </div>

        <button className="btn btn-primary btn-full" style={{ marginTop:8 }} onClick={save}>保存する</button>
      </div>
    </div>
  );
}

  const copyText = (text, msg) => {

      navigator.clipboard.writeText(text).then(() => showToast(msg));
    } else {
      const el = document.createElement('textarea');
      el.value = text; document.body.appendChild(el); el.select();
      document.execCommand('copy'); document.body.removeChild(el);
      showToast(msg);

  };

  const summary = `【商談メモ】
氏名: ${displayName}
面談日: ${memo.date}
${memo.memo}`.trim();

// ── 商談メモ Tab ──────────────────────────────────────────────
function NegotiationTab({ memos, setMemos, customers, onSelect }) {
  const [search, setSearch] = useState('');
  const filtered = [...memos]
    .filter(m => {
      if (!search) return true;
      const c = customers.find(x => x.id === m.customerId);
      const name = c ? c.name : (m.personName || '');
      return name.includes(search) || m.memo.includes(search);
    })
    .sort((a, b) => b.date.localeCompare(a.date));

  return (
    <div>
      <div style={{ position:'sticky', top:0, background:'var(--bg)', zIndex:5, paddingBottom:4 }}>
        <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:6 }}>
          <div className="search-wrap" style={{ flex:1, margin:0 }}>
            <span>🔍</span>
            <input className="search-input" placeholder="名前・メモで検索..." value={search} onChange={e => setSearch(e.target.value)} />
            {search && <button className="search-clear" onClick={() => setSearch('')}>×</button>}

          <label style={{ fontSize:11, padding:'6px 10px', borderRadius:8, border:'1px solid var(--accent)', background:'var(--accent-light)', color:'var(--accent)', cursor:'pointer', fontWeight:600, whiteSpace:'nowrap' }}>
            📥 商談CSV
            <input type="file" accept=".csv" style={{ display:'none' }}
              onChange={e => { if (e.target.files[0]) { importShodanCSV(e.target.files[0], setMemos); e.target.value=''; } }} />
          </label>
        </div>
        {/* 成約率トラッカー */}
        {memos.length > 0 && (() => {
          const total   = memos.length;
          const won     = memos.filter(m => m.result === '成約').length;
          const lost    = memos.filter(m => m.result === '見送り').length;
          const rate    = total > 0 ? Math.round(won / total * 100) : 0;
          const avgTemp = memos.filter(m => m.temp).length > 0
            ? (memos.filter(m => m.temp).reduce((s, m) => s + Number(m.temp), 0) / memos.filter(m => m.temp).length).toFixed(1)
            : null;
          return (
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap:6, marginBottom:8 }}>
              {[
                { label:'商談数', value:total, color:'var(--accent)' },
                { label:'成約',   value:won,   color:'#16A34A' },
                { label:'見送り', value:lost,  color:'#DC2626' },
                { label:'成約率', value:`${rate}%`, color: rate>=50?'#16A34A':'var(--accent)' },
              ].map(item => (
                <div key={item.label} style={{ background:'var(--surface)', borderRadius:10, padding:'8px 6px', textAlign:'center', border:'1px solid var(--border)' }}>
                  <div style={{ fontSize:16, fontWeight:800, color:item.color }}>{item.value}</div>
                  <div style={{ fontSize:10, color:'var(--text-sub)', fontWeight:600 }}>{item.label}</div>
                </div>
              ))}
            </div>
          );
        })()}
        <div style={{ fontSize:12, color:'var(--text-sub)', marginBottom:8 }}>{filtered.length}件</div>
      </div>

      {filtered.length === 0
        ? <EmptyState icon="📝" text="商談メモを追加してください" />
        : filtered.map(m => {
          const c = customers.find(x => x.id === m.customerId);
          const name = c ? c.name : (m.personName || '—');
          return (
            <div key={m.id} className="customer-card" onClick={() => onSelect(m)}>
              <div className="customer-card-top">
                <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
                  <div className="customer-name">{name}</div>
                  {m.result && (
                    <span style={{
                      fontSize:11, fontWeight:700, padding:'2px 8px', borderRadius:10,
                      background: m.result==='成約'?'#DCFCE7':m.result==='見送り'?'#FEE2E2':'var(--accent-light)',

                </div>
              )}
            </div>
          );
        })
      }
    </div>
  );
}

  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${JP_DAY[d.getDay()]}）`;

const toGCalUrl = (task) => {
  const title = encodeURIComponent(task.title);
  let dates = '';
  if (task.date) {
    const d = task.date.replace(/-/g, '');
    const next = new Date(task.date); next.setDate(next.getDate() + 1);
    const nd = next.toISOString().split('T')[0].replace(/-/g, '');
    dates = `&dates=${d}/${nd}`;
  }
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}${dates}`;
};

// ── SalesTracker ──────────────────────────────────────────────
function SalesTracker({ sales, onChange, clients }) {
  const [editing, setEditing] = React.useState(false);
  const [form, setForm] = React.useState(sales);

  const target  = Number(sales.target)  || 0;
  const current = Number(sales.current) || 0;
  const pct     = target > 0 ? Math.min(Math.round(current / target * 100), 999) : 0;
  const achieved = target > 0 && current >= target;
  const fmt = v => Number(v).toLocaleString('ja-JP');

  const activeClients = (clients || []).filter(c => (c.status || '進行中') === '進行中');
  const totalAC = activeClients.reduce((sum, c) => sum + (Number(c.prospectAC) || 0), 0);
  const acClients = activeClients.filter(c => Number(c.prospectAC) > 0).length;

  const open = () => { setForm(sales); setEditing(true); };
  const save = () => { onChange(form); setEditing(false); };

  return (
    <div className="card" style={{ marginBottom:12, position:'relative', overflow:'hidden' }}>
      {target > 0 && (
        <div style={{ position:'absolute', top:0, left:0, bottom:0, width:`${Math.min(pct,100)}%`,
          background: achieved ? 'linear-gradient(90deg,#D1FAE5,#A7F3D0)' : 'linear-gradient(90deg,#EEF2FF,#C7D2FE)',
          transition:'width 0.6s ease', zIndex:0 }} />
      )}
      <div style={{ position:'relative', zIndex:1 }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:6 }}>
          <div style={{ fontSize:13, fontWeight:700, color:'var(--text-sub)' }}>
            💰 売上トラッカー
            {sales.label && <span style={{ marginLeft:6, fontWeight:500 }}>（{sales.label}）</span>}
          </div>
          <button onClick={open} style={{ fontSize:11, padding:'3px 10px', borderRadius:6,
            border:'1px solid var(--border)', background:'rgba(255,255,255,0.8)',
            color:'var(--text-sub)', cursor:'pointer', fontWeight:600 }}>設定</button>
        </div>

        {target === 0 ? (
          <div style={{ textAlign:'center', color:'var(--text-sub)', fontSize:13, padding:'8px 0' }}>

        ) : (
          <>
            <div style={{ display:'flex', alignItems:'baseline', gap:6, marginBottom:6 }}>
              <span style={{ fontSize:26, fontWeight:800, color: achieved ? '#059669' : 'var(--accent)' }}>
                ¥{fmt(current)}
              </span>
              <span style={{ fontSize:13, color:'var(--text-sub)' }}>/ ¥{fmt(target)}</span>
              {achieved && <span style={{ fontSize:18, marginLeft:4 }}>🎉</span>}
            </div>
            <div style={{ background:'rgba(0,0,0,0.08)', borderRadius:6, height:8, overflow:'hidden', marginBottom:4 }}>
              <div style={{ height:'100%', borderRadius:6, width:`${Math.min(pct,100)}%`,
                background: achieved ? '#10B981' : 'var(--accent)', transition:'width 0.6s ease' }} />
            </div>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <span style={{ fontSize:12, color:'var(--text-sub)' }}>
                {achieved ? '🎉 目標達成！' : `残り ¥${fmt(Math.max(target - current, 0))}`}
              </span>
              <span style={{ fontSize:13, fontWeight:700, color: achieved ? '#059669' : 'var(--accent)' }}>{pct}%</span>
            </div>
          </>

        <div style={{ marginTop:10, paddingTop:10, borderTop:'1px solid rgba(0,0,0,0.07)',

            width:'100%', maxWidth:430 }} onClick={e => e.stopPropagation()}>

      <p style={{fontSize:12,color:'var(--text-sub)',marginBottom:14,lineHeight:1.6}}>
        神センター（中央）にビジョンを書き、左右のタスクでそれを実現する
      </p>

      {KM_BANDS.map((band, bi) => {
        const isLast = bi === KM_BANDS.length - 1;
        return (
          <div key={bi} className="km-band">
            {/* ヘッダー行 */}
            <div className="km-grid">
              <div className="km-head-cell" style={{background:'var(--bg)'}}>
                <div className="km-head-tag">タスク</div>
                <div className="km-head-period">{band.leftPeriod}</div>
              </div>
              <div className="km-head-cell" style={{background:band.axisBg}}>
                <div className="km-head-tag" style={{color:band.axisColor}}>神センター</div>
                <div className="km-head-axis" style={{color:band.axisColor}}>{band.axisName}</div>
                <div className="km-head-sub" style={{color:band.axisColor}}>{band.axisSub}</div>
              </div>
              <div className="km-head-cell" style={{background:'var(--bg)'}}>
                <div className="km-head-tag">タスク</div>
                <div className="km-head-period">{band.rightPeriod}</div>
              </div>
            </div>

            {/* 仕事上・プライベート 行 */}
            {rows.map((row, ri) => {
              const lastRow = ri === rows.length - 1;
              const lKey = `km_${bi}_left_${row.key}`;
              const cKey = `km_${bi}_center_${row.key}`;
              const rKey = `km_${bi}_right_${row.key}`;
              const centerHint = row.key==='work' ? band.centerWorkHint : band.centerPrivateHint;
              const rowType = row.key;

              const axTasks = (tasks||[]).filter(t =>
                !t.completed && t.axis===band.axisName && (t.rowType||'work')===rowType
              );
              const leftTasks  = axTasks.filter(t => { const d=daysUntil(t.date); return d!==null && d>band.splitDays; });
              const rightTasks = axTasks.filter(t => { const d=daysUntil(t.date); return d===null || d<=band.splitDays; });
              const relClients = (clients||[]).filter(c => c.axis===band.axisName && (c.rowType||'work')===rowType);

              const TaskList = ({ items }) => items.length===0 ? null : (
                <div style={{marginTop:5,display:'flex',flexDirection:'column',gap:3}}>
                  {items.map(t => (
                    <div key={t.id} style={{lineHeight:1.4,padding:'3px 5px',borderRadius:4,
                      background:band.axisBg,borderLeft:`2px solid ${band.axisColor}`}}>
                      <div style={{fontSize:10,color:band.axisColor,fontWeight:700}}>📌 {t.title}</div>
                      {t.date
                        ? <div style={{fontSize:9,color:band.axisColor,opacity:0.7,marginTop:1}}>{fmtDate(t.date)}</div>
                        : <div style={{fontSize:9,color:'#999',marginTop:1}}>日付未定</div>}
                    </div>
                  ))}
                </div>
              );

              const ClientList = ({ items }) => items.length===0 ? null : (
                <div style={{marginTop:5,display:'flex',flexDirection:'column',gap:2}}>
                  {items.map(c => (
                    <div key={c.id} style={{fontSize:10,color:band.axisColor,lineHeight:1.4,
                      padding:'2px 5px',borderRadius:4,background:band.axisBg,fontWeight:600}}>
                      👤 {c.name}
                    </div>
                  ))}
                </div>
              );

              return (
                <div key={row.key} className="km-grid">
                  <div className={`km-data-cell ${lastRow?'km-last-row':''}`}>
                    <div className="km-data-label">{row.label}</div>
                    <textarea className="km-ta" placeholder={band.taskHint}
                      value={vision[lKey]||''}
                      onChange={e=>updateVision(lKey,e.target.value)} />
                    <TaskList items={leftTasks} />
                  </div>
                  <div className={`km-data-cell ${lastRow?'km-last-row':''}`}
                    style={{background:band.axisBg+'66'}}>
                    <div className="km-data-label" style={{color:band.axisColor}}>{row.label}</div>
                    <div className="km-data-hint">{centerHint}</div>
                    <textarea className="km-ta km-ta-center" placeholder={centerHint}
                      value={vision[cKey]||''}
                      onChange={e=>updateVision(cKey,e.target.value)} />
                    <ClientList items={relClients} />
                  </div>
                  <div className={`km-data-cell ${lastRow?'km-last-row':''}`}>
                    <div className="km-data-label">{row.label}</div>
                    <textarea className="km-ta" placeholder={band.taskHint}
                      value={vision[rKey]||''}
                      onChange={e=>updateVision(rKey,e.target.value)} />
                    <TaskList items={rightTasks} />
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

// ── ガントチャート ────────────────────────────────────────────
function GanttPanel({ tasks, clients }) {
  const CELL_W    = 34;
  const LABEL_W   = 108;
  const DAYS_BEFORE = 4;
  const DAYS_TOTAL  = 56;

  const todayD = new Date(); todayD.setHours(0,0,0,0);
  const startD = new Date(todayD); startD.setDate(startD.getDate() - DAYS_BEFORE);
  const toStr  = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const todaySt = toStr(todayD);

  const dates = Array.from({length:DAYS_TOTAL}, (_,i) => {
    const d = new Date(startD); d.setDate(d.getDate()+i); return d;
  });

  const monthGroups = [];
  dates.forEach((d,i) => {
    const label = `${d.getMonth()+1}月`;
    if (!monthGroups.length || monthGroups[monthGroups.length-1].label !== label) {
      monthGroups.push({label, start:i, count:1});
    } else { monthGroups[monthGroups.length-1].count++; }
  });

  const clientName = id => (clients||[]).find(c=>c.id===id)?.name;
  const scheduled = [...tasks]
    .filter(t => t.date && (!t.recurrence || t.recurrence==='none'))
    .sort((a,b) => a.date.localeCompare(b.date));

  const dotColor = t => {
    if (t.completed) return '#D1D5DB';
    if (t.axis && KM_AXIS_MAP[t.axis]) return KM_AXIS_MAP[t.axis].color;
    if (t.importance===1||t.importance===true) return '#EF4444';
    return 'var(--accent)';
  };

  const scrollRef = React.useRef(null);
  React.useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollLeft = DAYS_BEFORE * CELL_W - 8;
  }, []);

  return (
    <div>
      <div style={{fontSize:20,fontWeight:800,marginBottom:14,letterSpacing:'-0.4px'}}>ガントチャート</div>
      <p style={{fontSize:12,color:'var(--text-sub)',marginBottom:10,lineHeight:1.6}}>
        タスクの締切日を横軸で確認。横スクロールで8週先まで見えます。
      </p>
      {scheduled.length===0 ? (
        <div className="empty" style={{marginTop:40}}>
          <div className="empty-icon">📊</div>
          <div>日付付きのタスクを追加すると<br/>ここに表示されます</div>
        </div>
      ) : (
        <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch',borderRadius:12,border:'1px solid var(--border)'}} ref={scrollRef}>
          <div style={{minWidth:LABEL_W + CELL_W*DAYS_TOTAL}}>

            {/* 月ヘッダー */}
            <div style={{display:'flex',background:'#fff',borderBottom:'1px solid var(--border)'}}>
              <div style={{width:LABEL_W,flexShrink:0}}/>
              {monthGroups.map((mg,i)=>(
                <div key={i} style={{width:CELL_W*mg.count,flexShrink:0,fontSize:10,fontWeight:800,
                  color:'var(--accent)',padding:'4px 6px',borderLeft:i>0?'2px solid var(--accent)':'none'}}>
                  {mg.label}
                </div>
              ))}
            </div>

            {/* 日付ヘッダー */}
            <div style={{display:'flex',background:'#fff',borderBottom:'2px solid var(--border)'}}>
              <div style={{width:LABEL_W,flexShrink:0,fontSize:10,fontWeight:600,color:'var(--text-sub)',
                padding:'4px 8px',display:'flex',alignItems:'center'}}>タスク名</div>
              {dates.map((d,i)=>{
                const isToday = toStr(d)===todaySt;
                const isSun   = d.getDay()===0;
                const isSat   = d.getDay()===6;
                return (
                  <div key={i} style={{width:CELL_W,flexShrink:0,textAlign:'center',padding:'3px 0',
                    borderLeft:'1px solid var(--border)',
                    background:isToday?'var(--accent)':isSun?'#FEF2F2':isSat?'#EFF6FF':''}}>
                    <div style={{fontSize:9,fontWeight:700,
                      color:isToday?'#fff':isSun?'#EF4444':isSat?'#2563EB':'var(--text-sub)'}}>
                      {JP_DAY[d.getDay()]}
                    </div>
                    <div style={{fontSize:11,fontWeight:isToday?800:500,
                      color:isToday?'#fff':isSun?'#EF4444':isSat?'#2563EB':'var(--text)'}}>
                      {d.getDate()}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* タスク行 */}
            {scheduled.map((t,ti)=>(
              <div key={t.id} style={{display:'flex',alignItems:'center',
                borderBottom:ti<scheduled.length-1?'1px solid var(--border)':'none',minHeight:44}}>
                <div style={{width:LABEL_W,flexShrink:0,padding:'6px 8px',
                  borderRight:'1px solid var(--border)',alignSelf:'stretch',
                  display:'flex',flexDirection:'column',justifyContent:'center'}}>
                  <div style={{fontSize:12,fontWeight:600,lineHeight:1.3,
                    whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',
                    color:t.completed?'var(--text-sub)':'var(--text)',
                    textDecoration:t.completed?'line-through':'none'}}>{t.title}</div>
                  {clientName(t.clientId) && (
                    <div style={{fontSize:10,color:'var(--text-sub)',marginTop:2,
                      whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                      👤 {clientName(t.clientId)}
                    </div>
                  )}
                </div>
                {dates.map((d,i)=>{
                  const ds=toStr(d), isToday=ds===todaySt, isSun=d.getDay()===0, isSat=d.getDay()===6, hit=t.date===ds;
                  return (
                    <div key={i} style={{width:CELL_W,flexShrink:0,height:44,
                      display:'flex',alignItems:'center',justifyContent:'center',
                      borderLeft:'1px solid var(--border)',
                      background:isToday?'#EEEEFF':isSun?'#FFF8F8':isSat?'#F5F9FF':ti%2===1?'#FAFAFA':''}}>
                      {hit && (
                        <div style={{width:14,height:14,borderRadius:'50%',
                          background:dotColor(t),boxShadow:`0 0 0 4px ${dotColor(t)}30`}}/>
                      )}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── マトリクス ────────────────────────────────────────────────
const MATRIX_QUADS = [
  {key:'11',label:'すぐやる',  desc:'重要×緊急',   color:'#EF4444',bg:'#FEF2F2',imp:true, urg:true},
  {key:'10',label:'計画する',  desc:'重要×非緊急', color:'#2563EB',bg:'#EFF6FF',imp:true, urg:false},
  {key:'01',label:'委任する',  desc:'非重要×緊急', color:'#D97706',bg:'#FEF3C7',imp:false,urg:true},
  {key:'00',label:'減らす',    desc:'非重要×非緊急',color:'#9CA3AF',bg:'#F3F4F6',imp:false,urg:false},
];

function MatrixPanel({ tasks, clients }) {
  const active = tasks.filter(t => !t.completed);
  const cn = id => clients.find(c => c.id === id)?.name;

  const quads = [
    { imp:1, urg:1, cls:'mc-q1', badge:'🔴', label:'すぐやる',  sub:'重要 × 緊急' },
    { imp:1, urg:0, cls:'mc-q2', badge:'🔵', label:'計画する',  sub:'重要 × 非緊急' },
    { imp:0, urg:1, cls:'mc-q3', badge:'🟡', label:'委任する',  sub:'通常 × 緊急' },
    { imp:0, urg:0, cls:'mc-q4', badge:'🟢', label:'減らす',    sub:'通常 × 非緊急' },
  ];

  return (
    <div>
      <div style={{fontSize:20,fontWeight:800,marginBottom:14,letterSpacing:'-0.4px'}}>タスクマトリクス</div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',marginBottom:6,paddingLeft:2}}>
        <div style={{textAlign:'center',fontSize:11,fontWeight:700,color:'#DC2626',padding:'4px 0'}}>← 緊急</div>
        <div style={{textAlign:'center',fontSize:11,fontWeight:700,color:'var(--text-sub)',padding:'4px 0'}}>非緊急 →</div>
      </div>

      <div className="matrix-grid">
        {quads.map(q => {
          const items = active.filter(t => {
            const imp = t.importance===1||t.importance===true||t.importance==='1' ? 1 : 0;
            const urg = t.urgency===1||t.urgency===true||t.urgency==='1' ? 1 : 0;
            return imp===q.imp && urg===q.urg;
          });
          return (
            <div key={q.label} className={`matrix-cell ${q.cls}`}>
              <div className="mc-label">{q.badge} {q.label}</div>
              <div className="mc-sub">{q.sub}</div>
              {items.length === 0
                ? <div style={{fontSize:11,opacity:0.35}}>タスクなし</div>
                : items.map(t => (
                    <div key={t.id} className="mc-task">
                      · {t.title}
                      {cn(t.clientId) && <span style={{opacity:0.6}}> ({cn(t.clientId)})</span>}
                      {t.date && <span style={{opacity:0.5,fontSize:10}}> {fmtDate(t.date)}</span>}
                    </div>
                  ))
              }
            </div>
          );
        })}
      </div>

      <div style={{marginTop:12,padding:'10px 12px',background:'var(--surface)',borderRadius:10,border:'1px solid var(--border)'}}>
        <div style={{fontSize:11,color:'var(--text-sub)',lineHeight:1.7}}>
          タスク追加時に重要度・緊急度を設定するとここに自動分類されます。
        </div>
      </div>
    </div>
  );
}

// ── ClientsTabInner（検索・見込み月・AC順ソート）─────────────
function ClientsTabInner({ clients, tasks, onAdd, onEdit, onDelete }) {
  const [search, setSearch]           = useState('');
  const [sort, setSort]               = useState('name');
  const [statusFilter, setStatusFilter] = useState('進行中');

  const openTasks = id => tasks.filter(t => t.clientId===id && !t.completed).length;

  const filtered = clients
    .filter(c => statusFilter==='すべて' ? true : (c.status||'進行中')===statusFilter)
    .filter(c =>
      c.name.includes(search) ||
      (c.helpWith||'').includes(search) ||
      (c.memo||'').includes(search) ||
      (c.prospectAC||'').toString().includes(search) ||
      (c.prospectMonth||'').includes(search)
    )
    .sort((a,b) => {
      if (sort==='ac')    return (Number(b.prospectAC)||0) - (Number(a.prospectAC)||0);
      if (sort==='month') return (a.prospectMonth||'未定').localeCompare(b.prospectMonth||'未定');
      return a.name.localeCompare(b.name,'ja');
    });

  return (
    <div>
      {/* ステータスフィルター */}
      <div style={{position:'sticky',top:0,zIndex:10,background:'var(--bg)',paddingBottom:8}}>
        <div style={{display:'flex',gap:4,marginBottom:8,overflowX:'auto',paddingBottom:2}}>
          {['進行中','成約','断り','完了','すべて'].map(st => {
            const info = CLIENT_STATUSES.find(s=>s.key===st);
            const active = statusFilter===st;
            return (
              <button key={st} onClick={()=>setStatusFilter(st)} style={{
                flexShrink:0, padding:'6px 14px', borderRadius:20, border:'1.5px solid',
                fontSize:12, fontWeight:700, cursor:'pointer',
                borderColor: active ? (info?.color||'var(--accent)') : 'var(--border)',
                background:  active ? (info?.bg||'var(--accent-light)') : 'var(--bg)',
                color:       active ? (info?.color||'var(--accent)') : 'var(--text-sub)',
              }}>
                {st}
                <span style={{marginLeft:4,fontSize:11}}>
                  {st==='すべて' ? clients.length : clients.filter(c=>(c.status||'進行中')===st).length}
                </span>
              </button>
            );
          })}
        </div>

        {/* 検索バー */}
        <div style={{position:'relative',marginBottom:8}}>
          <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',fontSize:15}}>🔍</span>
          <input
            style={{width:'100%',padding:'10px 12px 10px 36px',border:'1.5px solid var(--border)',
              borderRadius:10,fontSize:15,background:'#fff',outline:'none'}}
            placeholder="名前・メモ・見込み月で検索..."
            value={search} onChange={e=>setSearch(e.target.value)}
          />
          {search && (
            <button onClick={()=>setSearch('')} style={{position:'absolute',right:10,top:'50%',
              transform:'translateY(-50%)',background:'none',border:'none',fontSize:16,color:'var(--text-sub)',cursor:'pointer'}}>×</button>
          )}
        </div>

        {/* 件数 + ソート */}
        <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:4}}>
          <span style={{fontSize:12,color:'var(--text-sub)'}}>
            {filtered.length}件{search && ` / 全${clients.length}件`}
          </span>
          <div style={{marginLeft:'auto',display:'flex',gap:4}}>
            {[['name','名前'],['month','見込み月'],['ac','AC順']].map(([k,l]) => (
              <button key={k} onClick={()=>setSort(k)} style={{
                padding:'4px 10px',borderRadius:6,border:'none',cursor:'pointer',fontSize:11,
                background: sort===k ? 'var(--accent)' : 'var(--bg)',
                color:      sort===k ? '#fff' : 'var(--text-sub)',
                fontWeight: sort===k ? 700 : 400,
              }}>{l}</button>
            ))}
          </div>
          <button className="btn btn-primary btn-sm" onClick={onAdd}>＋ 追加</button>
        </div>
      </div>

      {/* リスト */}
      {filtered.length===0
        ? <div className="empty"><div className="empty-icon">👤</div><div>クライアントなし</div></div>
        : <div className="card">
            {filtered.map(c => {
              const st = CLIENT_STATUSES.find(s=>s.key===(c.status||'進行中'));
              const ot = openTasks(c.id);
              return (
                <div key={c.id} style={{padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:6}}>
                    <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
                      <span style={{fontSize:16,fontWeight:700}}>{c.name}</span>
                      {ot>0 && <span style={{background:'var(--accent)',color:'#fff',borderRadius:10,padding:'1px 7px',fontSize:11,fontWeight:700}}>{ot}</span>}
                      {st && <span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:10,background:st.bg,color:st.color}}>{st.key}</span>}
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
                      {c.axis && <AxisBadge axis={c.axis}/>}
                      <button onClick={()=>onEdit(c)} style={{padding:'5px 9px',borderRadius:8,border:'1.5px solid var(--border)',background:'var(--bg)',fontSize:12,cursor:'pointer',fontWeight:600}}>✎</button>
                      <button onClick={()=>onDelete(c.id)} style={{padding:'5px 9px',borderRadius:8,border:'none',background:'#FEF2F2',color:'var(--danger)',fontSize:12,cursor:'pointer',fontWeight:600}}>×</button>
                    </div>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginTop:8}}>
                    <div style={{background:'var(--bg)',borderRadius:8,padding:'7px 10px'}}>
                      <div style={{fontSize:10,fontWeight:700,color:'var(--text-sub)',marginBottom:2}}>何月の見込み</div>
                      <div style={{fontSize:13,fontWeight:600}}>{c.prospectMonth||'未定'}</div>
                    </div>
                    <div style={{background:'var(--bg)',borderRadius:8,padding:'7px 10px'}}>
                      <div style={{fontSize:10,fontWeight:700,color:'var(--text-sub)',marginBottom:2}}>見込みAC</div>
                      <div style={{fontSize:15,fontWeight:800,color:'var(--accent)'}}>
                        {c.prospectAC ? `${Number(c.prospectAC).toLocaleString()}万円` : '—'}
                      </div>
                    </div>
                    {c.helpWith && (
                      <div style={{gridColumn:'1/-1',background:'var(--bg)',borderRadius:8,padding:'7px 10px'}}>
                        <div style={{fontSize:10,fontWeight:700,color:'var(--text-sub)',marginBottom:2}}>お役に立てること</div>
                        <div style={{fontSize:13,color:'var(--text)',whiteSpace:'pre-wrap',lineHeight:1.5}}>{c.helpWith}</div>
                      </div>
                    )}
                    {c.memo && (
                      <div style={{gridColumn:'1/-1',background:'var(--bg)',borderRadius:8,padding:'7px 10px'}}>
                        <div style={{fontSize:10,fontWeight:700,color:'var(--text-sub)',marginBottom:2}}>メモ</div>
                        <div style={{fontSize:13,color:'var(--text)',whiteSpace:'pre-wrap',lineHeight:1.5}}>{c.memo}</div>
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
      }
    </div>
  );
}

      </div>
      {sorted.length===0 ? <EmptyState icon="📝" text="活動を記録してください" /> : sorted.slice(0,30).map(log=>(

              <span style={{fontSize:12,color:'var(--text-sub)'}}>{log.date?fmtDateFull(log.date):''}</span>
            </div>
            <button onClick={()=>del(log.id)} style={{background:'none',border:'none',color:'var(--text-sub)',cursor:'pointer',fontSize:16}}>×</button>
          </div>
          {log.content&&<div style={{fontSize:14,lineHeight:1.5}}>{log.content}</div>}
          {log.duration&&<div style={{fontSize:11,color:'var(--text-sub)',marginTop:4}}>⏱ {log.duration}分</div>}
        </div>
      ))}
      {showForm&&(
        <div className="overlay" onClick={()=>setShowForm(false)}>
          <div className="drawer" onClick={e=>e.stopPropagation()}>
            <div className="drawer-handle"/>
            <div className="drawer-title">活動を記録</div>
            <LogForm onSave={save} onClose={()=>setShowForm(false)}/>
          </div>
        </div>
      )}
    </div>
  );
}

// ── TaskTab (統合版) ──────────────────────────────────────────
const TASK_SUBTABS = [
  {key:'today',  label:'今日',    icon:'📋'},
  {key:'matrix', label:'マトリクス',icon:'🔢'},
  {key:'clients',label:'クライアント',icon:'💼'},
  {key:'vision', label:'神メモ',  icon:'🌟'},
  {key:'gantt',  label:'ガント',  icon:'📅'},
  {key:'suspects',label:'サスペクト',icon:'👤'},
  {key:'log',    label:'ログ',    icon:'📝'},
];

function TaskTab({ tasks, setTasks, clients, setClients, vision, setVision, suspects, setSuspects, logs, setLogs, sales, setSales }) {
  const [subTab, setSubTab] = useState('today');
  const [clientFilter, setClientFilter] = useState('進行中');
  const [showClientForm, setShowClientForm] = useState(false);
  const [editingClient, setEditingClient] = useState(null);
  const [showTaskForm, setShowTaskForm] = useState(false);
  const [editingTask, setEditingTask] = useState(null);
  const [showDone, setShowDone] = useState(false);

  // 見込みAC合計（進行中のみ）
  const activeClients = clients.filter(c => (c.status || '進行中') === '進行中');
  const totalAC = activeClients.reduce((s, c) => s + (Number(c.prospectAC) || 0), 0);

  const filteredClients = clients.filter(c =>
    clientFilter === 'すべて' ? true : (c.status || '進行中') === clientFilter
  );

  const pendingTasks = tasks.filter(t => !t.completed);
  const doneTasks = tasks.filter(t => t.completed);

  const saveClient = cl => {
    setClients(prev => {
      const idx = prev.findIndex(x => x.id === cl.id);
      return idx >= 0 ? prev.map((x,i) => i===idx ? cl : x) : [...prev, cl];
    });
    setShowClientForm(false); setEditingClient(null);
  };

  const saveTask = t => {
    setTasks(prev => {
      const idx = prev.findIndex(x => x.id === t.id);
      return idx >= 0 ? prev.map((x,i) => i===idx ? t : x) : [...prev, t];
    });
    setShowTaskForm(false); setEditingTask(null);
  };

  const toggleTask = id => setTasks(prev => prev.map(t => t.id === id ? {...t, completed: !t.completed} : t));
  const deleteClient = id => setClients(prev => prev.filter(c => c.id !== id));
  const deleteTask = id => setTasks(prev => prev.filter(t => t.id !== id));

  return (
    <div>
      {/* サブタブナビ */}
      <div style={{overflowX:'auto',display:'flex',gap:4,marginBottom:12,paddingBottom:4}}>
        {TASK_SUBTABS.map(t=>(
          <button key={t.key} onClick={()=>setSubTab(t.key)}
            style={{display:'flex',alignItems:'center',gap:4,padding:'7px 12px',borderRadius:20,border:'1.5px solid',whiteSpace:'nowrap',cursor:'pointer',fontSize:12,fontWeight:700,flexShrink:0,
              borderColor:subTab===t.key?'var(--accent)':'var(--border)',
              background:subTab===t.key?'var(--accent-light)':'var(--bg)',
              color:subTab===t.key?'var(--accent)':'var(--text-sub)'}}>
            <span>{t.icon}</span><span>{t.label}</span>
          </button>
        ))}
      </div>

      {/* 今日タブ */}
      {subTab==='today' && (
        <div>
          <div style={{fontSize:13,color:'var(--text-sub)',fontWeight:500,marginBottom:10}}>{todayFull()}</div>

          {/* 売上トラッカー */}
          <SalesTracker sales={sales} onChange={setSales} clients={clients} />

          {/* 期限切れタスク */}
          {(() => {
            const td = todayStr();
            const overdue = pendingTasks.filter(t => t.date && t.date < td);
            if (overdue.length === 0) return null;
            return (
              <div className="card" style={{background:'#FEF2F2',border:'1.5px solid #FECACA',marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:700,color:'#DC2626',marginBottom:8}}>⚠ 未完了（期限切れ {overdue.length}件）</div>
                {overdue.map(t => (
                  <div key={t.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid rgba(0,0,0,0.06)'}}>
                    <button onClick={()=>toggleTask(t.id)} style={{width:22,height:22,borderRadius:6,border:'2px solid #FECACA',background:'#FEF2F2',cursor:'pointer',flexShrink:0}}/>
                    <div style={{flex:1,cursor:'pointer'}} onClick={()=>{setEditingTask(t);setShowTaskForm(true)}}>
                      <div style={{fontSize:14,fontWeight:500}}>{t.title}</div>
                      <span style={{fontSize:11,background:'#FECACA',color:'#DC2626',padding:'1px 5px',borderRadius:4}}>{fmtDate(t.date)}</span>
                    </div>
                    <button onClick={()=>deleteTask(t.id)} style={{background:'none',border:'none',color:'#CCC',cursor:'pointer',fontSize:18,padding:'0 4px'}}>×</button>
                  </div>
                ))}
              </div>
            );
          })()}

          {/* 今日のタスク */}
          <div className="card" style={{marginBottom:10}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text-sub)',letterSpacing:'0.6px'}}>TODAY</div>
              <button className="btn btn-primary btn-sm" onClick={()=>{setEditingTask(null);setShowTaskForm(true)}}>＋ 追加</button>
            </div>
            {(() => {
              const td = todayStr();
              const isRecurring = t => t.recurrence && t.recurrence !== 'none';

              // 繰り返しタスク（毎日 or 今日が該当日）
              const recurringToday = tasks.filter(t => {
                if (!isRecurring(t) || t.completed) return false;
                if (t.recurrence === 'daily') return true;
                if (t.recurrence === 'monthly' && t.date) {
                  return new Date(t.date + 'T00:00:00').getDate() === new Date().getDate();
                }
                return false;
              });

              const onceOnly    = pendingTasks.filter(t => !isRecurring(t));
              const todayTasks  = onceOnly.filter(t => t.date === td);
              const overdueTasks= onceOnly.filter(t => t.date && t.date < td);
              const upcoming    = onceOnly.filter(t => t.date && t.date > td);
              const undated     = onceOnly.filter(t => !t.date);
              const clientName  = id => clients.find(c => c.id === id)?.name;

              const toggleStep = (taskId, stepId) => {
                setTasks(prev => prev.map(t => t.id !== taskId ? t : {
                  ...t, steps: (t.steps||[]).map(s => s.id===stepId ? {...s, done:!s.done} : s)
                }));
              };

              const TaskRow = ({ t, hideDate }) => {
                const steps = t.steps || [];
                const doneCount = steps.filter(s => s.done).length;
                const recLabel = t.recurrence==='daily' ? '🔁 毎日'
                  : t.recurrence==='monthly' ? `📅 毎月${new Date(t.date+'T00:00:00').getDate()}日` : null;
                return (
                  <div style={{borderBottom:'1px solid var(--border)'}}>
                    <div style={{display:'flex',alignItems:'flex-start',gap:10,padding:'9px 0'}}>
                      <div onClick={()=>toggleTask(t.id)}
                        style={{width:22,height:22,borderRadius:6,border:'2px solid var(--border)',cursor:'pointer',flexShrink:0,marginTop:2,display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}}/>
                      <div style={{flex:1,minWidth:0,cursor:'pointer'}} onClick={()=>{setEditingTask(t);setShowTaskForm(true)}}>
                        <div style={{fontSize:15,fontWeight:500}}>{t.title}</div>
                        <div style={{display:'flex',gap:4,marginTop:4,flexWrap:'wrap'}}>
                          {recLabel && <span style={{fontSize:11,background:'#ECFDF5',color:'#059669',border:'1px solid #A7F3D0',borderRadius:4,padding:'1px 5px',fontWeight:600}}>{recLabel}</span>}
                          {!hideDate && t.date && t.date !== td && <span style={{fontSize:11,background:'#F0F0F5',color:'#555',padding:'1px 6px',borderRadius:4}}>{fmtDate(t.date)}</span>}
                          {(t.importance===1||t.importance===true) && <span style={{fontSize:11,background:'#FEF2F2',color:'#DC2626',padding:'1px 5px',borderRadius:4,fontWeight:700}}>重要</span>}
                          {(t.urgency===1||t.urgency===true) && <span style={{fontSize:11,background:'#FFF7ED',color:'#C2410C',padding:'1px 5px',borderRadius:4,fontWeight:700}}>緊急</span>}
                          {clientName(t.clientId) && <span style={{fontSize:11,background:'var(--accent-light)',color:'var(--accent)',padding:'1px 6px',borderRadius:4,fontWeight:600}}>{clientName(t.clientId)}</span>}
                          {t.axis && <AxisBadge axis={t.axis} />}
                          {steps.length>0 && <span style={{fontSize:11,background:'#EEF2FF',color:'var(--accent)',borderRadius:4,padding:'1px 6px',fontWeight:600}}>🪜 {doneCount}/{steps.length}</span>}
                        </div>
                      </div>
                      <a href={toGCalUrl(t)} target="_blank" rel="noreferrer"
                        style={{color:'#AAA',fontSize:15,padding:'4px 2px',textDecoration:'none',lineHeight:1}}>📅</a>
                      <button onClick={()=>deleteTask(t.id)} style={{background:'none',border:'none',color:'#CCC',cursor:'pointer',fontSize:18,padding:'0 4px'}}>×</button>
                    </div>
                    {/* ベビーステップ */}
                    {steps.length>0 && (
                      <div style={{paddingLeft:32,paddingBottom:8}}>
                        {steps.map(step => (
                          <div key={step.id} onClick={()=>toggleStep(t.id,step.id)}
                            style={{display:'flex',alignItems:'center',gap:7,padding:'4px 0',cursor:'pointer',borderTop:'1px solid var(--border)'}}>
                            <div style={{width:14,height:14,borderRadius:3,flexShrink:0,
                              border:step.done?'none':'2px solid var(--border)',
                              background:step.done?'var(--success)':'transparent',
                              display:'flex',alignItems:'center',justifyContent:'center'}}>
                              {step.done && <span style={{color:'#fff',fontSize:10,lineHeight:1}}>✓</span>}
                            </div>
                            <span style={{fontSize:12,color:step.done?'var(--text-sub)':'var(--text)',textDecoration:step.done?'line-through':'none'}}>{step.text}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              };

              return (
                <>
                  {recurringToday.length>0 && (
                    <div style={{marginBottom:8}}>
                      <div style={{fontSize:11,fontWeight:700,color:'#059669',marginBottom:4}}>🔁 定期タスク</div>
                      {recurringToday.map(t=><TaskRow key={t.id} t={t} hideDate />)}
                    </div>
                  )}
                  {overdueTasks.length>0 && (
                    <div style={{marginBottom:8,background:'#FEF2F2',borderRadius:10,padding:'8px 10px',border:'1px solid #FECACA'}}>
                      <div style={{fontSize:11,fontWeight:700,color:'#DC2626',marginBottom:4}}>⚠ 期限切れ {overdueTasks.length}件</div>
                      {overdueTasks.map(t=><TaskRow key={t.id} t={t}/>)}
                    </div>
                  )}
                  {todayTasks.length===0 && recurringToday.length===0 && <div style={{textAlign:'center',padding:'12px 0',color:'var(--text-sub)',fontSize:13}}>✓ 今日のタスクなし</div>}
                  {todayTasks.map(t=><TaskRow key={t.id} t={t} hideDate />)}
                  {upcoming.length>0 && <div style={{fontSize:11,fontWeight:700,color:'var(--text-sub)',marginTop:10,marginBottom:4}}>今後の予定</div>}
                  {upcoming.map(t=><TaskRow key={t.id} t={t}/>)}
                  {undated.length>0 && <div style={{fontSize:11,fontWeight:700,color:'var(--text-sub)',marginTop:10,marginBottom:4}}>📋 日付未定</div>}
                  {undated.map(t=><TaskRow key={t.id} t={t}/>)}
                </>
              );
            })()}
          </div>

          {/* 完了フォルダー */}
          {doneTasks.length>0 && (
            <div className="card">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}}
                onClick={()=>setShowDone(v=>!v)}>
                <span style={{fontSize:11,fontWeight:700,color:'var(--text-sub)'}}>
                  ✅ 完了フォルダー <span style={{background:'var(--success)',color:'#fff',borderRadius:10,padding:'1px 7px',fontSize:12,fontWeight:700,marginLeft:4}}>{doneTasks.length}</span>
                </span>
                <span style={{fontSize:13,color:'var(--text-sub)'}}>{showDone?'▲':'▼'}</span>
              </div>
              {showDone && doneTasks.map(t=>(
                <div key={t.id} style={{display:'flex',alignItems:'center',gap:8,padding:'9px 0',borderTop:'1px solid var(--border)'}}>
                  <div style={{width:22,height:22,borderRadius:6,background:'var(--accent)',border:'2px solid var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    <span style={{color:'#fff',fontSize:12,fontWeight:800}}>✓</span>
                  </div>
                  <div style={{flex:1,fontSize:14,fontWeight:500,textDecoration:'line-through',color:'var(--text-sub)'}}>{t.title}</div>
                  <button onClick={()=>toggleTask(t.id)} style={{fontSize:12,fontWeight:700,padding:'4px 10px',borderRadius:8,border:'1.5px solid var(--accent)',background:'var(--accent-light)',color:'var(--accent)',cursor:'pointer'}}>↩ 戻す</button>
                  <button onClick={()=>deleteTask(t.id)} style={{fontSize:12,fontWeight:700,padding:'4px 10px',borderRadius:8,border:'1.5px solid var(--danger)',background:'#FEF2F2',color:'var(--danger)',cursor:'pointer'}}>🗑</button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* マトリクスタブ */}
      {subTab==='matrix' && <MatrixPanel tasks={tasks} clients={clients}/>}

      {/* クライアントタブ */}
      {subTab==='clients' && (
        <ClientsTabInner
          clients={clients} tasks={tasks}
          onAdd={()=>{setEditingClient(null);setShowClientForm(true);}}
          onEdit={cl=>{setEditingClient(cl);setShowClientForm(true);}}
          onDelete={deleteClient}
        />
      )}

      {/* 神メモ */}
      {subTab==='vision' && <VisionPanel vision={vision} setVision={setVision} tasks={tasks} clients={clients}/>}
      {/* ガント */}
      {subTab==='gantt' && <GanttPanel tasks={tasks} clients={clients}/>}
      {/* サスペクト */}
      {subTab==='suspects' && <SuspectsPanel suspects={suspects} setSuspects={setSuspects}/>}
      {/* ログ */}
      {subTab==='log' && <LogPanel logs={logs} setLogs={setLogs}/>}

      {/* フォームモーダル */}
      {showClientForm&&(
        <div className="overlay" onClick={()=>{setShowClientForm(false);setEditingClient(null)}}>
          <div className="drawer" onClick={e=>e.stopPropagation()}>
            <div className="drawer-handle"/>
            <div className="drawer-title">{editingClient?'見込み客を編集':'見込み客を追加'}</div>
            <ClientForm editing={editingClient} onSave={saveClient} onClose={()=>{setShowClientForm(false);setEditingClient(null)}}/>
          </div>
        </div>
      )}
      {showTaskForm&&(
        <div className="overlay" onClick={()=>{setShowTaskForm(false);setEditingTask(null)}}>
          <div className="drawer" onClick={e=>e.stopPropagation()}>
            <div className="drawer-handle"/>
            <div className="drawer-title">{editingTask?'タスクを編集':'タスクを追加'}</div>
            <TaskForm editing={editingTask} clients={clients} onSave={saveTask} onClose={()=>{setShowTaskForm(false);setEditingTask(null)}}/>
          </div>
        </div>
      )}
    </div>
  );
}

      </div>
    </>
  );
}

// ── タスクフォーム（フル機能版 app.html互換）────────────────
function TaskForm({ editing, clients, onSave, onClose }) {
  const [form, setForm] = useState({
    title:'', date:'', importance:0, urgency:0,
    clientId:'', rowType:'work', axis:'', recurrence:'none', completed:false,
    steps:[], memo:'',
    ...(editing || {}),
  });
  const s = k => v => setForm(f => ({ ...f, [k]: v }));
  const [stepInput, setStepInput] = useState('');

  const addStep = () => {
    const txt = stepInput.trim();
    if (!txt) return;
    setForm(f => ({ ...f, steps: [...(f.steps||[]), { id: uid(), text: txt, done: false }] }));
    setStepInput('');
  };
  const removeStep = id => setForm(f => ({ ...f, steps: (f.steps||[]).filter(s => s.id !== id) }));
  const moveStep = (idx, dir) => setForm(f => {
    const arr = [...(f.steps||[])];
    const to = idx + dir;
    if (to < 0 || to >= arr.length) return f;
    [arr[idx], arr[to]] = [arr[to], arr[idx]];
    return { ...f, steps: arr };
  });

  const save = () => { if (!form.title.trim()) return; onSave({ ...form, id: form.id || uid() }); onClose(); };

  const btnStyle = (active, color='var(--accent)', bg='var(--accent-light)') => ({
    flex:1, padding:'9px 6px', borderRadius:9, border:`1.5px solid ${active ? color : 'var(--border)'}`,
    background: active ? bg : 'var(--bg)', fontSize:13, fontWeight:600, cursor:'pointer',
    color: active ? color : 'var(--text-sub)', textAlign:'center',
  });

  return (
    <>
      {/* タスク名 */}
      <div className="form-group">
        <label className="form-label">タスク名</label>
        <input className="form-input" placeholder="タスク名を入力..." value={form.title}
          onChange={e => s('title')(e.target.value)} autoFocus />
      </div>

      {/* 繰り返し */}

// ── JSON Import（全データ対応）────────────────────────────────
function importJSON(file, handlers) {
  // handlers = { setCustomers, setTasks, setClients, setVision, setSuspects, setSales, setLogs }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);

      // ① app.html バックアップ形式
      //    { tasks, clients, suspects, vision, sales, logs, exportedAt, version }
      if (data.tasks || data.logs || (data.clients && !data.customers)) {
        const msgs = [];
        if (data.tasks    && handlers.setTasks)    { handlers.setTasks(data.tasks);       msgs.push(`タスク${data.tasks.length}件`); }
        if (data.clients  && handlers.setClients)  { handlers.setClients(data.clients);   msgs.push(`クライアント${data.clients.length}件`); }
        if (data.suspects && handlers.setSuspects) { handlers.setSuspects(data.suspects); msgs.push(`サスペクト${data.suspects.length}件`); }
        if (data.vision   && handlers.setVision)   { handlers.setVision(data.vision); }
        if (data.sales    && handlers.setSales)    { handlers.setSales(data.sales); }
        if (data.logs     && handlers.setLogs)     { handlers.setLogs(data.logs);         msgs.push(`ログ${data.logs.length}件`); }
        alert(`✅ バックアップ復元完了\n${msgs.join(' / ')}`);
        return;
      }

      // ② nexus.html JSON エクスポート形式 { customers: [...] }
      if (data.customers && Array.isArray(data.customers)) {
        handlers.setCustomers(prev => {
          const existingIds = new Set(prev.map(c => c.id));
          const newOnes = data.customers.filter(c => !existingIds.has(c.id));
          alert(`✅ 顧客インポート完了：${newOnes.length}件追加`);
          return [...prev, ...newOnes];
        });
        return;
      }

      // ③ 直接配列（顧客データ）
      if (Array.isArray(data)) {
        handlers.setCustomers(prev => {
          const existingIds = new Set(prev.map(c => c.id));
          const newOnes = data.filter(c => !existingIds.has(c.id));
          alert(`✅ 顧客インポート完了：${newOnes.length}件追加`);
          return [...prev, ...newOnes];
        });
        return;
      }

      alert('対応していないファイル形式です');
    } catch {
      alert('JSONの読み込みに失敗しました');
    }
  };
  reader.readAsText(file, 'UTF-8');
}

function importCSV(file, setCustomers) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const text = e.target.result.replace(/^﻿/, ''); // BOM除去
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) { alert('データがありません'); return; }

      const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
      const parseVal = v => v.replace(/^"|"$/g, '').replace(/""/g, '"').trim();

      const imported = lines.slice(1).map(line => {
        // カンマ区切り（引用符内のカンマを考慮）
        const cols = [];
        let cur = '', inQ = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') { inQ = !inQ; }
          else if (ch === ',' && !inQ) { cols.push(cur); cur = ''; }
          else { cur += ch; }
        }
        cols.push(cur);

        const get = key => parseVal(cols[headers.indexOf(key)] || '');
        const name = get('氏名') || get('name') || get('名前');
        if (!name) return null;

        // 契約データの復元（証券番号一覧・払込方法一覧・通貨一覧から）
        const policyNums   = get('証券番号一覧').split('/').map(s=>s.trim()).filter(Boolean);
        const payCycles    = get('払込方法一覧').split('/').map(s=>s.trim()).filter(Boolean);
        const currencies   = get('通貨一覧').split('/').map(s=>s.trim()).filter(Boolean);
        const contractCount = parseInt(get('契約数')) || policyNums.length;
        const contracts = Array.from({length: contractCount}, (_, i) => ({
          id: String(Date.now() + Math.random() + i),
          category: '生保',
          type: '',
          company: '',
          policyNum:    policyNums[i]  || '',
          paymentCycle: payCycles[i]   || '月払',
          currency:     currencies[i]  || '円',
          insuredName: '',
          insuredBirthdate: '',
          premium: '',
          date: '',
          termEnd: '',
          coverage: '',
          memo: '',
        }));

        return {
          id: String(Date.now() + Math.random()),
          customerType: '個人',
          name,
          age: get('年齢') || get('age') || '',
          gender: get('性別') || '',
          birthdate: get('生年月日') || '',
          phone: get('電話番号') || get('phone') || '',
          email: get('メールアドレス') || get('email') || '',
          postalCode: get('郵便番号') || '',
          address: get('住所') || get('address') || '',
          occupation: get('職業') || get('occupation') || '',
          workplace: get('勤務先') || get('workplace') || '',
          status: get('ステータス') || get('status') || '未接触',
          contactMethod: get('接触方法') || '電話',
          lastContact: get('最終接触日') || '',
          nextAppt: get('次回アポイント') || '',
          memo: get('面談メモ') || get('memo') || '',
          lineRegistered: get('LINE登録') === '登録済',
          contracts,
          suspects: [],
          referredBy: '',
        };
      }).filter(Boolean);

      if (imported.length === 0) { alert('インポートできる行がありません'); return; }

      setCustomers(prev => {
        const merged = [...prev, ...imported];
        alert(`インポート完了：${imported.length}件追加`);
        return merged;
      });
    } catch(err) {
      alert('CSVの読み込みに失敗しました: ' + err.message);
    }
  };
  reader.readAsText(file, 'UTF-8');
}

// ── RFC4180準拠 CSVパーサー（改行含むフィールド対応）──────────
function parseCSVFull(text) {
  const rows = [];
  let row = [], field = '', inQ = false, i = 0;
  const t = text.replace(/^﻿/, ''); // BOM除去
  while (i < t.length) {
    const ch = t[i];
    if (inQ) {
      if (ch === '"' && t[i+1] === '"') { field += '"'; i += 2; }
      else if (ch === '"') { inQ = false; i++; }
      else { field += ch; i++; }
    } else {
      if (ch === '"') { inQ = true; i++; }
      else if (ch === ',') { row.push(field); field = ''; i++; }
      else if (ch === '\r' && t[i+1] === '\n') {
        row.push(field); rows.push(row); row = []; field = ''; i += 2;
      } else if (ch === '\n') {
        row.push(field); rows.push(row); row = []; field = ''; i++;
      } else { field += ch; i++; }
    }
  }
  if (field || row.length > 0) { row.push(field); if (row.some(f=>f)) rows.push(row); }
  return rows;
}

// ── 商談メモCSVインポート（shodan3.html形式）─────────────────
function importShodanCSV(file, setMemos) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const rows = parseCSVFull(e.target.result);
      if (rows.length < 2) { alert('データがありません'); return; }

      const headers = rows[0].map(h => h.trim());
      const get = (row, key) => (row[headers.indexOf(key)] || '').trim();

      const imported = rows.slice(1).map(row => {
        const personName = get(row, '顧客名');
        if (!personName) return null;

        const parts = [
          get(row,'場所')           && `📍 場所：${get(row,'場所')}`,
          get(row,'職業・年収')     && `💼 職業・年収：${get(row,'職業・年収')}`,
          get(row,'家族構成')       && `👨‍👩‍👧 家族構成：${get(row,'家族構成')}`,
          get(row,'きっかけ')       && `💡 きっかけ：${get(row,'きっかけ')}`,
          get(row,'ニーズ')         && `🎯 ニーズ：${get(row,'ニーズ')}`,
          get(row,'刺さったポイント') && `✨ 刺さったポイント：${get(row,'刺さったポイント')}`,
          get(row,'ツール')         && `🛠 ツール：${get(row,'ツール')}`,
          get(row,'商品・金額')     && `💰 商品・金額：${get(row,'商品・金額')}`,
          get(row,'結果')           && `📊 結果：${get(row,'結果')}`,
          get(row,'告知・注意')     && `⚠️ 告知・注意：${get(row,'告知・注意')}`,
          get(row,'次回アクション') && `➡️ 次回アクション：${get(row,'次回アクション')}`,
          get(row,'温度感')         && `🌡 温度感：${get(row,'温度感')}`,
          get(row,'雑談メモ')       && `💬 雑談メモ：${get(row,'雑談メモ')}`,
          get(row,'印象・気づき')   && `📝 印象・気づき：${get(row,'印象・気づき')}`,
        ].filter(Boolean).join('\n');

        return {
          id: get(row,'ID') || String(Date.now() + Math.random()),
          date: get(row,'面談日') || todayStr(),
          customerId: '',
          personName,
          memo: parts,
        };
      }).filter(Boolean);

      if (imported.length === 0) {
        alert(`インポートできる行がありません\n（ヘッダー確認：${headers.slice(0,3).join(' / ')}）`);
        return;
      }

      setMemos(prev => {
        const existingIds = new Set(prev.map(m => m.id));
        const newOnes = imported.filter(m => !existingIds.has(m.id));
        alert(`✅ 商談メモ インポート完了：${newOnes.length}件追加`);
        return [...prev, ...newOnes];
      });
    } catch(err) {
      alert('CSVの読み込みに失敗しました: ' + err.message);
    }
  };
  reader.readAsText(file, 'UTF-8');
}

function exportJSON(customers) {
  const data = JSON.stringify({ customers }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `nexus_customers_${todayStr()}.json`;
  a.click(); URL.revokeObjectURL(url);
}

function exportCSV(customers) {
  const headers = ['氏名', '年齢', '生年月日', '電話番号', 'メールアドレス', '郵便番号', '住所', '職業', '勤務先', 'LINE登録', 'ステータス', '接触方法', '最終接触日', '次回アポイント', '契約数', '証券番号一覧', '払込方法一覧', '通貨一覧', '面談メモ'];
  const rows = customers.map(c => {
    // 年齢：生年月日があれば満年齢、なければ入力年から自動加算
    const currentAge = c.birthdate
      ? calcAge(c.birthdate)
      : calcStoredAge(c.age, c.ageYear);
    return [
    c.name, currentAge !== null ? currentAge : '', c.birthdate || '', c.phone || '', c.email || '',
    c.postalCode || '', c.address || '', c.occupation || '', c.workplace || '',
    c.lineRegistered ? '登録済' : '未登録',
    c.status || '未接触',
    c.contactMethod || '',
    c.lastContact || '',
    c.nextAppt || '',
    (c.contracts || []).length,
    (c.contracts || []).map(ct => ct.policyNum || '').filter(Boolean).join(' / '),
    (c.contracts || []).map(ct => ct.paymentCycle || '月払').join(' / '),
    (c.contracts || []).map(ct => ct.currency || '円').join(' / '),
    (c.memo || '').replace(/\n/g, '　'),
    ];
  });
  const csv = [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `既契約顧客_${todayStr()}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

              📥JSON
              <input type="file" accept=".json" style={{ display:'none' }}
                onChange={e => { if (e.target.files[0]) { importJSON(e.target.files[0], { setCustomers, setTasks, setClients, setVision, setSuspects, setSales, setLogs }); e.target.value=''; } }} />
            </label>
            <button onClick={() => exportJSON(customers)}
              style={{ fontSize:11, padding:'5px 10px', borderRadius:8, border:'1px solid var(--border)', background:'#fff', color:'var(--text-sub)', cursor:'pointer', fontWeight:600 }}>
              JSON
            </button>
          </div>
        </div>
      </div>

      {/* Content */}
      <div className="content">
        {tab === 'dashboard' && (
          <DashboardTab customers={customers} kpiSettings={kpiSettings} setKpiSettings={setKpiSettings} onNavigate={(t, c) => {
            setTab(t === 'customers' ? 'list' : t);
            if (c) setSelectedCustomer(c);
          }} />
        )}
        {tab === 'list' && (
          <CustomerListTab customers={customers} onSelect={setSelectedCustomer} onAdd={openNewCustomer} />
        )}
        {tab === 'memo' && (
          <NegotiationTab memos={memos} setMemos={setMemos} customers={customers} onSelect={setSelectedMemo} />
        )}
        {tab === 'task' && (
          <TaskTab tasks={tasks} setTasks={setTasks} clients={clients} setClients={setClients}
            vision={vision} setVision={setVision} suspects={suspects} setSuspects={setSuspects}
            logs={logs} setLogs={setLogs} sales={sales} setSales={setSales} />
        )}
      </div>

      {/* Bottom Nav */}
      <nav className="bottom-nav">
        {tabs.map(t => (
          <button key={t.key} className={`nav-item ${tab === t.key ? 'active' : ''}`} onClick={() => setTab(t.key)}>
            <div className="nav-icon">{t.icon}</div>
            <div className="nav-label">{t.label}</div>
          </button>
        ))}
      </nav>

      {/* FAB */}
      {!anyOverlay && tab === 'list' && <button className="fab" onClick={openNewCustomer}>＋</button>}
      {!anyOverlay && tab === 'memo' && <button className="fab" onClick={() => { setEditingMemo(null); setShowMemoForm(true); }}>＋</button>}

      {/* Customer Detail */}
      {selectedCustomer && !showCustomerForm && (
        <CustomerDetail
          customer={selectedCustomer} customers={customers}
          onEdit={() => openEditCustomer(selectedCustomer)}
          onDelete={id => { deleteCustomer(id); setSelectedCustomer(null); }}
          onClose={() => setSelectedCustomer(null)}
          onRegisterSuspect={sp => { setSelectedCustomer(null); registerSuspect(sp); }}
        />
      )}

      {/* Customer Form */}
      {showCustomerForm && (
        <CustomerForm editing={editingCustomer} customers={customers}
          onSave={c => { saveCustomer(c); if (editingCustomer) setSelectedCustomer(c); }}
          onClose={() => { setShowCustomerForm(false); setEditingCustomer(null); }}
        />
      )}

      {/* Memo Detail */}
      {selectedMemo && !showMemoForm && (
        <NegotiationDetail
          memo={selectedMemo} customers={customers}
          onEdit={() => { setEditingMemo(selectedMemo); setSelectedMemo(null); setShowMemoForm(true); }}
          onDelete={id => { deleteMemo(id); setSelectedMemo(null); }}
          onClose={() => setSelectedMemo(null)}
          onRegisterAsCustomer={m => { setSelectedMemo(null); registerMemoAsCustomer(m); }}
          onAddTask={t => setTasks(prev => [t, ...prev])}
        />
      )}

      {/* Memo Form */}
      {showMemoForm && (
        <NegotiationForm editing={editingMemo} customers={customers}
          onSave={m => { saveMemo(m); setEditingMemo(null); }}
          onClose={() => { setShowMemoForm(false); setEditingMemo(null); }}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
